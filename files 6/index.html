<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Phase 1">
<meta name="theme-color" content="#ffffff">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.png">
<title>Phase 1 Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=DM+Mono:wght@300;400;500&family=Lora:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#ffffff;--bg2:#f7f7f7;--bg3:#efefef;--bg4:#e0e0e0;--bg5:#d0d0d0;
  --b:rgba(0,0,0,0.06);--b2:rgba(0,0,0,0.10);--b3:rgba(0,0,0,0.18);
  --t:#1a1a1a;--t2:#6b6b6b;--t3:#9a9a9a;
  --gold:#8a6840;--gd:rgba(138,104,64,0.12);--gdx:rgba(138,104,64,0.05);
  --red:#b85450;--rd:rgba(184,84,80,0.1);
  --blue:#4a7fa0;--bd:rgba(74,127,160,0.1);
  --green:#4e8c5c;--grd:rgba(78,140,92,0.1);
  --purple:#7a60a0;--pd:rgba(122,96,160,0.1);
  --syne:'Syne',sans-serif;--mono:'DM Mono',monospace;--serif:'Lora',serif;
  --tab-h:64px;
  --safe-bottom:env(safe-area-inset-bottom,0px);
  --safe-top:env(safe-area-inset-top,0px);
}

/* ── BASE ── */
html{height:100%;overflow:hidden;}
body{height:100%;background:var(--bg);color:var(--t);font-family:var(--syne);-webkit-text-size-adjust:100%;overflow:hidden;}
button{-webkit-tap-highlight-color:transparent;}
input,select,textarea{-webkit-appearance:none;border-radius:0;}

/* ── APP SHELL ── */
.app{display:flex;flex-direction:column;height:100%;height:100dvh;}
.main{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding-bottom:calc(var(--tab-h) + var(--safe-bottom));}
.panel{display:none;}.panel.show{display:block;}

/* ── BOTTOM TAB BAR ── */
.tab-bar{position:fixed;bottom:0;left:0;right:0;z-index:50;background:var(--bg2);border-top:1px solid var(--b2);display:flex;align-items:stretch;padding-bottom:var(--safe-bottom);height:calc(var(--tab-h) + var(--safe-bottom));}
.tab-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;cursor:pointer;padding:8px 4px 6px;-webkit-tap-highlight-color:transparent;min-width:0;transition:opacity .1s;}
.tab-item:active{opacity:.6;}
.tab-icon{font-size:20px;line-height:1;}
.tab-label{font-family:var(--mono);font-size:9px;letter-spacing:.04em;color:var(--t3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:52px;text-align:center;}
.tab-item.on .tab-icon{filter:drop-shadow(0 0 6px var(--gold));}
.tab-item.on .tab-label{color:var(--gold);}

/* ── PAGE HEADER ── */
.wl-header{background:var(--bg2);border-bottom:1px solid var(--b);padding:max(16px,calc(var(--safe-top) + 12px)) 18px 14px;}
.wl-eye{font-family:var(--mono);font-size:9px;letter-spacing:.18em;color:var(--gold);margin-bottom:5px;}
.wl-title{font-size:22px;font-weight:700;letter-spacing:-.01em;line-height:1.1;}
.wl-title em{font-family:var(--serif);font-style:italic;font-weight:400;color:var(--gold);}
.wl-desc{font-family:var(--mono);font-size:11px;color:var(--t2);margin-top:6px;line-height:1.7;}
.wl-body{padding:16px 18px;}

/* ── WEEK CONTROL (top right of list header) ── */
.wl-header-row{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;}
.wk-ctrl{display:flex;align-items:center;gap:6px;margin-top:2px;}
.wk-btn{width:32px;height:32px;border-radius:8px;border:1px solid var(--b2);background:transparent;color:var(--t2);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent;}
.wk-btn:active{background:var(--bg4);}
.wk-num{font-family:var(--mono);font-size:12px;color:var(--gold);min-width:38px;text-align:center;}

/* ── NEXT SESSION CARD ── */
.wl-next{background:var(--gd);border:1px solid rgba(138,104,64,.25);border-radius:12px;padding:18px;margin-bottom:16px;cursor:pointer;-webkit-tap-highlight-color:transparent;}
.wl-next:active{opacity:.8;}
.wl-next-eye{font-family:var(--mono);font-size:8px;letter-spacing:.18em;color:var(--gold);margin-bottom:6px;}
.wl-next-name{font-size:17px;font-weight:700;line-height:1.2;}
.wl-next-meta{font-family:var(--mono);font-size:11px;color:var(--t2);margin-top:5px;}
.wl-next-arrow{font-size:18px;color:var(--gold);margin-top:10px;}

/* ── DELOAD BANNER ── */
.deload-banner{background:var(--pd);border:1px solid rgba(122,96,160,.25);border-radius:10px;padding:14px 16px;margin-bottom:14px;}
.deload-banner-eye{font-family:var(--mono);font-size:8px;letter-spacing:.16em;color:var(--purple);margin-bottom:4px;}
.deload-banner-title{font-size:14px;font-weight:700;color:var(--t);margin-bottom:4px;}
.deload-banner-desc{font-family:var(--mono);font-size:11px;color:var(--t2);line-height:1.6;}

/* ── SESSION LIST ── */
.session-list{display:flex;flex-direction:column;gap:8px;}
.sl-item{background:var(--bg2);border:1px solid var(--b);border-radius:12px;padding:14px 16px;cursor:pointer;-webkit-tap-highlight-color:transparent;display:flex;align-items:center;gap:12px;min-height:64px;}
.sl-item:active{background:var(--bg3);}
.sl-item.done{opacity:.5;}
.sl-item.next-up{border-color:rgba(138,104,64,.3);background:var(--gdx);}
.sl-num{font-family:var(--mono);font-size:11px;color:var(--t3);min-width:26px;}
.sl-info{flex:1;min-width:0;}
.sl-name{font-size:14px;font-weight:600;line-height:1.3;}
.sl-meta{font-family:var(--mono);font-size:10px;color:var(--t3);margin-top:3px;}
.sl-right{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0;}
.sl-badge{font-family:var(--mono);font-size:8px;padding:3px 8px;border-radius:4px;}
.b-gold{background:var(--gd);color:var(--gold);}
.b-green{background:var(--grd);color:var(--green);}
.b-blue{background:var(--bd);color:var(--blue);}
.b-red{background:var(--rd);color:var(--red);}
.b-purple{background:var(--pd);color:var(--purple);}
.sl-date{font-family:var(--mono);font-size:9px;color:var(--t3);}
.list-section-lbl{font-family:var(--mono);font-size:9px;letter-spacing:.16em;color:var(--t3);margin:16px 0 8px;}

/* ── SESSION HEADER ── */
.ph{background:var(--bg2);border-bottom:1px solid var(--b);padding:max(14px,calc(var(--safe-top) + 10px)) 18px 14px;}
.ph-top{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.ph-back{font-family:var(--mono);font-size:11px;color:var(--t2);cursor:pointer;padding:8px 14px;border:1px solid var(--b2);border-radius:8px;-webkit-tap-highlight-color:transparent;min-height:40px;display:flex;align-items:center;}
.ph-back:active{background:var(--bg3);}
.ph-seq{font-family:var(--mono);font-size:9px;color:var(--t3);letter-spacing:.1em;}
.ph-deload{font-family:var(--mono);font-size:8px;color:var(--purple);background:var(--pd);border:1px solid rgba(122,96,160,.25);padding:4px 10px;border-radius:4px;margin-left:auto;}
.ph-eye{font-family:var(--mono);font-size:9px;letter-spacing:.16em;color:var(--gold);margin-bottom:6px;}
.ph-title{font-size:20px;font-weight:700;letter-spacing:-.01em;line-height:1.15;}
.ph-title em{font-family:var(--serif);font-style:italic;font-weight:400;color:var(--gold);}
.ph-desc{font-family:var(--mono);font-size:11px;color:var(--t2);margin-top:6px;line-height:1.7;}

/* ── READINESS CHECK ── */
.readiness-wrap{background:var(--bg2);border-bottom:1px solid var(--b);padding:14px 18px;}
.readiness-title{font-family:var(--mono);font-size:9px;letter-spacing:.12em;color:var(--t3);margin-bottom:10px;}
.readiness-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;}
.rq{background:var(--bg3);border:1px solid var(--b);border-radius:10px;padding:12px 12px;}
.rq-label{font-family:var(--mono);font-size:9px;color:var(--t2);margin-bottom:8px;font-weight:500;}
.rq-options{display:flex;gap:4px;}
.rq-opt{flex:1;padding:8px 4px;font-family:var(--mono);font-size:10px;border:1px solid var(--b);border-radius:6px;background:transparent;color:var(--t3);cursor:pointer;text-align:center;-webkit-tap-highlight-color:transparent;min-height:36px;}
.rq-opt:active{background:var(--bg4);}
.rq-opt.sel-green{background:var(--grd);border-color:var(--green);color:var(--green);}
.rq-opt.sel-gold{background:var(--gd);border-color:var(--gold);color:var(--gold);}
.rq-opt.sel-red{background:var(--rd);border-color:var(--red);color:var(--red);}
.readiness-result{margin-top:10px;font-family:var(--mono);font-size:11px;line-height:1.6;padding:10px 12px;border-radius:8px;}
.rr-ok{background:var(--grd);color:var(--green);}
.rr-warn{background:var(--gd);color:var(--gold);}
.rr-reduce{background:var(--rd);color:var(--red);}

/* ── TIMER BAR ── */
.tbar{background:var(--bg3);border-bottom:1px solid var(--b);padding:12px 18px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.tdisplay{font-family:var(--mono);font-size:24px;font-weight:500;color:var(--gold);letter-spacing:.08em;min-width:70px;}
.tlabel{font-family:var(--mono);font-size:8px;color:var(--t3);letter-spacing:.1em;margin-bottom:2px;}
.tbar-btns{display:flex;gap:6px;}
.tbar-right{margin-left:auto;display:flex;gap:8px;align-items:center;flex-wrap:wrap;justify-content:flex-end;}
.sets-count{font-family:var(--mono);font-size:12px;color:var(--t3);}

/* ── CONTENT ── */
.ct{padding:16px 18px;max-width:100%;}

/* ── BUTTONS ── */
.btn{font-family:var(--syne);font-size:13px;font-weight:600;letter-spacing:.04em;padding:10px 16px;border-radius:10px;border:1px solid var(--b2);background:transparent;color:var(--t2);cursor:pointer;-webkit-tap-highlight-color:transparent;min-height:44px;display:inline-flex;align-items:center;justify-content:center;}
.btn:active{opacity:.7;}
.btn.pr{background:var(--gold);color:var(--bg);border-color:var(--gold);}
.btn.gn{border-color:var(--green);color:var(--green);}
.btn.gn:active{background:var(--grd);}
.btn.bl{border-color:var(--blue);color:var(--blue);}
.btn.bl:active{background:var(--bd);}
.btn.pu{border-color:var(--purple);color:var(--purple);}
.btn.sm{padding:7px 12px;font-size:11px;min-height:36px;}
.btn.xs{padding:5px 10px;font-size:10px;min-height:30px;}

/* ── CALLOUT ── */
.co{border-left:3px solid var(--gold);padding:11px 14px;background:var(--gdx);border-radius:0 8px 8px 0;margin-bottom:12px;font-size:13px;color:var(--t2);line-height:1.7;}
.co strong{color:var(--t);}
.co.gn{border-color:var(--green);background:var(--grd);}
.co.bl{border-color:var(--blue);background:var(--bd);}
.co.rd{border-color:var(--red);background:var(--rd);}
.co.pu{border-color:var(--purple);background:var(--pd);}

/* ── RAMP CALC ── */
.ramp-wrap{background:var(--bg3);border:1px solid var(--b);border-radius:10px;padding:12px 14px;margin-top:10px;}
.ramp-label{font-family:var(--mono);font-size:9px;letter-spacing:.1em;color:var(--t3);margin-bottom:8px;}
.ramp-input-row{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.ramp-input{background:var(--bg4);border:1px solid var(--b2);border-radius:8px;padding:8px 12px;font-family:var(--mono);font-size:14px;color:var(--t);width:120px;outline:none;min-height:44px;}
.ramp-input:focus{border-color:var(--gold);}
.ramp-sets{display:flex;gap:6px;flex-wrap:wrap;}
.ramp-set{background:var(--bg4);border:1px solid var(--b);border-radius:6px;padding:6px 12px;font-family:var(--mono);font-size:11px;color:var(--t2);}
.ramp-set.working{background:var(--gd);border-color:rgba(96,168,212,.4);color:var(--gold);font-weight:600;}

/* ── BLOCK HEADER ── */
.bh{display:flex;align-items:center;gap:8px;margin:20px 0 10px;}
.bh-tag{font-family:var(--mono);font-size:8px;letter-spacing:.12em;color:var(--t3);background:var(--bg3);padding:4px 9px;border-radius:4px;border:1px solid var(--b);}
.bh-name{font-size:14px;font-weight:700;}
.bh-dur{margin-left:auto;font-family:var(--mono);font-size:10px;color:var(--t3);}

/* ── EXERCISE BLOCK ── */
.ex{background:var(--bg2);border:1px solid var(--b);border-radius:12px;margin-bottom:10px;overflow:hidden;}
.ex-head{padding:14px 16px;display:flex;align-items:flex-start;justify-content:space-between;cursor:pointer;-webkit-tap-highlight-color:transparent;gap:10px;min-height:60px;}
.ex-head:active{background:var(--bg3);}
.ex-n{font-size:14px;font-weight:600;line-height:1.35;}
.ex-m{font-family:var(--mono);font-size:10px;color:var(--t3);margin-top:3px;line-height:1.5;}
.ex-right{display:flex;align-items:center;gap:6px;flex-shrink:0;}
.ex-body{padding:0 14px 16px;border-top:1px solid var(--b);}
.ex-deload{font-family:var(--mono);font-size:8px;color:var(--purple);background:var(--pd);padding:2px 6px;border-radius:3px;margin-left:6px;}
.ex-img-strip{display:flex;gap:2px;margin:12px 0 10px;border-radius:10px;overflow:hidden;background:var(--bg3);border:1px solid var(--b);}
.ex-img-strip img{flex:1;width:50%;height:auto;object-fit:contain;display:block;}
.ex-img-strip .ex-img-none{flex:1;display:flex;align-items:center;justify-content:center;min-height:140px;font-family:var(--mono);font-size:9px;color:var(--t3);}

/* ── SET TABLE — scrollable horizontally on small screens ── */
.set-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch;}
.set-hd{display:grid;grid-template-columns:30px 80px 70px 60px 90px 44px;gap:6px;padding:8px 0 5px;font-family:var(--mono);font-size:9px;letter-spacing:.08em;color:var(--t3);border-bottom:1px solid var(--b);min-width:380px;}
.set-row{display:grid;grid-template-columns:30px 80px 70px 60px 90px 44px;gap:6px;padding:8px 0;border-bottom:1px solid var(--b);align-items:center;min-width:380px;}
.set-row:last-child{border-bottom:none;}
.sn{font-family:var(--mono);font-size:12px;color:var(--t3);text-align:center;}
.si{background:var(--bg4);border:1px solid var(--b2);border-radius:8px;padding:8px 10px;font-family:var(--mono);font-size:14px;color:var(--t);width:100%;outline:none;min-height:44px;}
.si:focus{border-color:var(--gold);}
.si::placeholder{color:var(--t3);}
.sr{background:var(--bg4);border:1px solid var(--b2);border-radius:8px;padding:8px 6px;font-family:var(--mono);font-size:13px;color:var(--t);width:100%;outline:none;cursor:pointer;min-height:44px;}
.ck{width:44px;height:44px;border-radius:10px;border:1px solid var(--b2);background:transparent;cursor:pointer;font-size:18px;color:var(--t3);-webkit-tap-highlight-color:transparent;display:flex;align-items:center;justify-content:center;}
.ck:active{opacity:.6;}
.ck.done{background:var(--grd);border-color:var(--green);color:var(--green);}
.add-set{margin-top:10px;width:100%;padding:12px;font-family:var(--mono);font-size:11px;letter-spacing:.08em;color:var(--t3);background:transparent;border:1px dashed var(--b2);border-radius:10px;cursor:pointer;-webkit-tap-highlight-color:transparent;min-height:44px;}
.add-set:active{border-color:var(--gold);color:var(--gold);}
.snotes{width:100%;background:var(--bg4);border:1px solid var(--b2);border-radius:10px;padding:12px 14px;font-family:var(--mono);font-size:13px;color:var(--t);resize:none;min-height:72px;outline:none;line-height:1.6;margin-top:10px;}
.snotes:focus{border-color:var(--gold);}
.snotes::placeholder{color:var(--t3);}

/* ── SUB PANEL ── */
.sub-tabs{display:flex;gap:6px;margin-bottom:12px;}
.sub-tab{flex:1;padding:10px 8px;font-family:var(--mono);font-size:11px;letter-spacing:.06em;border-radius:8px;border:1px solid var(--b);background:transparent;color:var(--t2);cursor:pointer;-webkit-tap-highlight-color:transparent;min-height:44px;text-align:center;}
.sub-tab:active{background:var(--bg4);}
.sub-tab.on{background:var(--gd);border-color:var(--gold);color:var(--gold);}
.sub-c{background:var(--bg3);border:1px solid var(--b);border-radius:10px;padding:12px 14px;margin-bottom:8px;}
.sub-name{font-size:13px;font-weight:600;color:var(--t);margin-bottom:4px;}
.sub-note{font-family:var(--mono);font-size:11px;color:var(--t2);line-height:1.6;}

/* ── PRI CHECKLIST ── */
.pri-row{display:flex;align-items:flex-start;gap:12px;padding:12px 0;border-bottom:1px solid var(--b);}
.pri-row:last-child{border-bottom:none;}
.pri-ck{width:28px;height:28px;min-width:28px;border-radius:6px;border:1px solid var(--b2);background:transparent;cursor:pointer;font-size:14px;color:var(--t3);-webkit-tap-highlight-color:transparent;display:flex;align-items:center;justify-content:center;margin-top:1px;}
.pri-ck:active{opacity:.6;}
.pri-ck.done{background:var(--gd);border-color:var(--gold);color:var(--gold);}
.pri-txt{font-size:13px;color:var(--t2);line-height:1.5;}
.pri-sets{font-family:var(--mono);font-size:10px;color:var(--t3);margin-top:2px;}

/* ── PT NOTES ── */
.pt-entry{background:var(--bg3);border:1px solid var(--b);border-radius:12px;padding:14px 16px;margin-bottom:10px;}
.pt-entry-meta{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.pt-entry-date{font-family:var(--mono);font-size:11px;color:var(--gold);}
.pt-entry-sess{font-family:var(--mono);font-size:10px;color:var(--t3);}
.pt-entry-body{font-size:13px;color:var(--t2);line-height:1.7;}
.pt-checklist{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px;}
.pt-check-item{display:flex;align-items:center;gap:8px;padding:10px 12px;background:var(--bg4);border:1px solid var(--b);border-radius:10px;cursor:pointer;-webkit-tap-highlight-color:transparent;min-height:48px;}
.pt-check-item:active{opacity:.7;}
.pt-check-item.checked{background:var(--rd);border-color:rgba(224,122,122,.35);}
.pt-check-item.checked .pt-ci-label{color:var(--red);}
.pt-check-box{width:18px;height:18px;min-width:18px;border-radius:4px;border:1px solid var(--b2);font-size:11px;color:var(--t3);display:flex;align-items:center;justify-content:center;}
.pt-check-item.checked .pt-check-box{background:var(--rd);border-color:var(--red);color:var(--red);}
.pt-ci-label{font-family:var(--mono);font-size:11px;color:var(--t2);line-height:1.3;}

/* ── SKILL LOG ── */
.skill-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:16px;}
.skill-card{background:var(--bg2);border:1px solid var(--b);border-radius:12px;padding:16px;}
.skill-card-name{font-size:12px;font-weight:700;margin-bottom:4px;}
.skill-card-pr{font-family:var(--syne);font-size:26px;font-weight:700;color:var(--gold);}
.skill-card-unit{font-size:12px;color:var(--t3);margin-left:2px;}
.skill-card-date{font-family:var(--mono);font-size:9px;color:var(--t3);margin-top:3px;}
.skill-log-row{display:flex;align-items:center;gap:8px;padding:10px 0;border-bottom:1px solid var(--b);}
.skill-log-row:last-child{border-bottom:none;}
.skill-log-sess{font-family:var(--mono);font-size:10px;color:var(--gold);min-width:44px;}
.skill-log-date{font-family:var(--mono);font-size:10px;color:var(--t3);min-width:56px;}
.skill-log-val{font-family:var(--mono);font-size:13px;color:var(--t);min-width:56px;}
.skill-log-note{font-size:11px;color:var(--t2);flex:1;}

/* ── HISTORY ── */
.hist-item{background:var(--bg2);border:1px solid var(--b);border-radius:12px;padding:14px 16px;margin-bottom:10px;}
.hist-item-header{display:flex;align-items:center;gap:10px;margin-bottom:10px;flex-wrap:wrap;}

.hist-name{font-size:13px;font-weight:600;flex:1;}

.hist-dur{font-family:var(--mono);font-size:11px;color:var(--t2);}
.hist-lifts{display:flex;gap:6px;flex-wrap:wrap;}
.hist-lift{font-family:var(--mono);font-size:10px;color:var(--t2);background:var(--bg3);padding:4px 10px;border-radius:6px;border:1px solid var(--b);}
.hist-lift span{color:var(--gold);}
.hist-note{font-size:12px;color:var(--t2);margin-top:8px;font-style:italic;line-height:1.5;}
.hist-readiness{display:flex;gap:5px;margin-top:8px;flex-wrap:wrap;}
.hr-pill{font-family:var(--mono);font-size:9px;padding:3px 8px;border-radius:4px;}

/* ── PROGRESS ── */
.stat-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:16px;}
.stat-c{background:var(--bg2);border:1px solid var(--b);border-radius:12px;padding:14px 16px;}
.stat-l{font-family:var(--mono);font-size:9px;letter-spacing:.08em;color:var(--t3);margin-bottom:4px;}
.stat-v{font-family:var(--syne);font-size:26px;font-weight:700;color:var(--gold);}
.stat-u{font-size:12px;color:var(--t3);margin-left:2px;}
.stat-d{font-family:var(--mono);font-size:9px;color:var(--t3);margin-top:3px;}
.pr-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:16px;}
.chart-wrap{background:var(--bg2);border:1px solid var(--b);border-radius:12px;padding:14px;margin-bottom:12px;overflow:hidden;}
.chart-title{font-size:13px;font-weight:700;margin-bottom:3px;}
.chart-sub{font-family:var(--mono);font-size:9px;color:var(--t3);margin-bottom:14px;}
.ms-row{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--b);min-height:48px;}

.ms-ck{width:28px;height:28px;min-width:28px;border-radius:50%;border:1px solid var(--b2);background:transparent;cursor:pointer;font-size:14px;-webkit-tap-highlight-color:transparent;display:flex;align-items:center;justify-content:center;}

.ms-ck.done{background:var(--grd);border-color:var(--green);color:var(--green);}

.ms-wk{font-family:var(--mono);font-size:10px;color:var(--t3);}

.card-hd{padding:12px 16px;border-bottom:1px solid var(--b);display:flex;align-items:center;justify-content:space-between;}

.rest-overlay{position:fixed;bottom:calc(var(--tab-h) + var(--safe-bottom) + 12px);right:16px;background:var(--bg2);border:1px solid var(--b2);border-radius:14px;padding:16px 18px;z-index:100;min-width:170px;box-shadow:0 8px 32px rgba(80,60,40,.2);}
.rest-overlay-label{font-family:var(--mono);font-size:8px;letter-spacing:.14em;color:var(--t3);margin-bottom:4px;}
.rest-overlay-time{font-family:var(--mono);font-size:32px;font-weight:500;color:var(--gold);letter-spacing:.06em;}
.rest-overlay-ex{font-family:var(--mono);font-size:9px;color:var(--t2);margin-top:3px;max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}

.rest-overlay-fill{height:100%;background:var(--gold);border-radius:2px;transition:width .5s linear;}
.rest-overlay-actions{display:flex;gap:8px;margin-top:10px;}

/* ── EXPORT ── */
.export-btn{display:flex;align-items:center;gap:10px;padding:14px 16px;background:var(--bg3);border:1px solid var(--b2);border-radius:12px;cursor:pointer;-webkit-tap-highlight-color:transparent;font-size:13px;font-weight:600;color:var(--t2);min-height:52px;}

.rec-unit{font-size:12px;color:var(--t3);margin-left:2px;}
.rec-note{font-family:var(--mono);font-size:10px;color:var(--t2);margin-top:4px;line-height:1.5;}

.rec-conf.high{background:var(--grd);color:var(--green);}
.rec-conf.medium{background:var(--gd);color:var(--gold);}
.rec-conf.low{background:var(--bd);color:var(--blue);}
.rec-use-btn{font-family:var(--mono);font-size:10px;padding:6px 12px;border-radius:6px;border:1px solid var(--b2);background:transparent;color:var(--t2);cursor:pointer;margin-top:6px;-webkit-tap-highlight-color:transparent;min-height:36px;}
.rec-use-btn:active{background:var(--gd);border-color:var(--gold);color:var(--gold);}

/* ── SCROLLBAR (desktop only) ── */
::-webkit-scrollbar{width:3px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--b2);border-radius:2px;}

.muscle-overlay-rx{font-family:var(--mono);font-size:11px;color:rgba(245,240,232,.4);margin-bottom:20px;text-align:center;}
.muscle-overlay-body{display:flex;gap:16px;align-items:flex-start;margin-bottom:18px;}
.muscle-overlay-diagram{width:100px;height:200px;padding:4px;}
.muscle-overlay-diagram svg{display:block;width:100%;height:100%;}
.muscle-overlay-anim{width:180px;height:220px;border-radius:12px;background:rgba(245,240,232,.04);border:1px solid rgba(245,240,232,.06);overflow:hidden;}
.muscle-overlay-legend{display:flex;gap:14px;margin-bottom:14px;}
.muscle-overlay-legend-item{display:flex;align-items:center;gap:5px;font-family:var(--mono);font-size:9px;color:rgba(245,240,232,.45);}

.muscle-tag.primary{background:rgba(184,148,62,.2);color:#c9a96e;}
.muscle-tag.secondary{background:rgba(138,104,64,.1);color:rgba(180,160,130,.5);}
.muscle-overlay-cue{font-family:var(--serif);font-size:12px;font-style:italic;color:rgba(245,240,232,.35);margin-top:14px;text-align:center;max-width:280px;line-height:1.7;}
.muscle-overlay-hint{font-family:var(--mono);font-size:8px;color:rgba(245,240,232,.2);margin-top:auto;padding-top:24px;letter-spacing:.12em;}
</style>

// Render production SVG body with highlighted muscle paths
function renderMuscleSVG(mData,size,view){
  var pr=mData.p||[],sc=mData.s||[],v=view||'front';
  var isFront=v==='front';
  var lg=size>60;
  var bg=lg?'rgba(245,240,232,.06)':'rgba(200,190,175,.12)';
  var st=lg?'rgba(245,240,232,.15)':'var(--t3)';
  var pF=lg?'rgba(184,148,62,.7)':'rgba(138,104,64,.55)';
  var sF=lg?'rgba(138,104,64,.3)':'rgba(138,104,64,.18)';
  var vb=isFront?'0 0 724 1448':'724 0 724 1448';
  var outline=isFront?BODY_OUTLINE_FRONT:BODY_OUTLINE_BACK;
  var muscles=isFront?BODY_FRONT_MUSCLES:BODY_BACK_MUSCLES;
  var slugMap=SLUG_MAP[v]||{};
  var h='';
  // Body outline silhouette
  h+='<path d="'+outline+'" fill="'+bg+'" stroke="'+st+'" stroke-width="2" fill-rule="evenodd"/>';
  // Muscle overlays — resolve app names to library slugs
  function drawM(name,fill){
    var slug=slugMap[name]||name;
    var paths=muscles[slug];if(!paths)return;
    paths.forEach(function(d){h+='<path d="'+d+'" fill="'+fill+'"/>';});
  }
  sc.forEach(function(m){drawM(m,sF);});
  pr.forEach(function(m){drawM(m,pF);});
  var wr=document.createElement('div');
  wr.innerHTML='<svg viewBox="'+vb+'" xmlns="http://www.w3.org/2000/svg">'+h+'</svg>';
  return wr.firstChild;
}

// Start alternating image animation in a container element

  img.src=imgs.img0;
  img.alt='Exercise demo';
  container.appendChild(img);
  var frame=0;
  container._interval=setInterval(function(){
    frame=1-frame;

  },1200);

  if(container._interval){clearInterval(container._interval);container._interval=null;}
}

// ── DELOAD LOGIC ──────────────────────────────────────────────────────────────
function isDeloadWeek(){return STATE.week>0&&STATE.week%6===0;}
function deloadWeight(w){return Math.round(parseFloat(w)*0.55/5)*5||'';}

// ── NEXT SESSION ──────────────────────────────────────────────────────────────
function getNextLogIndex(){
  var completed=STATE.logs.filter(function(l){return l.completed;});
  if(completed.length===0)return 0;
  return Math.max.apply(null,completed.map(function(l){return l.logIndex;}))+1;
}
function getSessionForIndex(idx){return CYCLE[idx%CYCLE.length];}
function getOrCreateLog(logIndex){
  var ex=STATE.logs.filter(function(l){return l.logIndex===logIndex;})[0];
  if(ex)return ex;
  var sess=getSessionForIndex(logIndex);
  var log={logIndex:logIndex,sessionId:sess.id,date:null,completed:false,duration:0,exercises:{},note:'',ptFlags:[],ptNote:'',ptSide:{},readiness:{},isDeload:isDeloadWeek()};
  STATE.logs.push(log);saveState();return log;
}
function getExData(log,exId){
  if(!log.exercises[exId])log.exercises[exId]={sets:[],notes:''};
  return log.exercises[exId];
}

// ── RAMP CALC ─────────────────────────────────────────────────────────────────
function calcRamp(workingWeight,isDeload){
  var w=parseFloat(workingWeight)||0;
  if(isDeload)w=Math.round(w*0.55/5)*5;
  if(w<=0)return[];
  var sets=[45];
  var cur=45;
  while(cur+20<w){cur+=20;sets.push(cur);}
  sets.push(w);
  return sets;
}

var STARTING_WEIGHTS={
  rdl:95,sl_rdl:20,goblet:25,goblet_t:25,
  trap_ramp:135,trap_work:135,trap_ramp_h:135,trap_ls:135,
  db_bench:30,db_bench_f:35,
  hip_thrust:45,sl_thrust:0,
  ham_curl:40,cable_row:50,cable_row_f:60,
  lat_pull:50,pullup:0,ring_row:0,
  abduction:0,cope_plank:0,
};
var MAX_JUMP={
  trap_work:10,trap_ramp_h:10,trap_ls:10,trap_ramp:10,
  rdl:10,sl_rdl:5,goblet:5,goblet_t:5,
  hip_thrust:10,db_bench:5,db_bench_f:5,
  ham_curl:5,cable_row:5,cable_row_f:5,lat_pull:5,
};
function getWeightRecommendation(exId,isDeload){
  if(!(exId in STARTING_WEIGHTS))return null;
  var history=[];
  STATE.logs
    .filter(function(l){return l.completed&&l.exercises&&l.exercises[exId];})
    .sort(function(a,b){return b.logIndex-a.logIndex;})
    .forEach(function(l){
      var sets=(l.exercises[exId].sets||[]).filter(function(s){return s.done&&s.weight&&parseFloat(s.weight)>0;});
      if(sets.length>0){
        var maxW=Math.max.apply(null,sets.map(function(s){return parseFloat(s.weight)||0;}));
        var rpeArr=sets.filter(function(s){return s.rpe;});
        var avgRpe=rpeArr.length?rpeArr.reduce(function(a,s){return a+parseFloat(s.rpe)/rpeArr.length;},0):null;
        history.push({logIndex:l.logIndex,weight:maxW,rpe:avgRpe,deload:l.isDeload});
      }
    });
  if(history.length===0){
    var start=STARTING_WEIGHTS[exId];
    if(!start&&start!==0)return null;
    if(start===0)return null;
    var w=isDeload?Math.round(start*0.55/5)*5:start;
    return{weight:w,basis:'start',confidence:'low',note:isDeload?'Starting weight at deload (55%)':'Phase 1 starting weight — adjust if needed'};
  }
  var lastReal=history.filter(function(h){return !h.deload;})[0]||history[0];
  var base=lastReal.weight;
  var lastRpe=lastReal.rpe;
  var jump=MAX_JUMP[exId]||5;
  var suggested=base,note='',basis='last session';
  if(lastRpe){
    if(lastRpe<=6){
      suggested=base+jump;note='Last RPE '+lastRpe.toFixed(1)+' — too easy, go heavier';basis='RPE low';
    } else if(lastRpe<=7.5){
      var sameCount=history.filter(function(h){return !h.deload&&Math.abs(h.weight-base)<2.5;}).length;
      if(sameCount>=2){suggested=base+jump;note='Held '+base+'lbs for '+sameCount+' sessions at good RPE — ready to progress';basis='plateau';}
      else{suggested=base;note='Last RPE '+lastRpe.toFixed(1)+' — on target, hold weight';basis='on target';}
    } else if(lastRpe<=8.5){
      suggested=base;note='Last RPE '+lastRpe.toFixed(1)+' — solid, hold';basis='working weight';
    } else {
      suggested=Math.round(base*0.9/5)*5;note='Last RPE '+lastRpe.toFixed(1)+' — too heavy, reduce';basis='RPE high';
    }
  } else {
    var cnt=history.filter(function(h){return !h.deload;}).length;
    if(cnt>=2&&history[1]&&Math.abs(history[1].weight-base)<2.5){
      suggested=base+jump;note='Same weight 2 sessions in a row, no RPE — try adding '+jump+'lbs';basis='progression';
    } else {
      suggested=base;note='Based on last session — log RPE for smarter suggestions';basis:'no RPE';
    }
  }
  if(isDeload){
    var pre=suggested;
    suggested=Math.round(suggested*0.55/5)*5;
    note='Deload: '+pre+'lbs reduced to '+suggested+'lbs (55%)';basis='deload';
  }
  suggested=Math.round(suggested/2.5)*2.5;
  var conf=history.length>=3?'high':history.length===2?'medium':'low';
  return{weight:suggested,basis:basis,confidence:conf,note:note,sessions:history.length};
}

// ── REST TIMER ────────────────────────────────────────────────────────────────
var restTimerInterval=null,restSecs=0,restTotal=0,restExName='';
function startRestTimer(secs,exName){
  clearInterval(restTimerInterval);
  restSecs=secs;restTotal=secs;restExName=exName||'';
  renderRestOverlay();
  restTimerInterval=setInterval(function(){
    restSecs--;
    if(restSecs<=0){clearInterval(restTimerInterval);restSecs=0;}
    renderRestOverlay();
  },1000);
}
function renderRestOverlay(){
  var ov=document.getElementById('rest-timer-overlay');
  if(restSecs<=0&&!restTimerInterval){ov.style.display='none';return;}
  ov.style.display='block';
  ov.innerHTML='';
  var pct=Math.max(0,(restSecs/restTotal)*100);
  var color=restSecs<=10?'var(--red)':restSecs<=20?'var(--gold)':'var(--green)';
  ov.innerHTML='<div class="rest-overlay-label">REST TIMER</div>'
    +'<div class="rest-overlay-time" style="color:'+color+'">'+fmtTime(restSecs)+'</div>'
    +'<div class="rest-overlay-ex">'+restExName+'</div>'
    +'<div class="rest-overlay-bar"><div class="rest-overlay-fill" style="width:'+pct+'%;background:'+color+'"></div></div>'
    +'<div class="rest-overlay-actions">'
    +'<button class="btn xs gn" onclick="clearInterval(restTimerInterval);restSecs=0;renderRestOverlay()">SKIP</button>'
    +'<button class="btn xs" onclick="startRestTimer(restTotal,restExName)">RESET</button>'
    +'</div>';
}

// ── SESSION TIMER ─────────────────────────────────────────────────────────────
var timerSecs=0,timerRunning=false,timerInterval=null;
function fmtTime(s){return('0'+Math.floor(s/60)).slice(-2)+':'+('0'+(s%60)).slice(-2);}
function tickTimer(){timerSecs++;var el=document.getElementById('tdisplay');if(el)el.textContent=fmtTime(timerSecs);}
function startTimer(){if(!timerRunning){timerRunning=true;timerInterval=setInterval(tickTimer,1000);updateTimerUI();}}
function pauseTimer(){timerRunning=false;clearInterval(timerInterval);updateTimerUI();}
function resetTimer(){timerRunning=false;clearInterval(timerInterval);timerSecs=0;updateTimerUI();}
function updateTimerUI(){
  var disp=document.getElementById('tdisplay');
  if(disp)disp.textContent=fmtTime(timerSecs);
  var startBtn=document.getElementById('timer-start-btn');
  if(startBtn){
    startBtn.textContent=timerRunning?'⏸ Pause':'▶ Start';
    startBtn.className='btn pr sm';
    startBtn.onclick=timerRunning?pauseTimer:startTimer;
  }
}
function renderTimerBtns(){updateTimerUI();}

// ── DOM HELPERS ───────────────────────────────────────────────────────────────
function el(tag,props,kids){
  var e=document.createElement(tag);
  if(props)Object.keys(props).forEach(function(k){
    if(k==='cls')e.className=props[k];
    else if(k==='html')e.innerHTML=props[k];
    else if(k==='txt')e.textContent=props[k];
    else if(k.indexOf('on')===0)e[k]=props[k];
    else e.setAttribute(k,props[k]);
  });
  if(kids)kids.forEach(function(c){
    if(c==null)return;
    if(typeof c==='string'||typeof c==='number')e.appendChild(document.createTextNode(String(c)));
    else if(c instanceof Node)e.appendChild(c);
  });
  return e;
}
function div(cls,kids){
  return el('div',{cls:cls||''},kids||[]);
}
function span(cls,txt){return el('span',{cls:cls,txt:txt});}
function btn(cls,txt,cb){var b=el('button',{cls:'btn '+cls,txt:txt});b.onclick=cb;return b;}
function mk(cls,txt){return el('div',{cls:cls,txt:txt||''});}

// ── RENDER ────────────────────────────────────────────────────────────────────
function render(){
  renderTabBar();
  document.querySelectorAll('.panel').forEach(function(p){p.classList.remove('show');});
  document.getElementById('panel-'+view).classList.add('show');
  if(view==='list')renderList();
  else if(view==='session')renderSession();
  else if(view==='progress')renderProgress();
  else if(view==='skills')renderSkills();
  else if(view==='pt')renderPT();
  else if(view==='history')renderHistory();
  else if(view==='subs')renderSubsView();
}

function renderTabBar(){
  var tb=document.getElementById('tab-bar');tb.innerHTML='';
  // Hide tab bar when inside a session — use the back button to navigate
  if(view==='session'){
    tb.style.display='none';
    document.getElementById('main').style.paddingBottom='env(safe-area-inset-bottom,0px)';
    return;
  }
  tb.style.display='flex';
  document.getElementById('main').style.paddingBottom='calc(64px + env(safe-area-inset-bottom,0px))';
  var tabs=[
    {id:'list',icon:'🏋️',lbl:'Workouts'},
    {id:'progress',icon:'📈',lbl:'Progress'},
    {id:'history',icon:'🕐',lbl:'History'},
    {id:'skills',icon:'⭐',lbl:'Skills'},
    {id:'pt',icon:'🩺',lbl:'PT Notes'},
    {id:'subs',icon:'🔄',lbl:'Subs'},
  ];
  tabs.forEach(function(t){
    var item=div('tab-item'+(view===t.id?' on':''),[
      el('div',{cls:'tab-icon',txt:t.icon}),
      el('div',{cls:'tab-label',txt:t.lbl}),
    ]);
    item.onclick=function(){view=t.id;render();};
    tb.appendChild(item);
  });
}

function buildReadinessWrap(log){
  var r=log.readiness||{};
  var wrap=div('readiness-wrap',[mk('readiness-title','PRE-SESSION CHECK-IN')]);
  var grid=div('readiness-grid',[]);
  var qs=[
    {id:'sleep',lbl:'Sleep',opts:[{v:'good',l:'Good',cls:'sel-green'},{v:'ok',l:'OK',cls:'sel-gold'},{v:'bad',l:'Poor',cls:'sel-red'}]},
    {id:'soreness',lbl:'Soreness',opts:[{v:'none',l:'None',cls:'sel-green'},{v:'some',l:'Some',cls:'sel-gold'},{v:'heavy',l:'Heavy',cls:'sel-red'}]},
    {id:'stress',lbl:'Work Stress',opts:[{v:'low',l:'Low',cls:'sel-green'},{v:'med',l:'Med',cls:'sel-gold'},{v:'high',l:'High',cls:'sel-red'}]},
    {id:'motivation',lbl:'Motivation',opts:[{v:'high',l:'High',cls:'sel-green'},{v:'ok',l:'OK',cls:'sel-gold'},{v:'low',l:'Low',cls:'sel-red'}]},
  ];
  qs.forEach(function(q){
    var card=div('rq',[mk('rq-label',q.lbl)]);
    var opts=div('rq-options',[]);
    q.opts.forEach(function(opt){
      var o=el('button',{cls:'rq-opt'+(r[q.id]===opt.v?' '+opt.cls:''),txt:opt.l});
      o.onclick=function(){
        if(!log.readiness)log.readiness={};
        log.readiness[q.id]=opt.v;
        saveState();
        // Update readiness UI in place - don't wipe the whole panel
        var wrap=document.querySelector('.readiness-wrap');
        if(wrap){
          var newWrap=buildReadinessWrap(log);
          wrap.parentNode.replaceChild(newWrap,wrap);
        }
      };
      opts.appendChild(o);
    });
    card.appendChild(opts);grid.appendChild(card);
  });
  wrap.appendChild(grid);
  var res=getReadinessResult(r);
  if(Object.keys(r).length>=3){
    var resEl=mk('readiness-result',res.msg);
    resEl.className='readiness-result rr-'+res.level;
    wrap.appendChild(resEl);
  }
  return wrap;
}

function renderReadinessCheck(panel,log){
  panel.appendChild(buildReadinessWrap(log));
}

function getReadinessResult(r){
  if(!r)return{level:'ok',msg:''};
  var reds=['bad','heavy','high'].filter(function(v){return Object.values(r).indexOf(v)>=0;}).length;
  var low=Object.values(r).indexOf('low')>=0&&r.motivation==='low';
  if(reds>=3||(reds>=2&&low))return{level:'reduce',msg:'3+ red flags today. Reduce working weights 20-30%, cut accessory volume in half. You still train — just not at full load.'};
  if(reds>=2)return{level:'warn',msg:'2 red flags. Proceed but watch RPE closely. If it feels harder than usual, drop load 10-15% and add no new weight this session.'};
  return{level:'ok',msg:'Readiness looks solid. Train as programmed.'};
}

function renderExBlock(ex,log,isDeload){
  var exData=getExData(log,ex.id);
  if(exData.sets.length===0){for(var i=0;i<ex.ds;i++)exData.sets.push({weight:'',reps:'',rpe:'',notes:'',done:false});saveState();}
  var sets=exData.sets;
  var doneC=sets.filter(function(s){return s.done;}).length;
  var isOpen=openEx[ex.id+log.logIndex];
  var hasSub=!!SUBS[ex.id];
  var subOpen=subExId===ex.id+log.logIndex;
  var sc=subScenario[ex.id]||'home';
  var hasRamp=ex.ramp;

  var block=div('ex',[]);
  block.setAttribute('data-exid',ex.id);
  var info=div('',[
    div('',[el('span',{cls:'ex-n',txt:ex.n}),(isDeload&&!ex.cardio?el('span',{cls:'ex-deload',txt:' DELOAD'}):null)].filter(Boolean)),
    mk('ex-m',ex.p+' — '+ex.c.slice(0,60)+(ex.c.length>60?'...':'')),
  ]);
  var right=el('div',{cls:'ex-right'},[]);
  if(doneC>0)right.appendChild(el('span',{cls:'sl-badge '+(doneC>=sets.length?'b-green':'b-gold'),txt:doneC>=sets.length?'DONE':doneC+'/'+sets.length}));
  if(hasSub&&showSubs){var sb2=btn('sm '+(subOpen?'bl':''),subOpen?'HIDE':'ALT',function(e){
  e.stopPropagation();
  subExId=subOpen?null:ex.id+log.logIndex;
  var parent=block.parentNode;

  var trackedExs=[{id:'rdl',lbl:'Barbell RDL'},{id:'trap_work',lbl:'Trap Bar DL'},{id:'goblet',lbl:'Goblet Squat'},{id:'db_bench',lbl:'DB Bench (Push/Pull)'},{id:'db_bench_f',lbl:'DB Bench (Strength)'},{id:'hip_thrust',lbl:'Hip Thrust'}];
  ct.appendChild(el('h3',{cls:'sh',txt:'PERSONAL RECORDS'}));
  var prGrid=div('pr-grid',[]);
  trackedExs.forEach(function(ex){
    var h2=(history[ex.id]||[]).filter(function(p){return !p.deload;});
    var pr=h2.reduce(function(a,p){return Math.max(a,p.w);},0);
    var prDate=pr>0?(h2.find(function(p){return p.w===pr;})||{}).date||'':'';
    prGrid.appendChild(div('stat-c',[mk('stat-l',ex.lbl.toUpperCase()),pr>0?el('div',null,[el('div',{cls:'stat-v',html:pr+'<span style="font-size:10px;color:var(--t3)">lbs</span>'}),mk('stat-d',prDate)]):el('div',{style:'font-family:var(--mono);font-size:10px;color:var(--t3);margin-top:4px',txt:'No data yet'})]));
  });
  ct.appendChild(prGrid);
  [{id:'trap_work',lbl:'Trap Bar DL',color:'#8a6840'},{id:'rdl',lbl:'Barbell RDL',color:'#4a7fa0'},{id:'db_bench_f',lbl:'DB Bench Strength',color:'#4e8c5c'}].forEach(function(ex){
    var pts=(history[ex.id]||[]).sort(function(a,b){return a.label.localeCompare(b.label)});
    if(pts.length<2)return;
    var cw=div('chart-wrap',[mk('chart-title',ex.lbl+' — Progression'),mk('chart-sub','MAX WEIGHT PER SESSION (△ = deload)')]);
    var cvs=el('canvas',{width:'860',height:'180',style:'width:100%;height:180px'});
    cw.appendChild(cvs);ct.appendChild(cw);
    requestAnimationFrame(function(){drawChart(cvs,pts.map(function(p){return p.w;}),pts.map(function(p){return p.label;}),ex.color,pts.map(function(p){return p.deload;}));});
  });
  ct.appendChild(el('h3',{cls:'sh',txt:'PHASE 1 MILESTONES'}));
  var msCd=div('card-bd',[]);
  ['Block 1','Block 2','Block 3','Exit'].forEach(function(phase){
    msCd.appendChild(el('div',{style:'font-family:var(--mono);font-size:7px;letter-spacing:.14em;color:var(--gold);padding:10px 0 6px;border-bottom:1px solid var(--b)',txt:phase.toUpperCase()}));
    MILESTONES.filter(function(m){return m.phase===phase;}).forEach(function(m){
      var done=STATE.milestones[m.id];
      var ck=el('button',{cls:'ms-ck'+(done?' done':''),txt:done?'✓':''});
      ck.onclick=function(){STATE.milestones[m.id]=!done;saveState();render();};
      msCd.appendChild(div('ms-row',[ck,el('div',{cls:'ms-txt',html:'<strong>'+m.t+'</strong>'}),mk('ms-wk',m.wk)]));
    });
  });
  ct.appendChild(div('card',[div('card-hd',[mk('card-ht','CHECKPOINTS')]),msCd]));
  panel.appendChild(ct);
}

  var panel=document.getElementById('panel-subs');panel.innerHTML='';
  panel.appendChild(div('wl-header',[mk('wl-eye','PHASE 1 · REFERENCE'),el('div',{cls:'wl-title',html:'Equipment <em>Substitutions</em>'}),mk('wl-desc','All swaps filtered for Phase 1 restrictions.')]));
  var ct=div('ct',[ct]);

    tabWrap.querySelectorAll('.sub-tab').forEach(function(t,i){t.className='sub-tab'+(['home','taken','outdoor'][i]===globalSubSc?' on':'');});

      var sub=SUBS[id];var alts=sub[globalSubSc]||[];
      var card=div('card',[div('card-hd',[mk('card-ht',sub.n),el('span',{cls:'sl-badge b-gold',txt:globalSubSc.toUpperCase()})]),div('card-bd',alts.length===0?[el('div',{style:'font-family:var(--mono);font-size:9px;color:var(--t3)',txt:'Use closest available movement.'})]:alts.map(function(a){return div('sub-c',[mk('sub-name','→ '+a.n),mk('sub-note',a.note)]);}))]);
      card.style.marginBottom='8px';listC.appendChild(card);
    });
  }
  renderSubList();panel.appendChild(ct);

// ── CHART HELPER ──────────────────────────────────────────────────────────────
function drawChart(cvs,vals,labels,color,deloadFlags){
  var ctx=cvs.getContext('2d'),W=860,H=180,PL=44,PR=16,PT=10,PB=28;
  var minV=Math.min.apply(null,vals)*0.95,maxV=Math.max.apply(null,vals)*1.04;
  var xS=(W-PL-PR)/(vals.length-1||1);
  var yP=function(v){return H-PB-(H-PT-PB)*(v-minV)/(maxV-minV||1);};
  ctx.clearRect(0,0,W,H);
  ctx.strokeStyle='rgba(80,60,40,0.06)';ctx.lineWidth=1;
  for(var i=0;i<=4;i++){var yy=PT+(H-PT-PB)*i/4;ctx.beginPath();ctx.moveTo(PL,yy);ctx.lineTo(W-PR,yy);ctx.stroke();}
  ctx.fillStyle='#a89d92';ctx.font='9px DM Mono';ctx.textAlign='right';
  for(var j=0;j<=4;j++){var v2=maxV-(maxV-minV)*j/4;ctx.fillText(Math.round(v2),PL-4,PT+(H-PT-PB)*j/4+3);}
  ctx.textAlign='center';
  labels.forEach(function(l,i){if(i%Math.ceil(labels.length/8)===0||i===labels.length-1)ctx.fillText(l,PL+i*xS,H-4);});
  ctx.strokeStyle=color;ctx.lineWidth=2;ctx.lineJoin='round';ctx.beginPath();
  vals.forEach(function(v,i){var x=PL+i*xS;i===0?ctx.moveTo(x,yP(v)):ctx.lineTo(x,yP(v));});ctx.stroke();
  vals.forEach(function(v,i){
    var x=PL+i*xS,y=yP(v),isDeload=deloadFlags&&deloadFlags[i];
    ctx.fillStyle=isDeload?'#a98cd4':color;
    if(isDeload){ctx.beginPath();ctx.moveTo(x,y-5);ctx.lineTo(x+4,y+3);ctx.lineTo(x-4,y+3);ctx.closePath();ctx.fill();}
    else{ctx.beginPath();ctx.arc(x,y,3,0,2*Math.PI);ctx.fill();}
  });
}

// ── EXPORT ────────────────────────────────────────────────────────────────────
function exportCSV(){
  var rows=[['Session','Date','Day','Duration (min)','Exercise','Set','Weight (lbs)','Reps','RPE','Notes','Deload']];
  STATE.logs.filter(function(l){return l.completed;}).forEach(function(log){
    var sess=getSessionForIndex(log.logIndex);
    var dur=Math.floor((log.duration||0)/60);
    if(!log.exercises||Object.keys(log.exercises).length===0){rows.push([log.logIndex+1,log.date||'',sess.name,dur,'','','','','','',log.isDeload?'Y':'N']);}
    else{
      Object.keys(log.exercises).forEach(function(eid){
        var ed=log.exercises[eid];
        (ed.sets||[]).forEach(function(s,i){
          rows.push([log.logIndex+1,log.date||'',sess.name,dur,eid,i+1,s.weight||'',s.reps||'',s.rpe||'',s.notes||'',log.isDeload?'Y':'N']);
        });
      });
    }
  });
  var csv=rows.map(function(r){return r.map(function(c){return'"'+String(c).replace(/"/g,'""')+'"';}).join(',');}).join('\n');
  var blob=new Blob([csv],{type:'text/csv'});var url=URL.createObjectURL(blob);
  var a=document.createElement('a');a.href=url;a.download='phase1_training_log.csv';a.click();URL.revokeObjectURL(url);
}

function exportPTSummary(){
  var lines=['PHASE 1 TRAINING — PT SUMMARY','Generated: '+new Date().toLocaleDateString(),'','=== FLAGGED ITEMS (ALL TIME) ==='];
  var flagCounts={};
  STATE.logs.forEach(function(log){(log.ptFlags||[]).forEach(function(f){flagCounts[f]=(flagCounts[f]||0)+1;});});
  Object.keys(flagCounts).sort(function(a,b){return flagCounts[b]-flagCounts[a];}).forEach(function(f){lines.push('  '+flagCounts[f]+'× '+f);});
  lines.push('','=== SESSION NOTES ===');
  STATE.logs.filter(function(l){return l.completed&&((l.ptFlags&&l.ptFlags.length>0)||l.ptNote);}).sort(function(a,b){return a.logIndex-b.logIndex;}).forEach(function(log){
    var sess=getSessionForIndex(log.logIndex);
    lines.push('\nSession '+(log.logIndex+1)+' ('+log.date+') — '+sess.name);
    if(log.ptFlags&&log.ptFlags.length>0)lines.push('Flags: '+(log.ptFlags.join(', ')));
    if(log.ptNote)lines.push('Notes: '+log.ptNote);
  });
  var blob=new Blob([lines.join('\n')],{type:'text/plain'});var url=URL.createObjectURL(blob);
  var a=document.createElement('a');a.href=url;a.download='pt_summary.txt';a.click();URL.revokeObjectURL(url);
}
