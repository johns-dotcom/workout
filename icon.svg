<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#111111"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c9a84c"/>
      <stop offset="100%" stop-color="#8a6840"/>
    </linearGradient>
    <linearGradient id="steel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e0e0e0"/>
      <stop offset="100%" stop-color="#a0a0a0"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- Dumbbell rotated 45 degrees -->
  <g transform="translate(256,256) rotate(-45) translate(-256,-256)">
    <!-- Bar -->
    <rect x="156" y="248" width="200" height="16" rx="8" fill="url(#steel)"/>
    <!-- Left weight stack -->
    <rect x="96" y="206" width="60" height="100" rx="10" fill="url(#gold)"/>
    <rect x="112" y="218" width="28" height="76" rx="4" fill="rgba(0,0,0,0.15)"/>
    <rect x="72" y="220" width="32" height="72" rx="8" fill="url(#gold)"/>
    <rect x="82" y="230" width="12" height="52" rx="3" fill="rgba(0,0,0,0.15)"/>
    <!-- Right weight stack -->
    <rect x="356" y="206" width="60" height="100" rx="10" fill="url(#gold)"/>
    <rect x="372" y="218" width="28" height="76" rx="4" fill="rgba(0,0,0,0.15)"/>
    <rect x="408" y="220" width="32" height="72" rx="8" fill="url(#gold)"/>
    <rect x="418" y="230" width="12" height="52" rx="3" fill="rgba(0,0,0,0.15)"/>
  </g>
</svg>
