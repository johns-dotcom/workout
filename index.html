// ─── GENERATION ──────────────────────────────────────────────────────────────
function startGen(){
  var idx=(DB.sessions.length?Math.max.apply(null,DB.sessions.map(function(s){return s.idx||0;}))+1:1);
  var sess={idx:idx,mode:UI.mode,timeOfDay:UI.time,twoday:UI.twoday,timestamp:Date.now(),date:null,completed:false,readiness:{},log:{},ptFlags:[],ptNote:'',note:'',data:null,xp_earned:0,_full:null};
  ACTIVE=sess;OPEN_EX={};SWAP_OPEN={};SWAP_DATA={};msShown={};
  resetTimer();VIEW='session';
  // Store stub in DB now so session appears in history
  DB.sessions.push({idx:idx,mode:UI.mode,timeOfDay:UI.time,timestamp:sess.timestamp,completed:false,exercises:[],xp_earned:0,_full:sess});
  saveDB();
  renderLoading();
  genSession(UI.mode,UI.time).then(function(data){
    ACTIVE.data=data;
    (data.blocks||[]).forEach(function(b){
      (b.exercises||[]).forEach(function(ex){
        if(!ACTIVE.log[ex.id]){
          ACTIVE.log[ex.id]={sets:[]};
          for(var i=0;i<ex.sets;i++)ACTIVE.log[ex.id].sets.push({weight:'',reps:'',rpe:'',notes:'',done:false});
        }
      });

}

// ─── EXERCISE BLOCK ───────────────────────────────────────────────────────────
function buildExBlock(ex,sess,isDeload){
  var exData=sess.log[ex.id]||(sess.log[ex.id]={sets:[]});
  if(exData.sets.length===0){for(var i=0;i<ex.sets;i++)exData.sets.push({weight:'',reps:'',rpe:'',notes:'',done:false});}
  var sets=exData.sets;
  var doneC=sets.filter(function(s){return s.done;}).length;
  var isComplete=doneC>=sets.length&&sets.length>0;
  var isOpen=OPEN_EX[ex.id];
  var swapOpen=SWAP_OPEN[ex.id];
  var block=div('ex'+(isComplete?' done':''));

  // Muscle thumbnail
  var thumb=div('ex-mus');
  thumb.appendChild(buildMuscleSVG(ex.muscles_primary,ex.muscles_secondary,ex.body_view,30));
  thumb.onclick=function(e){e.stopPropagation();showMO(ex);};

  var info=div('');info.style.cssText='flex:1;min-width:0;';
  info.appendChild(el('div','ex-nm',ex.name));
  info.appendChild(el('div','ex-meta',ex.prescription+' · '+Math.round((ex.rest_sec||60)/60)+' min rest'));

  var rt=div('ex-r');
  if(doneC>0)rt.appendChild(el('span','bdg '+(isComplete?'b-gn':'b-gold'),isComplete?'DONE':doneC+'/'+sets.length));
  rt.appendChild(el('span','ex-chev',isOpen?'▲':'▼'));

  var hd=div('ex-head');hd.appendChild(thumb);hd.appendChild(info);hd.appendChild(rt);
  hd.onclick=function(){OPEN_EX[ex.id]=!isOpen;var par=block.parentNode;if(par)par.replaceChild(buildExBlock(ex,sess,isDeload),block);};
  block.appendChild(hd);

  // Swap panel
  if(swapOpen)block.appendChild(buildSwapPanel(ex,sess,isDeload,block));

  if(isOpen){
    var body=div('ex-body');

    // Cues
    if(ex.cues){var cu=el('div','co bl','');cu.style.margin='10px 0 8px';cu.appendChild(el('b','','Cues: '));cu.appendChild(document.createTextNode(ex.cues));body.appendChild(cu);}

    // Swap + block buttons
    var actRow=div('');actRow.style.cssText='display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px;';
    var swapBt=btn('xs cy',swapOpen?'✕ Cancel':'↺ Swap',function(){SWAP_OPEN[ex.id]=!SWAP_OPEN[ex.id];var par=block.parentNode;if(par)par.replaceChild(buildExBlock(ex,sess,isDeload),block);});
    actRow.appendChild(swapBt);
    var isBlocked=DB.blocklist.some(function(b){return b.name.toLowerCase()===ex.name.toLowerCase();});
    if(!isBlocked){
      actRow.appendChild(btn('xs rd','⊘ Block',function(){
        var reason=prompt('Block "'+ex.name+'" — reason? (optional)');
        DB.blocklist.push({name:ex.name,reason:reason||'athlete preference'});saveDB();
        SWAP_OPEN[ex.id]=true;var par=block.parentNode;if(par)par.replaceChild(buildExBlock(ex,sess,isDeload),block);
      }));
    } else actRow.appendChild(el('span','bdg b-rd','BLOCKLISTED'));
    body.appendChild(actRow);

    // Ramp calc
    if(ex.name.match(/deadlift|squat|bench|thrust|rdl/i)){
      var rw=div('ramp-wrap');rw.appendChild(el('div','ramp-lb','Warm-up ramp'));
      var ri=inp('ramp-in','Working wt',RAMP_IN[ex.id]||'');
      var rsd=div('ramp-sets');
      ri.oninput=function(){RAMP_IN[ex.id]=ri.value;renderRampSets(rsd,ex.id,isDeload);};
      rw.appendChild(ri);rw.appendChild(rsd);renderRampSets(rsd,ex.id,isDeload);body.appendChild(rw);
    }

    // Weight rec
    if(!ex.is_cardio){
      var rec=getWeightRec(ex.name,DB,isDeload);
      if(rec){
        var recW=div('rec-wrap');
        var recIc = el('div','rec-ic','◎');
        recW.appendChild(recIc);
        var rb=div('rec-body');
        rb.appendChild(el('div','rec-lb','Suggested weight'));
        var rn=div('');rn.innerHTML='<span class="rec-wt">'+rec.weight+'</span><span class="rec-u"> lbs</span>';rb.appendChild(rn);
        rb.appendChild(el('div','rec-note',rec.note));
        rb.appendChild(el('div','rec-conf '+rec.conf,rec.conf));
        var useBtn=el('button','rec-use-btn','Fill sets');
        useBtn.onclick=function(){body.querySelectorAll('.si').forEach(function(i){if(i.placeholder==='lbs'&&!i.value){i.value=rec.weight;i.dispatchEvent(new Event('input'));}});};
        rb.appendChild(useBtn);recW.appendChild(rb);body.appendChild(recW);
      }
    }

    // Set table
    var sh=div('set-hd');
    ['#',ex.is_cardio?'DUR':'WGT','REPS',ex.is_cardio?'':'RPE','NOTES','✓'].forEach(function(l){sh.appendChild(el('div','',l));});
    body.appendChild(sh);

    sets.forEach(function(set,i){
      var row=div('set-row');
      row.appendChild(el('div','sn',i+1));
      var wi=inp('si',ex.is_cardio?'min':'lbs',set.weight||'');
      wi.oninput=function(){sets[i].weight=wi.value;};row.appendChild(wi);
      var ri2=inp('si',ex.reps_target||'reps',set.reps||'');
      ri2.oninput=function(){sets[i].reps=ri2.value;};row.appendChild(ri2);
      if(!ex.is_cardio){
        var rpe=document.createElement('select');rpe.className='sr';
        [['','—'],[5,'5'],[6,'6'],[6.5,'6.5'],[7,'7'],[7.5,'7.5'],[8,'8'],[8.5,'8.5'],[9,'9'],[10,'10']].forEach(function(opt){
          var o=document.createElement('option');o.value=opt[0];o.textContent=opt[1];
          if(String(set.rpe)===String(opt[0]))o.selected=true;rpe.appendChild(o);
        });
        rpe.onchange=function(){sets[i].rpe=rpe.value;};row.appendChild(rpe);
      } else row.appendChild(div(''));
      var ni=inp('si','notes',set.notes||'');ni.oninput=function(){sets[i].notes=ni.value;};row.appendChild(ni);
      var ck=el('button','ck'+(set.done?' done':''),set.done?'✓':'');
      ck.onclick=function(){
        sets[i].done=!set.done;
        if(sets[i].done&&ex.rest_sec&&!ex.is_cardio)startRest(ex.rest_sec,ex.name);
        ck.className='ck'+(sets[i].done?' done':'');ck.textContent=sets[i].done?'✓':'';
        var dNow=sets.filter(function(s){return s.done;}).length;
        var badge=rt.querySelector('.bdg');
        if(dNow>0){
          if(!badge){badge=el('span','bdg b-gold','');rt.insertBefore(badge,rt.firstChild);}
          badge.className='bdg '+(dNow>=sets.length?'b-gn':'b-gold');
          badge.textContent=dNow>=sets.length?'DONE':dNow+'/'+sets.length;
          if(dNow>=sets.length){block.className='ex done';}
        }
        var xpEl=document.getElementById('xp-panel');
        if(xpEl)xpEl.parentNode.replaceChild(buildXPPanel(sess),xpEl);
      };
      row.appendChild(ck);body.appendChild(row);
    });

    var addBtn=el('button','add-set','+ Add set');
    addBtn.onclick=function(){exData.sets.push({weight:'',reps:'',rpe:'',notes:'',done:false});var par=block.parentNode;if(par)par.replaceChild(buildExBlock(ex,sess,isDeload),block);};
    body.appendChild(addBtn);
    var notes=ta('ex-notes','Form notes...',exData.notes||'');
    notes.oninput=function(){exData.notes=notes.value;};body.appendChild(notes);
    block.appendChild(body);
  }
  return block;
}

// ─── SWAP PANEL ───────────────────────────────────────────────────────────────
function buildSwapPanel(ex,sess,isDeload,block){
  var panel=div('swap-panel');
  var hd=div('swap-hd');hd.appendChild(el('div','swap-title','Swap: '+ex.name));panel.appendChild(hd);
  var reasons=div('');reasons.style.cssText='display:flex;flex-wrap:wrap;gap:5px;padding:10px 13px;border-bottom:1px solid var(--b);';
  var selReason=SWAP_DATA[ex.id+'_reason']||'';
  ['Shoulder pain','No equipment','Already done it','Too heavy','Want variation'].forEach(function(r){
    var rb=el('button','btn xs '+(selReason===r?'cy':''),r);
    rb.onclick=function(){
      SWAP_DATA[ex.id+'_reason']=r;SWAP_DATA[ex.id]=null;SWAP_LOADING[ex.id]=true;
      var par=block.parentNode;if(par)par.replaceChild(buildExBlock(ex,sess,isDeload),block);
      getSwaps(ex,r).then(function(d){
        SWAP_DATA[ex.id]=d;SWAP_LOADING[ex.id]=false;
        var par2=block.parentNode;if(par2)par2.replaceChild(buildExBlock(ex,sess,isDeload),block);
      }).catch(function(){
        SWAP_LOADING[ex.id]=false;SWAP_DATA[ex.id]={error:true};
        var par2=block.parentNode;if(par2)par2.replaceChild(buildExBlock(ex,sess,isDeload),block);
      });
    };
    reasons.appendChild(rb);
  });
  panel.appendChild(reasons);
  if(SWAP_LOADING[ex.id]){
    var sl=div('swap-loading');
    var sdots=div('dots');for(var i=0;i<3;i++)sdots.appendChild(el('div','dot',''));sl.appendChild(sdots);
    sl.appendChild(el('div','load-lbl','Finding alternatives'));panel.appendChild(sl);
  } else if(SWAP_DATA[ex.id]&&SWAP_DATA[ex.id].error){
    var err=el('div','co rd','Failed. Try again.');err.style.margin='10px 13px';panel.appendChild(err);
  } else if(SWAP_DATA[ex.id]&&SWAP_DATA[ex.id].alternatives){
    SWAP_DATA[ex.id].alternatives.forEach(function(alt){
      var row=div('swap-alt');
      row.appendChild(el('div','swap-alt-nm',alt.name));
      row.appendChild(el('div','swap-alt-note',alt.prescription+' · '+alt.cues));
      row.appendChild(el('div','swap-alt-why','→ '+alt.why));
      row.onclick=function(){
        (sess.data.blocks||[]).forEach(function(b){
          b.exercises=b.exercises.map(function(e){
            if(e.id!==ex.id)return e;
            return{id:ex.id,name:alt.name,prescription:alt.prescription,cues:alt.cues,sets:ex.sets,reps_target:ex.reps_target,rest_sec:ex.rest_sec,is_cardio:ex.is_cardio,muscles_primary:alt.muscles_primary||ex.muscles_primary,muscles_secondary:alt.muscles_secondary||ex.muscles_secondary,body_view:alt.body_view||ex.body_view};
          });
        });
        SWAP_OPEN[ex.id]=false;SWAP_DATA[ex.id]=null;renderSession();
      };
      panel.appendChild(row);
    });
  } else {
    var hint=el('div','','Select reason above to get alternatives');
    hint.style.cssText='padding:12px 13px;font-family:var(--mono);font-size:10px;color:var(--t3);';

// ─── OVERVIEW ─────────────────────────────────────────────────────────────────
function buildAttributesCard(){
  var attrs = computeAllAttributes(DB);
  var order = ['STR','AGI','END','POW','FOC','DEX'];
  var card = div('attr-card');

  var hdr = div('attr-card-hdr');
  hdr.appendChild(el('div','attr-card-title','◆ Attributes'));
  // Average
  var avg = Math.round(order.reduce(function(a,k){return a+attrs[k].score;},0)/6);
  var sub = el('div','attr-card-sub','Overall ');
  var avgSpan = el('span','',avg);avgSpan.style.color='var(--ac)';avgSpan.style.fontWeight='500';
  sub.appendChild(avgSpan);
  hdr.appendChild(sub);
  card.appendChild(hdr);

  var wrap = div('attr-radar-wrap');

  // SVG radar
  var svgNS = 'http://www.w3.org/2000/svg';
  var svg = document.createElementNS(svgNS,'svg');
  svg.setAttribute('class','attr-radar-svg');
  svg.setAttribute('viewBox','0 0 200 200');
  var cx=100, cy=100, maxR=68;

  // Background rings at 25/50/75/100
  [0.25, 0.5, 0.75, 1].forEach(function(scale){
    var pts = [];
    for(var i=0;i<6;i++){
      var angle = (-Math.PI/2) + (i * Math.PI/3);
      var r = maxR * scale;
      var x = cx + r*Math.cos(angle);
      var y = cy + r*Math.sin(angle);
      pts.push(x+','+y);
    }
    var poly = document.createElementNS(svgNS,'polygon');
    poly.setAttribute('points', pts.join(' '));
    poly.setAttribute('class','attr-radar-bg');
    svg.appendChild(poly);
  });

  // Axes
  for(var i=0;i<6;i++){
    var angle = (-Math.PI/2) + (i * Math.PI/3);
    var x2 = cx + maxR*Math.cos(angle);
    var y2 = cy + maxR*Math.sin(angle);
    var line = document.createElementNS(svgNS,'line');
    line.setAttribute('x1',cx);line.setAttribute('y1',cy);
    line.setAttribute('x2',x2);line.setAttribute('y2',y2);
    line.setAttribute('class','attr-radar-axis');
    svg.appendChild(line);
  }

  // Data shape
  var dataPts = [];
  order.forEach(function(k,i){
    var angle = (-Math.PI/2) + (i * Math.PI/3);
    var v = attrs[k].score / 100;
    var r = maxR * v;
    var x = cx + r*Math.cos(angle);
    var y = cy + r*Math.sin(angle);
    dataPts.push({x:x, y:y, angle:angle});
  });
  var shape = document.createElementNS(svgNS,'polygon');
  shape.setAttribute('points', dataPts.map(function(p){return p.x+','+p.y;}).join(' '));
  shape.setAttribute('class','attr-radar-shape');
  svg.appendChild(shape);

  // Points
  dataPts.forEach(function(p){
    var circ = document.createElementNS(svgNS,'circle');
    circ.setAttribute('cx',p.x);circ.setAttribute('cy',p.y);
    circ.setAttribute('r',2.5);
    circ.setAttribute('class','attr-radar-point');
    svg.appendChild(circ);
  });

  // Labels
  order.forEach(function(k,i){
    var angle = (-Math.PI/2) + (i * Math.PI/3);
    var lr = maxR + 14;
    var x = cx + lr*Math.cos(angle);
    var y = cy + lr*Math.sin(angle);
    var text = document.createElementNS(svgNS,'text');
    text.setAttribute('x',x);text.setAttribute('y',y);
    text.setAttribute('class','attr-radar-label');
    text.textContent = k;
    svg.appendChild(text);
  });

  wrap.appendChild(svg);

  // Attribute list with bars on right
  var list = div('attr-list');
  order.forEach(function(k){
    var row = div('attr-row');
    row.appendChild(el('div','attr-row-lb',k));
    var bar = div('attr-row-bar');
    var fill = div('attr-row-bar-fill');fill.style.width = attrs[k].score+'%';
    bar.appendChild(fill);row.appendChild(bar);
    row.appendChild(el('div','attr-row-val',attrs[k].score));
    row.onclick = function(){
      // Show detail below
      var prev = card.querySelector('.attr-detail');
      if(prev) prev.remove();
      card.appendChild(buildAttrDetail(k, attrs[k]));
    };
    list.appendChild(row);
  });
  wrap.appendChild(list);
  card.appendChild(wrap);

  return card;
}

function calcStreak(){
  var completed=DB.sessions.filter(function(s){return s.completed&&s.date;}).sort(function(a,b){return (b.timestamp||0)-(a.timestamp||0);});
  if(!completed.length)return 0;
  var streak=1;
  for(var i=1;i<completed.length;i++){
    var diff=((completed[i-1].timestamp||0)-(completed[i].timestamp||0))/86400000;
    if(diff<=1.5)streak++;else break;
  }
  return streak;
}

function renderExDetail(){
  var p=document.getElementById('p-ex-detail');p.innerHTML='';
  if(!EX_DETAIL){VIEW='overview';render();return;}

  // Collect all instances of this exercise across all sessions
  var history=[];
  DB.sessions.forEach(function(s){
    if(!s.completed)return;
    (s.exercises||[]).forEach(function(ex){
      if(ex.name.toLowerCase()===EX_DETAIL){
        var doneSets=(ex.sets||[]).filter(function(st){return st.done&&st.weight;});
        if(doneSets.length===0)return;
        var maxW=Math.max.apply(null,doneSets.map(function(st){return parseFloat(st.weight)||0;}));

        history.push({
          idx:s.idx,date:s.date,timestamp:s.timestamp||0,
          maxWeight:maxW,topReps:parseFloat(topSet.reps)||0,topRpe:topSet.rpe||'',
          totalSets:doneSets.length,totalVol:totalVol,
          allSets:doneSets.map(function(st){return{w:parseFloat(st.weight)||0,r:parseFloat(st.reps)||0,rpe:st.rpe||''};})

function renderPRI(){
  var p=document.getElementById('p-pri');p.innerHTML='';
  var today=new Date().toISOString().slice(0,10);
  var stored=null;try{stored=JSON.parse(localStorage.getItem('pri_today')||'null');}catch(e){}
  var fresh=stored&&stored.date===today;
  var data=fresh?stored.data:null;
  var checked=fresh?(stored.checked||{}):{};

  var strip=div('app-strip');
  strip.appendChild(el('div','app-strip-txt','DAILY · PRI ROUTINE'));
  p.appendChild(strip);

  var hdr=div('pg-hdr');
  hdr.appendChild(el('div','pg-eye',today));
  var t=el('div','pg-title','');t.textContent=data&&data.focus?data.focus:'PRI Tonight';
  hdr.appendChild(t);
  p.appendChild(hdr);

  var ct=div('ct');

  if(!data){
    ct.appendChild(el('div','co','No routine for today yet. Generate one — it\'ll cache locally and only regenerate when the date rolls over or you tap Regenerate.'));
    var gen=el('button','btn pr','Generate today\'s PRI');
    gen.style.cssText='width:100%;';
    gen.onclick=async function(){
      gen.disabled=true;gen.textContent='Generating…';
      try{await requestPRI();renderPRI();}
      catch(e){alert('Failed: '+(e&&e.message||e));gen.disabled=false;gen.textContent='Generate today\'s PRI';}
    };
    ct.appendChild(gen);
  }else{
    if(data.note){
      ct.appendChild(el('div','co',data.note));
    }
    var card=div('card');
    var ph=div('card-hd');
    ph.appendChild(el('div','card-ht','Today'));
    ph.appendChild(el('div','card-hs',(data.duration_min||12)+' MIN'));
    card.appendChild(ph);
    var pb=div('card-bd');
    (data.items||[]).forEach(function(item,i){
      var row=div('pri-row');
      var ck=el('button','pri-ck'+(checked[i]?' on':''),checked[i]?'✓':'');
      ck.onclick=function(){
        checked[i]=!checked[i];
        var s={};try{s=JSON.parse(localStorage.getItem('pri_today')||'{}');}catch(e){}
        s.checked=checked;
        try{localStorage.setItem('pri_today',JSON.stringify(s));}catch(e){}
        ck.className='pri-ck'+(checked[i]?' on':'');
        ck.textContent=checked[i]?'✓':'';
      };
      row.appendChild(ck);
      var ri=div('');
      var nm=el('div','',item.name);nm.style.cssText='font-family:var(--sans);font-size:13px;font-weight:600;';
      ri.appendChild(nm);
      if(item.prescription){
        var pr=el('div','',item.prescription);pr.style.cssText='font-family:var(--mono);font-size:9px;color:var(--t3);margin-top:2px;letter-spacing:.05em;';
        ri.appendChild(pr);
      }
      if(item.cues){
        var cu=el('div','',item.cues);cu.style.cssText='font-size:11px;color:var(--t2);margin-top:4px;line-height:1.45;';
        ri.appendChild(cu);
      }
      row.appendChild(ri);
      pb.appendChild(row);
    });
    card.appendChild(pb);
    ct.appendChild(card);

    var regen=el('button','btn sm','↻ Regenerate today\'s routine');
    regen.style.cssText='width:100%;margin-top:14px;';
    regen.onclick=async function(){
      regen.disabled=true;regen.textContent='Regenerating…';
      try{await requestPRI();renderPRI();}
      catch(e){alert('Failed: '+(e&&e.message||e));regen.disabled=false;regen.textContent='↻ Regenerate today\'s routine';}
    };
    ct.appendChild(regen);
  }

  p.appendChild(ct);
}

// ─── SKILLS ──────────────────────────────────────────────────────────────────
function renderSkills(){
  var p=document.getElementById('p-skills');p.innerHTML='';
  var strip = div('app-strip');
  strip.appendChild(el('div','app-strip-txt','RITUAL · PERSONAL TRAINING OS'));
  p.appendChild(strip);

  var hdr=div('pg-hdr');
  hdr.appendChild(el('div','pg-eye','Skills'));
  var t=el('div','pg-title','');t.textContent='Skill Tree';hdr.appendChild(t);
  hdr.appendChild(el('div','pg-sub','Unlock milestones across each training discipline as you progress.'));
  p.appendChild(hdr);

  var ct=div('ct');

  // Aggregate stats across all trees
  var allNodes = [];
  Object.keys(SKILL_TREES).forEach(function(k){
    SKILL_TREES[k].nodes.forEach(function(n){
      allNodes.push({node:n, tree:k, status:effectiveSkillStatus(n, SKILL_TREES[k].nodes, DB)});
    });
  });
  var totalUnlocked = allNodes.filter(function(n){return n.status==='unlocked';}).length;
  var totalInProgress = allNodes.filter(function(n){return n.status==='in_progress';}).length;
  var totalLocked = allNodes.filter(function(n){return n.status==='locked';}).length;

  // Top stats
  var stats = div('sk-stats');
  [
    {l:'UNLOCKED',v:totalUnlocked,d:'of '+allNodes.length,cls:'un'},
    {l:'IN PROGRESS',v:totalInProgress,d:'',cls:'ip'},
    {l:'LOCKED',v:totalLocked,d:'',cls:'lk'}
  ].forEach(function(s){
    var c=div('sk-stat');
    c.appendChild(el('div','sk-stat-l',s.l));
    c.appendChild(el('div','sk-stat-v '+s.cls,s.v));
    if(s.d) c.appendChild(el('div','sk-stat-d',s.d));
    stats.appendChild(c);
  });
  ct.appendChild(stats);

  // Tree selector tabs
  var tabs = div('sk-tabs');
  Object.keys(SKILL_TREES).forEach(function(k){
    var tree = SKILL_TREES[k];
    var tab = div('sk-tab'+(SKILL_TREE_SEL===k?' on':''));
    tab.textContent = tree.name;
    tab.onclick = function(){SKILL_TREE_SEL=k;renderSkills();};
    tabs.appendChild(tab);
  });
  ct.appendChild(tabs);

  // Legend
  var legend = div('sk-legend');
  [
    {l:'Unlocked',cls:'un'},
    {l:'In progress',cls:'ip'},
    {l:'Locked',cls:'lk'}
  ].forEach(function(item){
    var li = div('sk-legend-itm');
    var dot = div('sk-legend-dot '+item.cls);
    li.appendChild(dot);
    li.appendChild(document.createTextNode(item.l));
    legend.appendChild(li);
  });
  ct.appendChild(legend);

  // Active tree
  var tree = SKILL_TREES[SKILL_TREE_SEL];
  var nodes = tree.nodes;

  // Compute node statuses
  var statuses = {};
  nodes.forEach(function(n){
    statuses[n.id] = effectiveSkillStatus(n, nodes, DB);
  });

  // Canvas dimensions — tree grid is ~6 wide by N tall
  var maxX = nodes.reduce(function(m,n){return Math.max(m,n.x);},0);
  var maxY = nodes.reduce(function(m,n){return Math.max(m,n.y);},0);
  var colWidth = 90;
  var rowHeight = 90;
  var nodeR = 24;
  var padX = 40;
  var padY = 30;
  var svgW = (maxX+1)*colWidth + padX*2;
  var svgH = (maxY+1)*rowHeight + padY*2;

  // Build SVG
  var canvas = div('sk-canvas');
  var svgNS = 'http://www.w3.org/2000/svg';
  var svg = document.createElementNS(svgNS, 'svg');
  svg.setAttribute('class','sk-svg');
  svg.setAttribute('viewBox','0 0 '+svgW+' '+svgH);
  svg.setAttribute('width',svgW);
  svg.setAttribute('height',svgH);

  function nodePos(n){
    return {
      cx: padX + n.x * colWidth + colWidth/2,
      cy: padY + n.y * rowHeight + nodeR + 4
    };
  }

  // Draw links first (behind nodes)
  nodes.forEach(function(n){
    var np = nodePos(n);
    (n.prereqs||[]).forEach(function(pid){
      var pre = nodes.find(function(x){return x.id===pid;});
      if(!pre) return;
      var pp = nodePos(pre);
      var line = document.createElementNS(svgNS,'line');
      line.setAttribute('x1',pp.cx);
      line.setAttribute('y1',pp.cy);
      line.setAttribute('x2',np.cx);
      line.setAttribute('y2',np.cy);
      var active = statuses[pre.id]==='unlocked' && (statuses[n.id]==='unlocked' || statuses[n.id]==='in_progress');
      line.setAttribute('class','sk-link'+(active?' active':''));
      svg.appendChild(line);
    });
  });

  // Draw nodes
  nodes.forEach(function(n,i){
    var np = nodePos(n);
    var st = statuses[n.id];
    var g = document.createElementNS(svgNS,'g');
    g.setAttribute('class','sk-node-g');

    var circle = document.createElementNS(svgNS,'circle');
    circle.setAttribute('cx',np.cx);
    circle.setAttribute('cy',np.cy);
    circle.setAttribute('r',nodeR);
    circle.setAttribute('class','sk-node '+st);
    g.appendChild(circle);

    var ic = document.createElementNS(svgNS,'text');
    ic.setAttribute('x',np.cx);
    ic.setAttribute('y',np.cy);
    ic.setAttribute('class','sk-node-ic '+st);
    ic.textContent = st==='unlocked' ? '✓' : st==='in_progress' ? '●' : '🔒';
    if(st==='locked') ic.setAttribute('font-size','11');
    g.appendChild(ic);

    var label = document.createElementNS(svgNS,'text');
    label.setAttribute('x',np.cx);
    label.setAttribute('y',np.cy + nodeR + 14);
    label.setAttribute('class','sk-node-label '+st);
    label.textContent = n.name;
    g.appendChild(label);

    g.onclick = function(){
      // Show detail below
      var prevDetail = ct.querySelector('.sk-detail');
      if(prevDetail) prevDetail.remove();
      ct.appendChild(buildSkillDetail(n, st, nodes));
    };

    svg.appendChild(g);
  });

  canvas.appendChild(svg);
  ct.appendChild(canvas);

  // Hint
  var hint = el('div','target-hint','Tap any node for details. Skills unlock as you log matching exercises.');
  hint.style.textAlign='center';
  hint.style.marginBottom='12px';
  ct.appendChild(hint);

  p.appendChild(ct);
}

function buildSkillDetail(n, status, allNodes){
  var d = div('sk-detail');
  var top = div('sk-detail-top');
  top.appendChild(el('div','sk-detail-nm',n.name));
  var statusLabel = {unlocked:'Unlocked',in_progress:'In progress',locked:'Locked'}[status];
  var statusClass = {unlocked:'b-bl',in_progress:'b-gold',locked:'b-gold'}[status];
  if(status==='locked') statusClass='b-gold';
  var bdg = el('span','bdg '+(status==='unlocked'?'b-bl':status==='in_progress'?'b-gold':'b-gold'),statusLabel);
  bdg.style.opacity = status==='locked' ? '0.5' : '1';
  top.appendChild(bdg);
  d.appendChild(top);

  // Body: prereqs + criterion
  var body = div('sk-detail-body');
  var prereqMet = prereqsSatisfied(n, allNodes, DB);
  if(n.prereqs && n.prereqs.length>0){
    var prereqNames = n.prereqs.map(function(pid){
      var pre = allNodes.find(function(x){return x.id===pid;});
      return pre ? pre.name : pid;
    }).join(', ');
    body.appendChild(document.createTextNode('Prereqs: '+prereqNames+(prereqMet?' ✓':' (not met)')));
  } else {
    body.appendChild(document.createTextNode('No prereqs. Start anytime.'));
  }
  d.appendChild(body);

  // Criterion + current progress
  var crit = n.crit;
  var matching = 0;
  var bestWt = 0;
  (DB.sessions||[]).forEach(function(s){
    if(!s.completed) return;
    var rx = new RegExp(crit.pattern,'i');
    var exRx = crit.exclude ? new RegExp(crit.exclude,'i') : null;
    (s.exercises||[]).forEach(function(ex){
      if(!rx.test(ex.name)) return;
      if(exRx && exRx.test(ex.name)) return;
      (ex.sets||[]).forEach(function(st){
        if(!st.done) return;
        matching++;
        var w = parseFloat(st.weight)||0;
        if(w > bestWt) bestWt = w;
      });
    });
  });

  var critText = 'Log '+(crit.minSets||1)+' sets of matching exercises';
  if(crit.minWeight) critText += ' at '+crit.minWeight+'lb+';
  var progressText = 'Progress: '+matching+' / '+(crit.minSets||1)+' sets';
  if(crit.minWeight) progressText += ' · '+bestWt+'lb / '+crit.minWeight+'lb best';

  var critDiv = div('sk-detail-crit');
  critDiv.innerHTML = '<b>Criterion:</b> '+critText+'<br><b>Progress:</b> '+progressText;
  d.appendChild(critDiv);

  return d;
}

// ─── EXPORT ──────────────────────────────────────────────────────────────────
function exportCSV(){
  if(!ACTIVE||!ACTIVE.data)return;
  var rows=[['Session','Date','Mode','Exercise','Set','Weight','Reps','RPE','Notes','Done']];
  var sess=ACTIVE;
  (sess.data.blocks||[]).forEach(function(b){(b.exercises||[]).forEach(function(ex){
    var lg=sess.log[ex.id];(lg&&lg.sets||[]).forEach(function(s,i){
      rows.push([sess.idx,sess.date||'',sess.mode,ex.name,i+1,s.weight||'',s.reps||'',s.rpe||'',s.notes||'',s.done?'Y':'N']);
    });
  });});
  downloadCSV(rows,'session_'+sess.idx+'.csv');
}

function exportAll(){
  var rows=[['Session','Date','Mode','TimeOfDay','Exercise','Set','Weight','Reps','RPE','Done','XP Earned']];
  DB.sessions.filter(function(s){return s.completed;}).forEach(function(s){
    (s.exercises||[]).forEach(function(ex){
      (ex.sets||[]).forEach(function(set,i){
        rows.push([s.idx,s.date||'',s.mode,s.timeOfDay,ex.name,i+1,set.weight||'',set.reps||'',set.rpe||'',set.done?'Y':'N',s.xp_earned||0]);
      });
    });
  });
  downloadCSV(rows,'trainer_all_sessions.csv');
}

function downloadCSV(rows,filename){
  var csv=rows.map(function(r){return r.map(function(c){return'"'+String(c).replace(/"/g,'""')+'"';}).join(',');}).join('\n');
  var blob=new Blob([csv],{type:'text/csv'});var url=URL.createObjectURL(blob);
  var a=document.createElement('a');a.href=url;a.download=filename;a.click();URL.revokeObjectURL(url);
}
