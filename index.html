<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Phase 1">
<meta name="theme-color" content="#0d1117">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.png">
<title>Phase 1 Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=DM+Mono:wght@300;400;500&family=Lora:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0d1117;--bg2:#161b24;--bg3:#1c2333;--bg4:#222d3f;--bg5:#28354a;
  --b:rgba(148,180,220,0.08);--b2:rgba(148,180,220,0.14);--b3:rgba(148,180,220,0.22);
  --t:#cdd8e8;--t2:#7a8fa8;--t3:#435060;
  --gold:#60a8d4;--gd:rgba(96,168,212,0.14);--gdx:rgba(96,168,212,0.06);
  --red:#e07a7a;--rd:rgba(224,122,122,0.12);
  --blue:#56b6c2;--bd:rgba(86,182,194,0.12);
  --green:#7ec896;--grd:rgba(126,200,150,0.12);
  --purple:#a98cd4;--pd:rgba(169,140,212,0.12);
  --syne:'Syne',sans-serif;--mono:'DM Mono',monospace;--serif:'Lora',serif;
}
html,body{height:100%;background:var(--bg);color:var(--t);font-family:var(--syne);}
.app{display:flex;height:100vh;overflow:hidden;}
.sb{width:200px;min-width:200px;background:var(--bg2);border-right:1px solid var(--b);display:flex;flex-direction:column;overflow:hidden;}
.sb-logo{padding:18px 14px 14px;border-bottom:1px solid var(--b);}
.sb-eye{font-family:var(--mono);font-size:7px;letter-spacing:.2em;color:var(--gold);margin-bottom:5px;}
.sb-title{font-size:15px;font-weight:700;line-height:1.2;}
.sb-sub{font-family:var(--mono);font-size:7px;color:var(--t3);letter-spacing:.1em;margin-top:3px;}
.sb-scroll{flex:1;overflow-y:auto;padding:6px 0;}
.sb-sec{padding:10px 0 2px;}
.sb-lbl{padding:0 12px 4px;font-family:var(--mono);font-size:7px;letter-spacing:.16em;color:var(--t3);}
.sb-item{display:flex;align-items:center;gap:7px;padding:7px 12px;cursor:pointer;font-size:11px;font-weight:600;color:var(--t2);transition:all .12s;border-left:2px solid transparent;}
.sb-item:hover{color:var(--t);background:var(--bg3);}
.sb-item.on{color:var(--gold);background:var(--bg3);border-left-color:var(--gold);}
.sb-wk{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;border-top:1px solid var(--b);}
.sb-wk-lbl{font-family:var(--mono);font-size:7px;color:var(--t3);letter-spacing:.1em;}
.wk-ctrl{display:flex;align-items:center;gap:4px;}
.wk-btn{width:18px;height:18px;border-radius:3px;border:1px solid var(--b2);background:transparent;color:var(--t2);cursor:pointer;font-size:10px;display:flex;align-items:center;justify-content:center;}
.wk-btn:hover{background:var(--bg4);color:var(--t);}
.wk-num{font-family:var(--mono);font-size:11px;color:var(--gold);min-width:32px;text-align:center;}
.sb-foot{padding:8px 12px;border-top:1px solid var(--b);font-family:var(--mono);font-size:7px;color:var(--t3);line-height:1.7;}
.main{flex:1;overflow-y:auto;}
.panel{display:none;}.panel.show{display:block;}

/* LIST */
.wl-header{background:var(--bg2);border-bottom:1px solid var(--b);padding:24px 28px 18px;}
.wl-eye{font-family:var(--mono);font-size:8px;letter-spacing:.18em;color:var(--gold);margin-bottom:7px;}
.wl-title{font-size:24px;font-weight:700;letter-spacing:-.01em;line-height:1.1;}
.wl-title em{font-family:var(--serif);font-style:italic;font-weight:400;color:var(--gold);}
.wl-desc{font-family:var(--mono);font-size:10px;color:var(--t2);margin-top:7px;line-height:1.7;}
.wl-body{padding:20px 28px;}
.wl-next{background:var(--gd);border:1px solid rgba(200,169,110,.25);border-radius:8px;padding:16px 18px;margin-bottom:20px;cursor:pointer;transition:all .15s;}
.wl-next:hover{background:rgba(200,169,110,.2);}
.wl-next-eye{font-family:var(--mono);font-size:7px;letter-spacing:.18em;color:var(--gold);margin-bottom:5px;}
.wl-next-name{font-size:14px;font-weight:700;}
.wl-next-meta{font-family:var(--mono);font-size:9px;color:var(--t2);margin-top:4px;}
.wl-next-arrow{font-size:16px;color:var(--gold);margin-top:8px;}

/* DELOAD BANNER */
.deload-banner{background:rgba(154,122,196,0.1);border:1px solid rgba(154,122,196,0.3);border-radius:8px;padding:14px 16px;margin-bottom:16px;}
.deload-banner-eye{font-family:var(--mono);font-size:7px;letter-spacing:.18em;color:var(--purple);margin-bottom:4px;}
.deload-banner-title{font-size:13px;font-weight:700;color:var(--t);margin-bottom:4px;}
.deload-banner-desc{font-family:var(--mono);font-size:9px;color:var(--t2);line-height:1.6;}

.session-list{display:flex;flex-direction:column;gap:6px;}
.sl-item{background:var(--bg2);border:1px solid var(--b);border-radius:7px;padding:12px 16px;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:12px;}
.sl-item:hover{border-color:var(--b2);background:var(--bg3);}
.sl-item.done{opacity:.5;}
.sl-item.next-up{border-color:rgba(200,169,110,.3);}
.sl-num{font-family:var(--mono);font-size:10px;color:var(--t3);min-width:22px;}
.sl-info{flex:1;}
.sl-name{font-size:12px;font-weight:600;line-height:1.3;}
.sl-meta{font-family:var(--mono);font-size:9px;color:var(--t3);margin-top:2px;}
.sl-right{display:flex;flex-direction:column;align-items:flex-end;gap:3px;}
.sl-badge{font-family:var(--mono);font-size:7px;padding:2px 6px;border-radius:2px;}
.b-gold{background:var(--gd);color:var(--gold);}
.b-green{background:var(--grd);color:var(--green);}
.b-blue{background:var(--bd);color:var(--blue);}
.b-red{background:var(--rd);color:var(--red);}
.b-purple{background:var(--pd);color:var(--purple);}
.sl-date{font-family:var(--mono);font-size:8px;color:var(--t3);}

/* SESSION */
.ph{background:var(--bg2);border-bottom:1px solid var(--b);padding:20px 28px 16px;}
.ph-top{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.ph-back{font-family:var(--mono);font-size:9px;color:var(--t3);cursor:pointer;padding:4px 8px;border:1px solid var(--b);border-radius:3px;transition:all .12s;}
.ph-back:hover{color:var(--t);border-color:var(--b2);}
.ph-seq{font-family:var(--mono);font-size:8px;color:var(--t3);letter-spacing:.1em;}
.ph-deload{font-family:var(--mono);font-size:7px;color:var(--purple);background:var(--pd);border:1px solid rgba(154,122,196,.3);padding:3px 8px;border-radius:3px;margin-left:auto;}
.ph-eye{font-family:var(--mono);font-size:8px;letter-spacing:.18em;color:var(--gold);margin-bottom:6px;}
.ph-title{font-size:22px;font-weight:700;letter-spacing:-.01em;line-height:1.1;}
.ph-title em{font-family:var(--serif);font-style:italic;font-weight:400;color:var(--gold);}
.ph-desc{font-family:var(--mono);font-size:10px;color:var(--t2);margin-top:6px;max-width:560px;line-height:1.7;}

/* READINESS CHECK */
.readiness-wrap{background:var(--bg2);border-bottom:1px solid var(--b);padding:14px 28px;}
.readiness-title{font-family:var(--mono);font-size:8px;letter-spacing:.14em;color:var(--t3);margin-bottom:10px;}
.readiness-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;}
.rq{background:var(--bg3);border:1px solid var(--b);border-radius:6px;padding:10px 12px;}
.rq-label{font-family:var(--mono);font-size:8px;color:var(--t3);margin-bottom:6px;}
.rq-options{display:flex;gap:3px;}
.rq-opt{flex:1;padding:4px 2px;font-family:var(--mono);font-size:8px;border:1px solid var(--b);border-radius:3px;background:transparent;color:var(--t3);cursor:pointer;text-align:center;transition:all .12s;}
.rq-opt:hover{border-color:var(--b2);color:var(--t2);}
.rq-opt.sel-green{background:var(--grd);border-color:var(--green);color:var(--green);}
.rq-opt.sel-gold{background:var(--gd);border-color:var(--gold);color:var(--gold);}
.rq-opt.sel-red{background:var(--rd);border-color:var(--red);color:var(--red);}
.readiness-result{margin-top:8px;font-family:var(--mono);font-size:9px;line-height:1.6;padding:8px 10px;border-radius:4px;}
.rr-ok{background:var(--grd);color:var(--green);}
.rr-warn{background:var(--gd);color:var(--gold);}
.rr-reduce{background:var(--rd);color:var(--red);}

/* TBAR */
.tbar{background:var(--bg3);border-bottom:1px solid var(--b);padding:9px 28px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
.tdisplay{font-family:var(--mono);font-size:20px;font-weight:500;color:var(--gold);letter-spacing:.08em;min-width:60px;}
.tlabel{font-family:var(--mono);font-size:7px;color:var(--t3);letter-spacing:.12em;margin-bottom:1px;}
.ct{padding:20px 28px;max-width:960px;}

/* REST TIMER OVERLAY */
.rest-overlay{position:fixed;bottom:24px;right:24px;background:var(--bg2);border:1px solid var(--b2);border-radius:10px;padding:14px 18px;z-index:100;min-width:160px;box-shadow:0 8px 32px rgba(0,0,0,.6);}
.rest-overlay-label{font-family:var(--mono);font-size:7px;letter-spacing:.14em;color:var(--t3);margin-bottom:4px;}
.rest-overlay-time{font-family:var(--mono);font-size:28px;font-weight:500;color:var(--gold);letter-spacing:.06em;}
.rest-overlay-ex{font-family:var(--mono);font-size:8px;color:var(--t2);margin-top:3px;max-width:140px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.rest-overlay-bar{height:3px;background:var(--bg4);border-radius:2px;margin-top:8px;overflow:hidden;}
.rest-overlay-fill{height:100%;background:var(--gold);border-radius:2px;transition:width .5s linear;}
.rest-overlay-actions{display:flex;gap:6px;margin-top:8px;}

/* BUTTONS */
.btn{font-family:var(--syne);font-size:10px;font-weight:600;letter-spacing:.05em;padding:6px 12px;border-radius:4px;border:1px solid var(--b2);background:transparent;color:var(--t2);cursor:pointer;transition:all .12s;}
.btn:hover{background:var(--bg4);color:var(--t);}
.btn.pr{background:var(--gold);color:var(--bg);border-color:var(--gold);}
.btn.pr:hover{filter:brightness(1.1);}
.btn.gn{border-color:var(--green);color:var(--green);}
.btn.gn:hover{background:var(--grd);}
.btn.bl{border-color:var(--blue);color:var(--blue);}
.btn.bl:hover{background:var(--bd);}
.btn.pu{border-color:var(--purple);color:var(--purple);}
.btn.pu:hover{background:var(--pd);}
.btn.sm{padding:3px 9px;font-size:9px;}
.btn.xs{padding:2px 7px;font-size:8px;}

/* CALLOUT */
.co{border-left:2px solid var(--gold);padding:9px 13px;background:var(--gdx);border-radius:0 5px 5px 0;margin-bottom:10px;font-size:11px;color:var(--t2);line-height:1.7;}
.co strong{color:var(--t);}
.co.gn{border-color:var(--green);background:var(--grd);}
.co.bl{border-color:var(--blue);background:var(--bd);}
.co.rd{border-color:var(--red);background:var(--rd);}
.co.pu{border-color:var(--purple);background:var(--pd);}

/* RAMP CALC */
.ramp-wrap{background:var(--bg3);border:1px solid var(--b);border-radius:6px;padding:10px 12px;margin-top:8px;}
.ramp-label{font-family:var(--mono);font-size:7px;letter-spacing:.12em;color:var(--t3);margin-bottom:6px;}
.ramp-input-row{display:flex;align-items:center;gap:6px;margin-bottom:8px;}
.ramp-input{background:var(--bg4);border:1px solid var(--b);border-radius:3px;padding:4px 8px;font-family:var(--mono);font-size:12px;color:var(--t);width:80px;outline:none;}
.ramp-input:focus{border-color:var(--gold);}
.ramp-sets{display:flex;gap:5px;flex-wrap:wrap;}
.ramp-set{background:var(--bg4);border:1px solid var(--b);border-radius:3px;padding:4px 9px;font-family:var(--mono);font-size:10px;color:var(--t2);}
.ramp-set.working{background:var(--gd);border-color:rgba(200,169,110,.3);color:var(--gold);}

/* BLOCKS */
.bh{display:flex;align-items:center;gap:8px;margin:18px 0 8px;}
.bh-tag{font-family:var(--mono);font-size:7px;letter-spacing:.14em;color:var(--t3);background:var(--bg3);padding:3px 7px;border-radius:2px;border:1px solid var(--b);}
.bh-name{font-size:12px;font-weight:700;}
.bh-dur{margin-left:auto;font-family:var(--mono);font-size:8px;color:var(--t3);}

/* EXERCISE */
.ex{background:var(--bg2);border:1px solid var(--b);border-radius:7px;margin-bottom:7px;overflow:hidden;}
.ex-head{padding:11px 14px;display:flex;align-items:flex-start;justify-content:space-between;cursor:pointer;transition:background .12s;gap:10px;}
.ex-head:hover{background:var(--bg3);}
.ex-n{font-size:12px;font-weight:600;line-height:1.3;}
.ex-m{font-family:var(--mono);font-size:9px;color:var(--t3);margin-top:2px;line-height:1.4;}
.ex-right{display:flex;align-items:center;gap:6px;flex-shrink:0;}
.ex-body{padding:0 14px 14px;border-top:1px solid var(--b);}

/* DELOAD BADGE ON EXERCISE */
.ex-deload{font-family:var(--mono);font-size:7px;color:var(--purple);background:var(--pd);border:1px solid rgba(154,122,196,.2);padding:1px 5px;border-radius:2px;}

/* SET TABLE */
.set-hd{display:grid;grid-template-columns:26px 78px 72px 56px 1fr 26px;gap:5px;padding:7px 0 4px;font-family:var(--mono);font-size:7px;letter-spacing:.1em;color:var(--t3);border-bottom:1px solid var(--b);}
.set-row{display:grid;grid-template-columns:26px 78px 72px 56px 1fr 26px;gap:5px;padding:6px 0;border-bottom:1px solid var(--b);align-items:center;}
.set-row:last-child{border-bottom:none;}
.sn{font-family:var(--mono);font-size:10px;color:var(--t3);text-align:center;}
.si{background:var(--bg4);border:1px solid var(--b);border-radius:3px;padding:4px 7px;font-family:var(--mono);font-size:11px;color:var(--t);width:100%;outline:none;transition:border .12s;}
.si:focus{border-color:var(--gold);}
.si::placeholder{color:var(--t3);}
.sr{background:var(--bg4);border:1px solid var(--b);border-radius:3px;padding:4px 4px;font-family:var(--mono);font-size:11px;color:var(--t);width:100%;outline:none;cursor:pointer;}
.ck{width:26px;height:26px;border-radius:3px;border:1px solid var(--b2);background:transparent;cursor:pointer;font-size:11px;color:var(--t3);transition:all .12s;}
.ck.done{background:var(--grd);border-color:var(--green);color:var(--green);}
.add-set{margin-top:8px;width:100%;padding:6px;font-family:var(--mono);font-size:8px;letter-spacing:.1em;color:var(--t3);background:transparent;border:1px dashed var(--b2);border-radius:3px;cursor:pointer;transition:all .12s;}
.add-set:hover{border-color:var(--gold);color:var(--gold);}
.snotes{width:100%;background:var(--bg4);border:1px solid var(--b);border-radius:4px;padding:8px 10px;font-family:var(--mono);font-size:10px;color:var(--t);resize:vertical;min-height:50px;outline:none;line-height:1.6;margin-top:8px;}
.snotes:focus{border-color:var(--gold);}
.snotes::placeholder{color:var(--t3);}

/* SUB PANEL */
.sub-tabs{display:flex;gap:4px;margin-bottom:10px;}
.sub-tab{padding:5px 11px;font-family:var(--mono);font-size:8px;letter-spacing:.08em;border-radius:3px;border:1px solid var(--b);background:transparent;color:var(--t2);cursor:pointer;transition:all .12s;}
.sub-tab.on{background:var(--gd);border-color:var(--gold);color:var(--gold);}
.sub-c{background:var(--bg3);border:1px solid var(--b);border-radius:5px;padding:10px 12px;margin-bottom:6px;}
.sub-name{font-size:11px;font-weight:600;color:var(--t);margin-bottom:3px;}
.sub-note{font-family:var(--mono);font-size:9px;color:var(--t2);line-height:1.5;}

/* PRI */
.pri-row{display:flex;align-items:flex-start;gap:9px;padding:8px 0;border-bottom:1px solid var(--b);}
.pri-row:last-child{border-bottom:none;}
.pri-ck{width:17px;height:17px;border-radius:3px;border:1px solid var(--b2);background:transparent;cursor:pointer;font-size:9px;color:var(--t3);flex-shrink:0;margin-top:1px;transition:all .12s;}
.pri-ck.done{background:var(--gd);border-color:var(--gold);color:var(--gold);}
.pri-txt{font-size:11px;color:var(--t2);line-height:1.5;}
.pri-sets{font-family:var(--mono);font-size:8px;color:var(--t3);margin-top:1px;}

/* PT NOTES */
.pt-entry{background:var(--bg3);border:1px solid var(--b);border-radius:6px;padding:12px 14px;margin-bottom:8px;}
.pt-entry-meta{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.pt-entry-date{font-family:var(--mono);font-size:9px;color:var(--gold);}
.pt-entry-sess{font-family:var(--mono);font-size:8px;color:var(--t3);}
.pt-entry-body{font-size:11px;color:var(--t2);line-height:1.7;}
.pt-checklist{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:10px;}
.pt-check-item{display:flex;align-items:center;gap:7px;padding:7px 10px;background:var(--bg4);border:1px solid var(--b);border-radius:4px;cursor:pointer;transition:all .12s;}
.pt-check-item.checked{background:var(--rd);border-color:rgba(196,118,106,.3);}
.pt-check-item.checked .pt-ci-label{color:var(--red);}
.pt-check-box{width:14px;height:14px;border-radius:2px;border:1px solid var(--b2);flex-shrink:0;font-size:8px;color:var(--t3);display:flex;align-items:center;justify-content:center;}
.pt-check-item.checked .pt-check-box{background:var(--rd);border-color:var(--red);color:var(--red);}
.pt-ci-label{font-family:var(--mono);font-size:9px;color:var(--t2);}
.pt-side-btns{display:flex;gap:4px;margin-bottom:8px;}
.pt-side-btn{padding:4px 10px;font-family:var(--mono);font-size:8px;border:1px solid var(--b);border-radius:3px;background:transparent;color:var(--t3);cursor:pointer;transition:all .12s;}
.pt-side-btn.on{background:var(--rd);border-color:var(--red);color:var(--red);}

/* SKILL LOG */
.skill-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px;}
.skill-card{background:var(--bg2);border:1px solid var(--b);border-radius:7px;padding:14px 16px;}
.skill-card-name{font-size:11px;font-weight:700;margin-bottom:3px;}
.skill-card-pr{font-family:var(--syne);font-size:22px;font-weight:700;color:var(--gold);}
.skill-card-unit{font-size:10px;color:var(--t3);margin-left:2px;}
.skill-card-date{font-family:var(--mono);font-size:8px;color:var(--t3);margin-top:2px;}
.skill-log-row{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--b);}
.skill-log-row:last-child{border-bottom:none;}
.skill-log-sess{font-family:var(--mono);font-size:9px;color:var(--gold);min-width:50px;}
.skill-log-date{font-family:var(--mono);font-size:9px;color:var(--t3);min-width:60px;}
.skill-log-val{font-family:var(--mono);font-size:11px;color:var(--t);min-width:60px;}
.skill-log-note{font-size:10px;color:var(--t2);flex:1;}
.skill-input-row{display:flex;gap:6px;align-items:center;margin-bottom:10px;flex-wrap:wrap;}

/* HISTORY TIMELINE */
.hist-item{background:var(--bg2);border:1px solid var(--b);border-radius:7px;padding:12px 16px;margin-bottom:8px;}
.hist-item-header{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
.hist-num{font-family:var(--mono);font-size:9px;color:var(--gold);min-width:32px;}
.hist-name{font-size:12px;font-weight:600;flex:1;}
.hist-date{font-family:var(--mono);font-size:9px;color:var(--t3);}
.hist-dur{font-family:var(--mono);font-size:9px;color:var(--t2);}
.hist-lifts{display:flex;gap:8px;flex-wrap:wrap;}
.hist-lift{font-family:var(--mono);font-size:9px;color:var(--t2);background:var(--bg3);padding:3px 8px;border-radius:3px;border:1px solid var(--b);}
.hist-lift span{color:var(--gold);}
.hist-note{font-size:10px;color:var(--t2);margin-top:6px;font-style:italic;line-height:1.5;}
.hist-readiness{display:flex;gap:4px;margin-top:6px;}
.hr-pill{font-family:var(--mono);font-size:7px;padding:2px 6px;border-radius:2px;}

/* PROGRESS */
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:16px;}
.stat-c{background:var(--bg2);border:1px solid var(--b);border-radius:6px;padding:12px 14px;}
.stat-l{font-family:var(--mono);font-size:7px;letter-spacing:.1em;color:var(--t3);margin-bottom:3px;}
.stat-v{font-family:var(--syne);font-size:22px;font-weight:700;color:var(--gold);}
.stat-u{font-size:10px;color:var(--t3);margin-left:2px;}
.stat-d{font-family:var(--mono);font-size:8px;color:var(--t3);margin-top:2px;}
.pr-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px;}
.chart-wrap{background:var(--bg2);border:1px solid var(--b);border-radius:7px;padding:14px;margin-bottom:12px;}
.chart-title{font-size:11px;font-weight:700;margin-bottom:2px;}
.chart-sub{font-family:var(--mono);font-size:8px;color:var(--t3);margin-bottom:12px;}
.ms-row{display:flex;align-items:center;gap:9px;padding:8px 0;border-bottom:1px solid var(--b);}
.ms-row:last-child{border-bottom:none;}
.ms-ck{width:19px;height:19px;border-radius:50%;border:1px solid var(--b2);background:transparent;cursor:pointer;font-size:9px;transition:all .12s;}
.ms-ck.done{background:var(--grd);border-color:var(--green);color:var(--green);}
.ms-txt{flex:1;font-size:11px;color:var(--t2);}
.ms-txt strong{color:var(--t);}
.ms-wk{font-family:var(--mono);font-size:8px;color:var(--t3);}
.card{background:var(--bg2);border:1px solid var(--b);border-radius:7px;overflow:hidden;margin-bottom:10px;}
.card-hd{padding:10px 14px;border-bottom:1px solid var(--b);display:flex;align-items:center;justify-content:space-between;}
.card-ht{font-size:11px;font-weight:700;letter-spacing:.04em;}
.card-hs{font-family:var(--mono);font-size:8px;color:var(--t3);}
.card-bd{padding:14px;}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
h3.sh{font-family:var(--mono);font-size:8px;letter-spacing:.14em;color:var(--gold);margin:18px 0 8px;}
hr{border:none;border-top:1px solid var(--b);margin:16px 0;}
::-webkit-scrollbar{width:3px;}::-webkit-scrollbar-track{background:transparent;}::-webkit-scrollbar-thumb{background:var(--b2);border-radius:2px;}

/* EXPORT */
.export-btn{display:flex;align-items:center;gap:8px;padding:10px 14px;background:var(--bg3);border:1px solid var(--b2);border-radius:6px;cursor:pointer;transition:all .12s;font-size:11px;font-weight:600;color:var(--t2);}
.export-btn:hover{background:var(--bg4);color:var(--t);}
</style>

// ── DELOAD LOGIC ──────────────────────────────────────────────────────────────
function isDeloadWeek(){return STATE.week>0&&STATE.week%6===0;}
function deloadWeight(w){return Math.round(parseFloat(w)*0.55/5)*5||'';}

// ── NEXT SESSION ──────────────────────────────────────────────────────────────
function getNextLogIndex(){
  var completed=STATE.logs.filter(function(l){return l.completed;});
  if(completed.length===0)return 0;
  return Math.max.apply(null,completed.map(function(l){return l.logIndex;}))+1;
}
function getSessionForIndex(idx){return CYCLE[idx%CYCLE.length];}
function getOrCreateLog(logIndex){
  var ex=STATE.logs.filter(function(l){return l.logIndex===logIndex;})[0];
  if(ex)return ex;
  var sess=getSessionForIndex(logIndex);
  var log={logIndex:logIndex,sessionId:sess.id,date:null,completed:false,duration:0,exercises:{},note:'',ptFlags:[],ptNote:'',ptSide:{},readiness:{},isDeload:isDeloadWeek()};
  STATE.logs.push(log);saveState();return log;
}
function getExData(log,exId){
  if(!log.exercises[exId])log.exercises[exId]={sets:[],notes:''};
  return log.exercises[exId];
}

// ── RAMP CALC ─────────────────────────────────────────────────────────────────
function calcRamp(workingWeight,isDeload){
  var w=parseFloat(workingWeight)||0;
  if(isDeload)w=Math.round(w*0.55/5)*5;
  if(w<=0)return[];
  var sets=[45];
  var cur=45;
  while(cur+20<w){cur+=20;sets.push(cur);}
  sets.push(w);
  return sets;
}

// ── REST TIMER ────────────────────────────────────────────────────────────────
var restTimerInterval=null,restSecs=0,restTotal=0,restExName='';
function startRestTimer(secs,exName){
  clearInterval(restTimerInterval);
  restSecs=secs;restTotal=secs;restExName=exName||'';
  renderRestOverlay();
  restTimerInterval=setInterval(function(){
    restSecs--;
    if(restSecs<=0){clearInterval(restTimerInterval);restSecs=0;}
    renderRestOverlay();
  },1000);
}
function renderRestOverlay(){
  var ov=document.getElementById('rest-timer-overlay');
  if(restSecs<=0&&!restTimerInterval){ov.style.display='none';return;}
  ov.style.display='block';
  ov.innerHTML='';
  var pct=Math.max(0,(restSecs/restTotal)*100);
  var color=restSecs<=10?'var(--red)':restSecs<=20?'var(--gold)':'var(--green)';
  ov.innerHTML='<div class="rest-overlay-label">REST TIMER</div>'
    +'<div class="rest-overlay-time" style="color:'+color+'">'+fmtTime(restSecs)+'</div>'
    +'<div class="rest-overlay-ex">'+restExName+'</div>'
    +'<div class="rest-overlay-bar"><div class="rest-overlay-fill" style="width:'+pct+'%;background:'+color+'"></div></div>'
    +'<div class="rest-overlay-actions">'
    +'<button class="btn xs gn" onclick="clearInterval(restTimerInterval);restSecs=0;renderRestOverlay()">SKIP</button>'
    +'<button class="btn xs" onclick="startRestTimer(restTotal,restExName)">RESET</button>'
    +'</div>';
}

function el(tag,props,kids){
  var e=document.createElement(tag);
  if(props)Object.keys(props).forEach(function(k){
    if(k==='cls')e.className=props[k];
    else if(k==='html')e.innerHTML=props[k];
    else if(k==='txt')e.textContent=props[k];
    else if(k.indexOf('on')===0)e[k]=props[k];
    else e.setAttribute(k,props[k]);
  });
  if(kids)kids.forEach(function(c){
    if(c==null)return;
    if(typeof c==='string'||typeof c==='number')e.appendChild(document.createTextNode(String(c)));
    else if(c instanceof Node)e.appendChild(c);
  });
  return e;
}
function div(cls,kids){
  return el('div',{cls:cls||''},kids||[]);
}
function span(cls,txt){return el('span',{cls:cls,txt:txt});}
function btn(cls,txt,cb){var b=el('button',{cls:'btn '+cls,txt:txt});b.onclick=cb;return b;}

    {id:'soreness',lbl:'Soreness',opts:[{v:'none',l:'None',cls:'sel-green'},{v:'some',l:'Some',cls:'sel-gold'},{v:'heavy',l:'Heavy',cls:'sel-red'}]},

  ];
  qs.forEach(function(q){

    var opts=div('rq-options',[]);
    q.opts.forEach(function(opt){
      var o=el('button',{cls:'rq-opt'+(r[q.id]===opt.v?' '+opt.cls:''),txt:opt.l});

      opts.appendChild(o);

  });
  wrap.appendChild(grid);
  var res=getReadinessResult(r);
  if(Object.keys(r).length>=3){

    wrap.appendChild(resEl);
  }

function getReadinessResult(r){
  if(!r)return{level:'ok',msg:''};
  var reds=['bad','heavy','high'].filter(function(v){return Object.values(r).indexOf(v)>=0;}).length;
  var low=Object.values(r).indexOf('low')>=0&&r.motivation==='low';
  if(reds>=3||(reds>=2&&low))return{level:'reduce',msg:'3+ red flags today. Reduce working weights 20-30%, cut accessory volume in half. You still train — just not at full load.'};
  if(reds>=2)return{level:'warn',msg:'2 red flags. Proceed but watch RPE closely. If it feels harder than usual, drop load 10-15% and add no new weight this session.'};
  return{level:'ok',msg:'Readiness looks solid. Train as programmed.'};
}

function renderProgress(){
  var panel=document.getElementById('panel-progress');panel.innerHTML='';
  panel.appendChild(div('wl-header',[mk('wl-eye','PHASE 1 · PROGRESS'),el('div',{cls:'wl-title',html:'Strength <em>Tracking</em>'}),mk('wl-desc','PRs auto-populate from logged completed sets. Charts after 2+ data points.')]));
  var ct=div('ct',[]);
  var completedLogs=STATE.logs.filter(function(l){return l.completed;});
  var msHit=Object.keys(STATE.milestones).filter(function(k){return STATE.milestones[k];}).length;
  var nextIdx=getNextLogIndex();
  ct.appendChild(div('stat-grid',[
    div('stat-c',[mk('stat-l','SESSIONS DONE'),mk('stat-v',completedLogs.length)]),
    div('stat-c',[mk('stat-l','NEXT SESSION'),mk('stat-v','#'+(nextIdx+1))]),
    div('stat-c',[mk('stat-l','WEEK'),el('div',{cls:'stat-v',html:STATE.week+'<span style="font-size:10px;color:var(--t3)">/24</span>'}),isDeloadWeek()?mk('stat-d','⚠ DELOAD WEEK'):mk('stat-d','')]),
    div('stat-c',[mk('stat-l','MILESTONES'),el('div',{cls:'stat-v',html:msHit+'<span style="font-size:10px;color:var(--t3)">/'+MILESTONES.length+'</span>'})]),
  ]));
  var history={};
  completedLogs.forEach(function(log){
    if(!log.exercises||!log.date)return;
    Object.keys(log.exercises).forEach(function(eid){
      var ed=log.exercises[eid];if(!ed.sets)return;
      var maxW=ed.sets.filter(function(s){return s.done&&s.weight;}).reduce(function(a,s){return Math.max(a,parseFloat(s.weight)||0);},0);
      if(maxW>0){if(!history[eid])history[eid]=[];history[eid].push({label:'S'+(log.logIndex+1),w:maxW,date:log.date,deload:log.isDeload});}
    });
  });
  var trackedExs=[{id:'rdl',lbl:'Barbell RDL'},{id:'trap_work',lbl:'Trap Bar DL'},{id:'goblet',lbl:'Goblet Squat'},{id:'db_bench',lbl:'DB Bench (Push/Pull)'},{id:'db_bench_f',lbl:'DB Bench (Strength)'},{id:'hip_thrust',lbl:'Hip Thrust'}];
  ct.appendChild(el('h3',{cls:'sh',txt:'PERSONAL RECORDS'}));
  var prGrid=div('pr-grid',[]);
  trackedExs.forEach(function(ex){
    var h2=(history[ex.id]||[]).filter(function(p){return !p.deload;});
    var pr=h2.reduce(function(a,p){return Math.max(a,p.w);},0);
    var prDate=pr>0?(h2.find(function(p){return p.w===pr;})||{}).date||'':'';
    prGrid.appendChild(div('stat-c',[mk('stat-l',ex.lbl.toUpperCase()),pr>0?el('div',null,[el('div',{cls:'stat-v',html:pr+'<span style="font-size:10px;color:var(--t3)">lbs</span>'}),mk('stat-d',prDate)]):el('div',{style:'font-family:var(--mono);font-size:10px;color:var(--t3);margin-top:4px',txt:'No data yet'})]));
  });
  ct.appendChild(prGrid);
  [{id:'trap_work',lbl:'Trap Bar DL',color:'#60a8d4'},{id:'rdl',lbl:'Barbell RDL',color:'#56b6c2'},{id:'db_bench_f',lbl:'DB Bench Strength',color:'#7ec896'}].forEach(function(ex){
    var pts=(history[ex.id]||[]).sort(function(a,b){return a.label.localeCompare(b.label)});
    if(pts.length<2)return;
    var cw=div('chart-wrap',[mk('chart-title',ex.lbl+' — Progression'),mk('chart-sub','MAX WEIGHT PER SESSION (△ = deload)')]);
    var cvs=el('canvas',{width:'860',height:'180',style:'width:100%;height:180px'});
    cw.appendChild(cvs);ct.appendChild(cw);
    requestAnimationFrame(function(){drawChart(cvs,pts.map(function(p){return p.w;}),pts.map(function(p){return p.label;}),ex.color,pts.map(function(p){return p.deload;}));});
  });
  ct.appendChild(el('h3',{cls:'sh',txt:'PHASE 1 MILESTONES'}));
  var msCd=div('card-bd',[]);
  ['Block 1','Block 2','Block 3','Exit'].forEach(function(phase){
    msCd.appendChild(el('div',{style:'font-family:var(--mono);font-size:7px;letter-spacing:.14em;color:var(--gold);padding:10px 0 6px;border-bottom:1px solid var(--b)',txt:phase.toUpperCase()}));
    MILESTONES.filter(function(m){return m.phase===phase;}).forEach(function(m){
      var done=STATE.milestones[m.id];
      var ck=el('button',{cls:'ms-ck'+(done?' done':''),txt:done?'✓':''});
      ck.onclick=function(){STATE.milestones[m.id]=!done;saveState();render();};
      msCd.appendChild(div('ms-row',[ck,el('div',{cls:'ms-txt',html:'<strong>'+m.t+'</strong>'}),mk('ms-wk',m.wk)]));
    });
  });
  ct.appendChild(div('card',[div('card-hd',[mk('card-ht','CHECKPOINTS')]),msCd]));
  panel.appendChild(ct);
}

function renderSubsView(){
  var panel=document.getElementById('panel-subs');panel.innerHTML='';
  panel.appendChild(div('wl-header',[mk('wl-eye','PHASE 1 · REFERENCE'),el('div',{cls:'wl-title',html:'Equipment <em>Substitutions</em>'}),mk('wl-desc','All swaps filtered for Phase 1 restrictions.')]));
  var ct=div('ct',[ct]);
  ct.appendChild(div('co',[document.createTextNode('All substitutions maintain movement pattern intent and PRI restrictions.')]));
  var tabWrap=div('sub-tabs',[]);
  ['home','taken','outdoor'].forEach(function(sc){
    var t=el('button',{cls:'sub-tab'+(globalSubSc===sc?' on':''),txt:sc==='home'?'At Home':sc==='taken'?'Machine Taken':'Outdoor'});
    t.onclick=function(){globalSubSc=sc;renderSubList();};tabWrap.appendChild(t);
  });
  ct.appendChild(tabWrap);
  var listC=div('',[]);ct.appendChild(listC);
  function renderSubList(){
    tabWrap.querySelectorAll('.sub-tab').forEach(function(t,i){t.className='sub-tab'+(['home','taken','outdoor'][i]===globalSubSc?' on':'');});
    listC.innerHTML='';
    Object.keys(SUBS).forEach(function(id){
      var sub=SUBS[id];var alts=sub[globalSubSc]||[];
      var card=div('card',[div('card-hd',[mk('card-ht',sub.n),el('span',{cls:'sl-badge b-gold',txt:globalSubSc.toUpperCase()})]),div('card-bd',alts.length===0?[el('div',{style:'font-family:var(--mono);font-size:9px;color:var(--t3)',txt:'Use closest available movement.'})]:alts.map(function(a){return div('sub-c',[mk('sub-name','→ '+a.n),mk('sub-note',a.note)]);}))]);
      card.style.marginBottom='8px';listC.appendChild(card);
    });
  }
  renderSubList();panel.appendChild(ct);
}

// ── CHART HELPER ──────────────────────────────────────────────────────────────
function drawChart(cvs,vals,labels,color,deloadFlags){
  var ctx=cvs.getContext('2d'),W=860,H=180,PL=44,PR=16,PT=10,PB=28;
  var minV=Math.min.apply(null,vals)*0.95,maxV=Math.max.apply(null,vals)*1.04;
  var xS=(W-PL-PR)/(vals.length-1||1);
  var yP=function(v){return H-PB-(H-PT-PB)*(v-minV)/(maxV-minV||1);};
  ctx.clearRect(0,0,W,H);
  ctx.strokeStyle='rgba(255,255,255,0.04)';ctx.lineWidth=1;
  for(var i=0;i<=4;i++){var yy=PT+(H-PT-PB)*i/4;ctx.beginPath();ctx.moveTo(PL,yy);ctx.lineTo(W-PR,yy);ctx.stroke();}
  ctx.fillStyle='#4a4540';ctx.font='9px DM Mono';ctx.textAlign='right';
  for(var j=0;j<=4;j++){var v2=maxV-(maxV-minV)*j/4;ctx.fillText(Math.round(v2),PL-4,PT+(H-PT-PB)*j/4+3);}
  ctx.textAlign='center';
  labels.forEach(function(l,i){if(i%Math.ceil(labels.length/8)===0||i===labels.length-1)ctx.fillText(l,PL+i*xS,H-4);});
  ctx.strokeStyle=color;ctx.lineWidth=2;ctx.lineJoin='round';ctx.beginPath();
  vals.forEach(function(v,i){var x=PL+i*xS;i===0?ctx.moveTo(x,yP(v)):ctx.lineTo(x,yP(v));});ctx.stroke();
  vals.forEach(function(v,i){
    var x=PL+i*xS,y=yP(v),isDeload=deloadFlags&&deloadFlags[i];
    ctx.fillStyle=isDeload?'#a98cd4':color;
    if(isDeload){ctx.beginPath();ctx.moveTo(x,y-5);ctx.lineTo(x+4,y+3);ctx.lineTo(x-4,y+3);ctx.closePath();ctx.fill();}
    else{ctx.beginPath();ctx.arc(x,y,3,0,2*Math.PI);ctx.fill();}
  });
}

// ── EXPORT ────────────────────────────────────────────────────────────────────
function exportCSV(){
  var rows=[['Session','Date','Day','Duration (min)','Exercise','Set','Weight (lbs)','Reps','RPE','Notes','Deload']];
  STATE.logs.filter(function(l){return l.completed;}).forEach(function(log){
    var sess=getSessionForIndex(log.logIndex);
    var dur=Math.floor((log.duration||0)/60);
    if(!log.exercises||Object.keys(log.exercises).length===0){rows.push([log.logIndex+1,log.date||'',sess.name,dur,'','','','','','',log.isDeload?'Y':'N']);}
    else{
      Object.keys(log.exercises).forEach(function(eid){
        var ed=log.exercises[eid];
        (ed.sets||[]).forEach(function(s,i){
          rows.push([log.logIndex+1,log.date||'',sess.name,dur,eid,i+1,s.weight||'',s.reps||'',s.rpe||'',s.notes||'',log.isDeload?'Y':'N']);
        });
      });
    }
  });
  var csv=rows.map(function(r){return r.map(function(c){return'"'+String(c).replace(/"/g,'""')+'"';}).join(',');}).join('\n');
  var blob=new Blob([csv],{type:'text/csv'});var url=URL.createObjectURL(blob);
  var a=document.createElement('a');a.href=url;a.download='phase1_training_log.csv';a.click();URL.revokeObjectURL(url);
}

function exportPTSummary(){
  var lines=['PHASE 1 TRAINING — PT SUMMARY','Generated: '+new Date().toLocaleDateString(),'','=== FLAGGED ITEMS (ALL TIME) ==='];
  var flagCounts={};
  STATE.logs.forEach(function(log){(log.ptFlags||[]).forEach(function(f){flagCounts[f]=(flagCounts[f]||0)+1;});});
  Object.keys(flagCounts).sort(function(a,b){return flagCounts[b]-flagCounts[a];}).forEach(function(f){lines.push('  '+flagCounts[f]+'× '+f);});
  lines.push('','=== SESSION NOTES ===');
  STATE.logs.filter(function(l){return l.completed&&((l.ptFlags&&l.ptFlags.length>0)||l.ptNote);}).sort(function(a,b){return a.logIndex-b.logIndex;}).forEach(function(log){
    var sess=getSessionForIndex(log.logIndex);
    lines.push('\nSession '+(log.logIndex+1)+' ('+log.date+') — '+sess.name);
    if(log.ptFlags&&log.ptFlags.length>0)lines.push('Flags: '+(log.ptFlags.join(', ')));
    if(log.ptNote)lines.push('Notes: '+log.ptNote);
  });
  var blob=new Blob([lines.join('\n')],{type:'text/plain'});var url=URL.createObjectURL(blob);
  var a=document.createElement('a');a.href=url;a.download='pt_summary.txt';a.click();URL.revokeObjectURL(url);
}
