<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="TRAINER">
<meta name="theme-color" content="#08080f">
<script>(function(){try{var t=localStorage.getItem('theme');if(t==='light'){document.documentElement.setAttribute('data-theme','light');var m=document.querySelector('meta[name="theme-color"]');if(m)m.setAttribute('content','#fafaf7');}}catch(e){}})();</script>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.png">
<title>TRAINER</title>
<link href="https://fonts.googleapis.com/css2?family=Spectral:ital,wght@0,400;0,500;0,600;1,400&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#050508;
  --bg2:#0a0a0f;
  --bg3:#12121a;
  --bg4:#18181f;
  --bg5:#222229;
  --b:rgba(255,255,255,0.06);
  --b2:rgba(255,255,255,0.10);
  --b3:rgba(255,255,255,0.16);
  --t:#f0f0f2;
  --t2:#8a8a94;
  --t3:#4a4a54;
  --t4:#2a2a32;
  /* Accent: electric blue (primary CTA) */
  --ac:#6a9af7;
  --ac2:#5b8ef5;
  --acd:rgba(106,154,247,0.12);
  --acdx:rgba(106,154,247,0.05);
  --acg:rgba(106,154,247,0.25);
  /* Mode colors */
  --gold:#c9943a;
  --gd:rgba(201,148,58,0.12);
  --red:#e05a4a;
  --rd:rgba(224,90,74,0.1);
  --green:#40c870;
  --grd:rgba(64,200,112,0.1);
  --purple:#9a7cdf;
  --pd:rgba(154,124,223,0.12);
  --cyan:#4bc5d9;
  --cd:rgba(75,197,217,0.1);
  --xp:var(--ac);
  --xpd:var(--acd);
  /* Fonts */
  --serif:'Spectral',Georgia,serif;
  --sans:'Inter',-apple-system,sans-serif;
  --mono:'JetBrains Mono',ui-monospace,monospace;
  --tab-h:66px;
  --safe-bottom:env(safe-area-inset-bottom,0px);
  --safe-top:env(safe-area-inset-top,0px);
}
[data-theme="light"]{
  --bg:#fafaf7;
  --bg2:#f3f3ee;
  --bg3:#ebebe5;
  --bg4:#e0e0da;
  --bg5:#d2d2cb;
  --b:rgba(0,0,0,0.08);
  --b2:rgba(0,0,0,0.14);
  --b3:rgba(0,0,0,0.22);
  --t:#0a0a0f;
  --t2:#555560;
  --t3:#8a8a94;
  --t4:#b0b0b8;
  --ac:#3d6dd9;
  --ac2:#2f5cc8;
  --acd:rgba(61,109,217,0.10);
  --acdx:rgba(61,109,217,0.04);
  --acg:rgba(61,109,217,0.22);
  --gd:rgba(201,148,58,0.14);
  --rd:rgba(224,90,74,0.12);
  --grd:rgba(64,200,112,0.14);
  --pd:rgba(154,124,223,0.14);
  --cd:rgba(75,197,217,0.14);
}
html{height:100%;overflow:hidden;}
body{
  height:100%;background:var(--bg);color:var(--t);
  font-family:var(--sans);font-size:14px;line-height:1.5;
  -webkit-text-size-adjust:100%;overflow:hidden;
  -webkit-font-smoothing:antialiased;
  font-feature-settings:'ss01','cv11';
}
button{-webkit-tap-highlight-color:transparent;font-family:var(--sans);}
input,select,textarea{-webkit-appearance:none;border-radius:0;font-family:var(--mono);}

.app{display:flex;flex-direction:column;height:100%;height:100dvh;}
.main{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding-bottom:calc(var(--tab-h) + var(--safe-bottom));}
.panel{display:none;}.panel.active{display:block;}

/* ── APP HEADER STRIP ── */
.app-strip{text-align:center;padding:max(10px,calc(var(--safe-top)+6px)) 16px 4px;}
.app-strip-txt{font-family:var(--mono);font-size:9px;letter-spacing:.24em;color:var(--t3);text-transform:uppercase;}

/* ── TAB BAR ── */
.tabs{position:fixed;bottom:0;left:0;right:0;z-index:50;background:rgba(10,10,15,0.95);-webkit-backdrop-filter:blur(20px);backdrop-filter:blur(20px);border-top:1px solid var(--b);display:flex;align-items:stretch;padding-bottom:var(--safe-bottom);height:calc(var(--tab-h) + var(--safe-bottom));}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;cursor:pointer;padding:10px 2px 8px;transition:all .15s;position:relative;}
.tab:active{opacity:.6;}
.tab-ic{font-size:18px;line-height:1;color:var(--t2);}
.tab-lb{font-family:var(--mono);font-size:8px;letter-spacing:.1em;color:var(--t3);text-transform:uppercase;}
.tab.on .tab-ic{color:var(--ac);}
.tab.on .tab-lb{color:var(--ac);}
.tab.on::before{content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);width:32px;height:1px;background:var(--ac);box-shadow:0 0 8px var(--ac);}

/* ── PAGE HEADERS ── */
.pg-hdr{padding:18px 18px 10px;}
.pg-eye{font-family:var(--mono);font-size:10px;letter-spacing:.18em;color:var(--t3);margin-bottom:8px;text-transform:uppercase;}
.pg-title{font-family:var(--serif);font-size:34px;font-weight:500;letter-spacing:-.01em;line-height:1.1;color:var(--t);}
.pg-title em{font-family:var(--serif);font-style:italic;font-weight:400;color:var(--ac);}
.pg-sub{font-family:var(--sans);font-size:13px;color:var(--t2);margin-top:8px;line-height:1.5;}

/* ── SESSION HEADER ── */
.sh{padding:max(12px,calc(var(--safe-top)+8px)) 18px 14px;}
.sh-top{display:flex;align-items:center;gap:10px;margin-bottom:14px;}
.sh-back{font-family:var(--sans);font-size:13px;font-weight:500;color:var(--t2);cursor:pointer;padding:7px 12px;border:1px solid var(--b2);border-radius:8px;min-height:36px;display:flex;align-items:center;gap:5px;}
.sh-back:active{background:var(--bg3);}
.sh-eye{font-family:var(--mono);font-size:10px;letter-spacing:.18em;color:var(--t3);margin-bottom:6px;text-transform:uppercase;}
.sh-title{font-family:var(--serif);font-size:28px;font-weight:500;letter-spacing:-.01em;line-height:1.15;}
.sh-title em{font-family:var(--serif);font-style:italic;font-weight:400;color:var(--ac);}
.sh-desc{font-family:var(--sans);font-size:13px;color:var(--t2);margin-top:8px;line-height:1.6;}

/* ── CONTENT ── */
.ct{padding:8px 18px 20px;}

/* ── BUTTONS ── */
.btn{font-family:var(--sans);font-size:13px;font-weight:500;padding:10px 16px;border-radius:10px;border:1px solid var(--b2);background:transparent;color:var(--t);cursor:pointer;min-height:42px;display:inline-flex;align-items:center;justify-content:center;gap:5px;transition:all .15s;}
.btn:active{opacity:.7;transform:scale(.98);}
.btn.pr{background:var(--ac);color:#050508;border-color:var(--ac);font-weight:600;}
.btn.gn{border-color:rgba(64,200,112,.4);color:var(--green);}
.btn.cy{border-color:rgba(75,197,217,.4);color:var(--cyan);}
.btn.rd{border-color:rgba(224,90,74,.4);color:var(--red);}
.btn.pu{border-color:rgba(154,124,223,.4);color:var(--purple);}
.btn.sm{padding:6px 11px;font-size:12px;min-height:32px;border-radius:7px;}
.btn.xs{padding:4px 9px;font-size:11px;min-height:28px;border-radius:6px;}

/* ── CALLOUTS ── */
.co{padding:12px 14px;background:var(--bg3);border-radius:10px;margin-bottom:10px;font-size:13px;color:var(--t2);line-height:1.55;border:1px solid var(--b);}
.co b{color:var(--t);font-weight:500;}
.co.gn{background:var(--grd);border-color:rgba(64,200,112,.2);color:var(--green);}
.co.bl{background:var(--acd);border-color:var(--acg);color:var(--ac);}
.co.rd{background:var(--rd);border-color:rgba(224,90,74,.2);color:var(--red);}
.co.pu{background:var(--pd);border-color:rgba(154,124,223,.2);color:var(--purple);}
.co.cy{background:var(--cd);border-color:rgba(75,197,217,.2);color:var(--cyan);}

/* ── SECTION HEADERS ── */
.sec-hdr{font-family:var(--mono);font-size:10px;letter-spacing:.18em;color:var(--t3);margin:18px 0 10px;text-transform:uppercase;}

/* ── CARDS ── */
.card{background:var(--bg2);border:1px solid var(--b);border-radius:12px;overflow:hidden;margin-bottom:10px;}
.card-hd{padding:12px 16px;border-bottom:1px solid var(--b);display:flex;align-items:center;justify-content:space-between;gap:10px;}
.card-ht{font-family:var(--sans);font-size:13px;font-weight:600;letter-spacing:-.005em;}
.card-hs{font-family:var(--mono);font-size:10px;color:var(--t3);letter-spacing:.05em;}
.card-bd{padding:16px;}

/* ── HOME: PROFILE HERO ── */
.hero{padding:4px 18px 20px;}
.hero-name{font-family:var(--serif);font-size:42px;font-weight:500;letter-spacing:-.02em;line-height:1;margin-bottom:10px;}
.hero-meta{font-family:var(--sans);font-size:13px;color:var(--t2);margin-bottom:16px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.hero-meta-sep{color:var(--t4);}
.hero-meta b{color:var(--ac);font-weight:500;}
.hero-xp-row{display:flex;align-items:center;justify-content:space-between;font-family:var(--mono);font-size:11px;color:var(--t2);margin-bottom:8px;}
.hero-xp-row b{color:var(--t);font-weight:500;}
.hero-xp-bar{height:6px;background:var(--bg3);border-radius:3px;overflow:hidden;margin-bottom:16px;position:relative;}
.hero-xp-fill{height:100%;background:linear-gradient(90deg,var(--ac2),var(--ac));border-radius:3px;transition:width .5s cubic-bezier(.34,1.56,.64,1);}
.hero-xp-fill::after{content:'';position:absolute;top:0;right:0;bottom:0;width:2px;background:var(--ac);box-shadow:0 0 8px var(--ac);}

/* Today's session card */
.today-card{background:var(--bg2);border:1px solid var(--b);border-radius:16px;padding:18px;margin:4px 18px 20px;cursor:pointer;position:relative;overflow:hidden;}
.today-card:active{transform:scale(.99);}
.today-card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--ac),transparent);opacity:.4;}
.today-eye{font-family:var(--mono);font-size:10px;letter-spacing:.18em;color:var(--ac);margin-bottom:8px;text-transform:uppercase;}
.today-title{font-family:var(--serif);font-size:28px;font-weight:500;letter-spacing:-.01em;line-height:1.1;margin-bottom:6px;}
.today-sub{font-family:var(--sans);font-size:13px;color:var(--t2);margin-bottom:14px;}
.today-meta{display:flex;align-items:center;gap:14px;font-family:var(--mono);font-size:11px;color:var(--t3);margin-bottom:16px;}
.today-meta b{color:var(--ac);font-weight:500;}
.today-cta{width:100%;padding:12px;background:var(--ac);color:#050508;border:none;border-radius:10px;font-family:var(--sans);font-size:14px;font-weight:600;cursor:pointer;min-height:46px;}
.today-cta:active{opacity:.85;}

/* Stat grid (3 across for hero) */
.stat-grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:0 18px 20px;}
.stat-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:12px;}
.stat-c{background:var(--bg2);border:1px solid var(--b);border-radius:10px;padding:12px 14px;}
.stat-l{font-family:var(--mono);font-size:9px;letter-spacing:.15em;color:var(--t3);margin-bottom:5px;text-transform:uppercase;}
.stat-v{font-family:var(--serif);font-size:26px;font-weight:500;color:var(--t);line-height:1;letter-spacing:-.01em;}
.stat-v.ac{color:var(--ac);}
.stat-u{font-family:var(--mono);font-size:10px;color:var(--t3);margin-left:3px;}
.stat-d{font-family:var(--mono);font-size:9px;color:var(--t3);margin-top:4px;}

/* ── MODE SELECTOR (2x2 grid, hex-style icons) ── */
.mode-sel{padding:4px 0;}
.mode-lbl{font-family:var(--mono);font-size:10px;letter-spacing:.18em;color:var(--t3);margin-bottom:10px;text-transform:uppercase;}
.mode-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:18px;}
.mode-card{background:var(--bg2);border:1px solid var(--b2);border-radius:11px;padding:11px 12px;cursor:pointer;position:relative;overflow:hidden;display:flex;align-items:center;gap:10px;min-height:64px;transition:all .15s;}
.mode-card:active{transform:scale(.99);}
.mode-card.on{border-color:var(--ac);background:var(--acdx);}
.mode-card.on .mode-nm{color:var(--ac);}
.mode-hex{width:36px;height:36px;flex-shrink:0;display:flex;align-items:center;justify-content:center;border:1px solid var(--b2);border-radius:9px;background:var(--bg3);}
.mode-card.on .mode-hex{border-color:var(--ac);background:var(--acd);}
.mode-hex svg{width:19px;height:19px;}
.mode-info{flex:1;min-width:0;}
.mode-tag{font-family:var(--mono);font-size:8px;letter-spacing:.14em;color:var(--t3);margin-bottom:1px;text-transform:uppercase;}
.mode-nm{font-family:var(--serif);font-size:15px;font-weight:500;line-height:1.1;letter-spacing:-.01em;color:var(--t);margin-bottom:1px;}
.mode-ds{font-family:var(--mono);font-size:9px;color:var(--t3);letter-spacing:.02em;}

/* ── TIME SELECTOR ── */
.time-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:18px;}
.time-btn{padding:12px 14px;font-family:var(--sans);border-radius:10px;border:1px solid var(--b2);background:var(--bg2);color:var(--t2);cursor:pointer;text-align:left;min-height:58px;transition:all .15s;}
.time-btn.on{border-color:var(--ac);background:var(--acdx);color:var(--ac);}
.time-btn-nm{font-family:var(--sans);font-size:13px;font-weight:600;margin-bottom:2px;}
.time-btn-ds{font-family:var(--mono);font-size:10px;color:var(--t3);letter-spacing:.02em;}
.time-btn.on .time-btn-ds{color:var(--ac);}

/* ── TARGET SELECTOR ── */
.target-lbl-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;}
.target-reset{font-family:var(--mono);font-size:10px;color:var(--ac);cursor:pointer;padding:3px 6px;border-radius:4px;opacity:.85;text-transform:uppercase;letter-spacing:.08em;}
.target-reset:active{opacity:.5;}
.target-hint{font-family:var(--sans);font-size:12px;color:var(--t3);margin-bottom:10px;line-height:1.5;}
.target-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:18px;}
.target-chip{position:relative;background:var(--bg2);border:1px solid var(--b2);border-radius:8px;padding:9px 7px;cursor:pointer;text-align:center;min-height:54px;display:flex;flex-direction:column;justify-content:center;transition:all .12s;}
.target-chip:active{opacity:.7;}
.target-chip.on{background:var(--acdx);border-color:var(--ac);}
.target-chip.on .target-chip-nm{color:var(--ac);}
.target-chip.sug{border-color:rgba(75,197,217,.3);background:var(--cd);}
.target-chip.sug .target-chip-nm{color:var(--cyan);}
.target-chip-nm{font-family:var(--sans);font-size:12px;font-weight:500;color:var(--t2);}
.target-chip-meta{font-family:var(--mono);font-size:9px;color:var(--t3);margin-top:2px;letter-spacing:.04em;}
.target-chip-star{position:absolute;top:3px;right:5px;font-size:8px;color:var(--ac);opacity:.8;}
.target-warn{font-family:var(--sans);font-size:12px;color:var(--gold);background:var(--gd);border:1px solid rgba(201,148,58,.2);padding:9px 11px;border-radius:8px;margin-bottom:10px;}

/* ── DAILY CHALLENGES ── */
.dc-wrap{margin:0 18px 18px;}
.dc-hdr{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:10px;}
.dc-hdr-l{font-family:var(--mono);font-size:10px;letter-spacing:.18em;color:var(--t3);text-transform:uppercase;}
.dc-hdr-r{font-family:var(--mono);font-size:10px;color:var(--t3);letter-spacing:.04em;}
.dc-hdr-r b{color:var(--ac);font-weight:500;}
.dc-list{display:flex;flex-direction:column;gap:6px;}
.dc-item{background:var(--bg2);border:1px solid var(--b);border-radius:10px;padding:11px 13px;display:flex;align-items:center;gap:11px;transition:all .2s;position:relative;overflow:hidden;}
.dc-item.done{background:var(--acdx);border-color:var(--acg);}
.dc-item.done::before{content:'';position:absolute;top:0;left:0;bottom:0;width:3px;background:var(--ac);}
.dc-item-ic{width:28px;height:28px;flex-shrink:0;border-radius:7px;background:var(--bg3);border:1px solid var(--b2);display:flex;align-items:center;justify-content:center;font-family:var(--sans);font-size:13px;font-weight:600;color:var(--t3);}
.dc-item.done .dc-item-ic{background:var(--ac);border-color:var(--ac);color:#050508;}
.dc-item-body{flex:1;min-width:0;}
.dc-item-title{font-family:var(--sans);font-size:13px;font-weight:500;color:var(--t);line-height:1.2;}
.dc-item.done .dc-item-title{color:var(--ac);}
.dc-item-desc{font-family:var(--mono);font-size:9px;color:var(--t3);margin-top:2px;letter-spacing:.02em;}
.dc-item-r{flex-shrink:0;text-align:right;}
.dc-item-xp{font-family:var(--mono);font-size:11px;font-weight:500;color:var(--t2);letter-spacing:.04em;}
.dc-item.done .dc-item-xp{color:var(--ac);}
.dc-item-prog{font-family:var(--mono);font-size:8px;color:var(--t3);margin-top:2px;letter-spacing:.04em;}
.intensity-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:18px;}
.intensity-btn{background:var(--bg2);border:1px solid var(--b2);border-radius:9px;padding:11px 6px;cursor:pointer;text-align:center;min-height:56px;display:flex;flex-direction:column;justify-content:center;transition:all .12s;}
.intensity-btn:active{opacity:.7;}
.intensity-btn.on{background:var(--ac);border-color:var(--ac);}
.intensity-btn.on .intensity-btn-nm{color:#050508;}
.intensity-btn.on .intensity-btn-ds{color:rgba(5,5,8,.65);}
.intensity-btn.dis{opacity:.3;cursor:not-allowed;}
.intensity-btn-nm{font-family:var(--sans);font-size:12px;font-weight:600;color:var(--t);letter-spacing:-.005em;}
.intensity-btn-ds{font-family:var(--mono);font-size:9px;color:var(--t3);margin-top:2px;letter-spacing:.04em;}

/* ── DURATION SLIDER ── */
.duration-lbl-row{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:8px;}
.duration-val{font-family:var(--serif);font-size:20px;font-weight:500;color:var(--ac);letter-spacing:-.01em;}
.duration-unit{font-family:var(--mono);font-size:10px;color:var(--t3);margin-left:4px;letter-spacing:.05em;font-weight:400;}
.duration-wrap{margin-bottom:18px;}
.duration-slider{-webkit-appearance:none;appearance:none;width:100%;height:4px;border-radius:2px;outline:none;cursor:pointer;background:linear-gradient(to right,var(--ac) 0%,var(--ac) var(--fill,50%),var(--bg4) var(--fill,50%),var(--bg4) 100%);margin-bottom:6px;padding:0;}
.duration-slider::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:20px;height:20px;border-radius:50%;background:var(--ac);cursor:pointer;border:2px solid var(--bg);box-shadow:0 0 0 1px var(--ac),0 0 8px rgba(106,154,247,.4);}
.duration-slider::-moz-range-thumb{width:20px;height:20px;border-radius:50%;background:var(--ac);cursor:pointer;border:2px solid var(--bg);box-shadow:0 0 0 1px var(--ac),0 0 8px rgba(106,154,247,.4);}
.duration-minmax{display:flex;justify-content:space-between;font-family:var(--mono);font-size:9px;color:var(--t3);letter-spacing:.05em;}

/* ── TWO-A-DAY TOGGLE ── */
.twoday-row{display:flex;align-items:center;gap:10px;padding:12px 14px;background:var(--bg2);border:1px solid var(--b);border-radius:10px;cursor:pointer;margin-bottom:14px;}
.twoday-lbl{font-family:var(--sans);font-size:13px;color:var(--t);flex:1;font-weight:500;}
.tog-track{width:42px;height:24px;border-radius:12px;position:relative;transition:background .18s;flex-shrink:0;}
.tog-dot{width:18px;height:18px;border-radius:50%;background:white;position:absolute;top:3px;transition:left .18s;box-shadow:0 2px 4px rgba(0,0,0,.3);}

/* ── GENERATE BTN ── */
.gen-btn{width:100%;padding:16px;font-family:var(--sans);font-size:15px;font-weight:600;letter-spacing:-.005em;background:var(--ac);color:#050508;border:none;border-radius:12px;cursor:pointer;min-height:54px;position:relative;overflow:hidden;}
.gen-btn:active{opacity:.85;transform:scale(.99);}
.gen-btn:disabled{opacity:.35;cursor:not-allowed;}

/* ── SESSION LIST ITEMS ── */
.sl-item{background:var(--bg2);border:1px solid var(--b);border-radius:10px;padding:12px 14px;cursor:pointer;display:flex;align-items:center;gap:12px;min-height:58px;margin-bottom:7px;transition:all .15s;}
.sl-item:active{background:var(--bg3);}
.sl-num{font-family:var(--mono);font-size:10px;color:var(--t3);min-width:26px;letter-spacing:.04em;}
.sl-info{flex:1;min-width:0;}
.sl-nm{font-family:var(--sans);font-size:14px;font-weight:500;line-height:1.3;}
.sl-meta{font-family:var(--mono);font-size:10px;color:var(--t3);margin-top:3px;letter-spacing:.02em;}

/* ── BADGES ── */
.bdg{font-family:var(--mono);font-size:9px;padding:3px 7px;border-radius:4px;letter-spacing:.08em;text-transform:uppercase;font-weight:500;}
.b-gold{background:var(--gd);color:var(--gold);}
.b-gn{background:var(--grd);color:var(--green);}
.b-bl{background:var(--acd);color:var(--ac);}
.b-rd{background:var(--rd);color:var(--red);}
.b-pu{background:var(--pd);color:var(--purple);}
.b-cy{background:var(--cd);color:var(--cyan);}
.b-xp{background:var(--acd);color:var(--ac);}

/* ── READINESS ── */
.rdy-wrap{padding:14px 18px;border-bottom:1px solid var(--b);}
.rdy-title{font-family:var(--mono);font-size:10px;letter-spacing:.15em;color:var(--t3);margin-bottom:10px;text-transform:uppercase;}
.rdy-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
.rq{background:var(--bg2);border:1px solid var(--b);border-radius:10px;padding:11px 12px;}
.rq-lb{font-family:var(--sans);font-size:11px;color:var(--t2);margin-bottom:8px;font-weight:500;}
.rq-opts{display:flex;gap:4px;}
.rq-opt{flex:1;padding:7px 4px;font-family:var(--sans);font-size:11px;font-weight:500;border:1px solid var(--b);border-radius:6px;background:transparent;color:var(--t3);cursor:pointer;text-align:center;min-height:32px;}
.rq-opt.sel-gn{background:var(--grd);border-color:rgba(64,200,112,.3);color:var(--green);}
.rq-opt.sel-gd{background:var(--gd);border-color:rgba(201,148,58,.3);color:var(--gold);}
.rq-opt.sel-rd{background:var(--rd);border-color:rgba(224,90,74,.3);color:var(--red);}
.rdy-result{margin-top:10px;font-family:var(--sans);font-size:12px;line-height:1.5;padding:9px 12px;border-radius:8px;}
.rr-ok{background:var(--grd);color:var(--green);}
.rr-warn{background:var(--gd);color:var(--gold);}
.rr-bad{background:var(--rd);color:var(--red);}

/* ── TIMER BAR ── */
.tbar{padding:10px 18px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;border-bottom:1px solid var(--b);}
.t-display{font-family:var(--mono);font-size:20px;font-weight:500;color:var(--ac);letter-spacing:.04em;min-width:66px;}
.t-label{font-family:var(--mono);font-size:8px;color:var(--t3);letter-spacing:.15em;margin-bottom:2px;text-transform:uppercase;}
.tbar-r{margin-left:auto;display:flex;gap:7px;align-items:center;flex-wrap:wrap;justify-content:flex-end;}

/* ── XP PANEL (in-session) ── */
.xp-panel{padding:14px 18px;border-bottom:1px solid var(--b);background:var(--bg2);}
.xp-lvl-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:9px;}
.xp-lvl-bdg{font-family:var(--mono);font-size:10px;font-weight:600;letter-spacing:.12em;color:var(--ac);background:var(--acd);padding:4px 10px;border-radius:4px;text-transform:uppercase;}
.xp-earned{font-family:var(--serif);font-size:18px;font-weight:500;color:var(--ac);letter-spacing:-.01em;}
.xp-session-info{font-family:var(--mono);font-size:10px;color:var(--t3);}
.xp-bar-outer{height:8px;background:var(--bg4);border-radius:4px;overflow:visible;position:relative;margin-bottom:7px;}
.xp-bar-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--ac2),var(--ac));transition:width .5s cubic-bezier(.34,1.56,.64,1);position:relative;}
.xp-bar-fill::after{content:'';position:absolute;top:0;right:0;bottom:0;width:2px;background:var(--ac);box-shadow:0 0 6px var(--ac);}
.xp-milestones{display:flex;position:relative;height:16px;}
.xp-m-marker{position:absolute;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;gap:2px;}
.xp-m-pip{width:2px;height:5px;border-radius:1px;background:var(--b2);transition:background .3s;}
.xp-m-pip.hit{background:var(--ac);}
.xp-m-label{font-family:var(--mono);font-size:8px;color:var(--t3);transition:color .3s;}
.xp-m-label.hit{color:var(--ac);}
.xp-sets-row{display:flex;align-items:center;justify-content:space-between;margin-top:5px;}
.xp-sets-lb{font-family:var(--mono);font-size:9px;color:var(--t3);letter-spacing:.1em;text-transform:uppercase;}
.xp-sets-ct{font-family:var(--mono);font-size:11px;color:var(--t2);}

/* Milestone popup */
.ms-pop{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:300;background:var(--bg2);border:1px solid var(--ac);border-radius:12px;padding:22px 30px;text-align:center;animation:popIn .3s cubic-bezier(.34,1.56,.64,1),popOut .3s ease-in 1.7s forwards;pointer-events:none;box-shadow:0 0 40px rgba(106,154,247,.15);}
@keyframes popIn{from{opacity:0;transform:translate(-50%,-50%) scale(.7);}to{opacity:1;transform:translate(-50%,-50%) scale(1);}}
@keyframes popOut{to{opacity:0;transform:translate(-50%,-50%) scale(.8);}}
.ms-pop-ic{font-size:32px;margin-bottom:7px;}
.ms-pop-title{font-family:var(--serif);font-size:18px;font-weight:500;color:var(--ac);margin-bottom:4px;}
.ms-pop-sub{font-family:var(--mono);font-size:10px;color:var(--t2);}

/* Complete banner */
.xp-complete{background:linear-gradient(135deg,rgba(106,154,247,.1),rgba(91,142,245,.04));border:1px solid var(--acg);border-radius:10px;padding:16px;margin-top:10px;text-align:center;}
.xp-complete-stars{font-size:18px;letter-spacing:6px;margin-bottom:7px;color:var(--ac);}
.xp-complete-title{font-family:var(--serif);font-size:16px;font-weight:500;color:var(--ac);margin-bottom:4px;}
.xp-complete-xp{font-family:var(--serif);font-size:32px;font-weight:500;color:var(--ac);margin:6px 0 2px;letter-spacing:-.02em;}
.xp-complete-msg{font-family:var(--sans);font-size:12px;color:var(--t2);line-height:1.5;}

/* ── BLOCK HEADER ── */
.blk-hdr{background:var(--bg2);border:1px solid var(--b);border-radius:10px;padding:10px 13px;margin:16px 0 8px;display:flex;align-items:center;gap:9px;}
.blk-tag{font-family:var(--mono);font-size:9px;letter-spacing:.12em;color:var(--ac);background:var(--acd);padding:3px 7px;border-radius:4px;text-transform:uppercase;}
.blk-nm{font-family:var(--serif);font-size:15px;font-weight:500;letter-spacing:-.005em;flex:1;}
.blk-dur{font-family:var(--mono);font-size:10px;color:var(--t3);letter-spacing:.05em;}

/* ── EXERCISE BLOCK ── */
.ex{background:var(--bg2);border:1px solid var(--b);border-radius:10px;margin-bottom:8px;overflow:hidden;transition:border-color .2s;}
.ex.done{border-color:rgba(64,200,112,.25);background:rgba(64,200,112,.02);}
.ex-head{padding:13px 14px;display:flex;align-items:flex-start;gap:11px;cursor:pointer;min-height:60px;}
.ex-head:active{background:var(--bg3);}
.ex-nm{font-family:var(--sans);font-size:14px;font-weight:500;letter-spacing:-.005em;line-height:1.3;}
.ex-meta{font-family:var(--mono);font-size:10px;color:var(--t3);margin-top:3px;letter-spacing:.02em;}
.ex-r{display:flex;align-items:center;gap:6px;flex-shrink:0;margin-left:auto;}
.ex-chev{font-family:var(--sans);font-size:11px;color:var(--t3);}
.ex-body{padding:0 14px 14px;border-top:1px solid var(--b);}

/* Muscle thumb */
.ex-mus{width:34px;height:68px;flex-shrink:0;border-radius:6px;background:var(--bg3);border:1px solid var(--b);overflow:hidden;padding:4px 2px;}
.ex-mus svg{display:block;width:100%;height:100%;}

/* ── SET TABLE ── */
.set-hd{display:grid;grid-template-columns:26px 72px 66px 54px 80px 40px;gap:5px;padding:9px 0 5px;font-family:var(--mono);font-size:9px;letter-spacing:.14em;color:var(--t3);border-bottom:1px solid var(--b);min-width:360px;text-transform:uppercase;}
.set-row{display:grid;grid-template-columns:26px 72px 66px 54px 80px 40px;gap:5px;padding:7px 0;border-bottom:1px solid var(--b);align-items:center;min-width:360px;}
.set-row:last-child{border-bottom:none;}
.sn{font-family:var(--mono);font-size:11px;color:var(--t3);text-align:center;}
.si{background:var(--bg3);border:1px solid var(--b2);border-radius:6px;padding:8px 9px;font-family:var(--mono);font-size:13px;color:var(--t);width:100%;outline:none;min-height:40px;}
.si:focus{border-color:var(--ac);}
.si::placeholder{color:var(--t3);}
.sr{background:var(--bg3);border:1px solid var(--b2);border-radius:6px;padding:8px 6px;font-family:var(--mono);font-size:12px;color:var(--t);width:100%;outline:none;cursor:pointer;min-height:40px;}
.ck{width:40px;height:40px;border-radius:7px;border:1px solid var(--b2);background:transparent;cursor:pointer;font-size:16px;color:var(--t3);display:flex;align-items:center;justify-content:center;transition:all .15s;}
.ck:active{opacity:.6;}
.ck.done{background:var(--grd);border-color:var(--green);color:var(--green);}
.add-set{margin-top:9px;width:100%;padding:11px;font-family:var(--sans);font-size:12px;color:var(--t3);background:transparent;border:1px dashed var(--b2);border-radius:8px;cursor:pointer;min-height:42px;}
.add-set:active{border-color:var(--ac);color:var(--ac);}
.ex-notes{width:100%;background:var(--bg3);border:1px solid var(--b2);border-radius:8px;padding:11px 13px;font-family:var(--sans);font-size:13px;color:var(--t);resize:none;min-height:64px;outline:none;line-height:1.5;margin-top:9px;}
.ex-notes:focus{border-color:var(--ac);}
.ex-notes::placeholder{color:var(--t3);}

/* ── RAMP ── */
.ramp-wrap{background:var(--bg3);border:1px solid var(--b);border-radius:8px;padding:11px 13px;margin-top:10px;}
.ramp-lb{font-family:var(--mono);font-size:9px;letter-spacing:.14em;color:var(--t3);margin-bottom:8px;text-transform:uppercase;}
.ramp-in{background:var(--bg4);border:1px solid var(--b2);border-radius:6px;padding:8px 11px;font-family:var(--mono);font-size:13px;color:var(--t);width:110px;outline:none;min-height:40px;}
.ramp-in:focus{border-color:var(--ac);}
.ramp-sets{display:flex;gap:5px;flex-wrap:wrap;margin-top:8px;}
.ramp-set{background:var(--bg4);border:1px solid var(--b);border-radius:5px;padding:5px 10px;font-family:var(--mono);font-size:11px;color:var(--t2);}
.ramp-set.working{background:var(--acd);border-color:var(--ac);color:var(--ac);font-weight:500;}

/* ── WEIGHT REC ── */
.rec-wrap{background:var(--bg3);border:1px solid var(--b);border-radius:8px;padding:11px 13px;margin:10px 0 4px;display:flex;align-items:flex-start;gap:10px;}
.rec-ic{font-size:16px;flex-shrink:0;margin-top:1px;}
.rec-body{flex:1;min-width:0;}
.rec-lb{font-family:var(--mono);font-size:9px;letter-spacing:.14em;color:var(--t3);margin-bottom:3px;text-transform:uppercase;}
.rec-wt{font-family:var(--serif);font-size:22px;font-weight:500;color:var(--ac);}
.rec-u{font-family:var(--mono);font-size:11px;color:var(--t3);margin-left:3px;}
.rec-note{font-family:var(--sans);font-size:11px;color:var(--t2);margin-top:4px;line-height:1.5;}
.rec-conf{font-family:var(--mono);font-size:8px;padding:2px 7px;border-radius:3px;margin-top:5px;display:inline-block;letter-spacing:.1em;text-transform:uppercase;}
.rec-conf.high{background:var(--grd);color:var(--green);}
.rec-conf.medium{background:var(--gd);color:var(--gold);}
.rec-conf.low{background:var(--cd);color:var(--cyan);}
.rec-use-btn{font-family:var(--sans);font-size:11px;padding:6px 11px;border-radius:6px;border:1px solid var(--b2);background:transparent;color:var(--t2);cursor:pointer;margin-top:6px;min-height:32px;}
.rec-use-btn:active{background:var(--acd);border-color:var(--ac);color:var(--ac);}

/* ── PT FLAGS ── */
.pt-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:10px;}
.pt-itm{display:flex;align-items:center;gap:8px;padding:9px 11px;background:var(--bg3);border:1px solid var(--b);border-radius:8px;cursor:pointer;min-height:44px;}
.pt-itm.on{background:var(--rd);border-color:rgba(224,90,74,.25);}
.pt-itm.on .pt-lb{color:var(--red);}
.pt-box{width:16px;height:16px;min-width:16px;border-radius:4px;border:1px solid var(--b2);font-size:10px;color:var(--t3);display:flex;align-items:center;justify-content:center;}
.pt-itm.on .pt-box{background:var(--rd);border-color:var(--red);color:var(--red);}
.pt-lb{font-family:var(--sans);font-size:11px;color:var(--t2);line-height:1.3;font-weight:500;}

/* ── PRI HOMEWORK ── */
.pri-row{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid var(--b);}
.pri-row:last-child{border-bottom:none;}
.pri-ck{width:24px;height:24px;min-width:24px;border-radius:5px;border:1px solid var(--b2);background:transparent;cursor:pointer;font-size:12px;color:var(--t3);display:flex;align-items:center;justify-content:center;margin-top:1px;}
.pri-ck.on{background:var(--acd);border-color:var(--ac);color:var(--ac);}

/* ── REST OVERLAY ── */
.rest-ov{position:fixed;bottom:calc(var(--tab-h) + var(--safe-bottom) + 12px);right:14px;background:var(--bg2);border:1px solid var(--b2);border-radius:12px;padding:14px 16px;z-index:100;min-width:160px;box-shadow:0 8px 32px rgba(0,0,0,.6);}
.rest-lbl{font-family:var(--mono);font-size:8px;letter-spacing:.15em;color:var(--t3);margin-bottom:4px;text-transform:uppercase;}
.rest-time{font-family:var(--mono);font-size:26px;font-weight:500;color:var(--ac);letter-spacing:.04em;}
.rest-bar{height:3px;background:var(--bg4);border-radius:2px;margin-top:9px;overflow:hidden;}
.rest-bar-fill{height:100%;background:var(--ac);border-radius:2px;transition:width .5s linear;}
.rest-acts{display:flex;gap:6px;margin-top:8px;}

/* ── MUSCLE OVERLAY ── */
.muscle-ov{position:fixed;top:0;left:0;right:0;bottom:0;z-index:200;background:rgba(5,5,8,.96);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;animation:moIn .2s ease-out;}
[data-theme="light"] .muscle-ov{background:rgba(250,250,247,.97);}
@keyframes moIn{from{opacity:0;transform:scale(.95);}to{opacity:1;transform:scale(1);}}
.mo-close{position:absolute;top:max(16px,calc(var(--safe-top)+10px));right:16px;width:38px;height:38px;border-radius:50%;border:1px solid var(--b2);background:transparent;color:var(--t2);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.mo-nm{font-family:var(--serif);font-size:22px;font-weight:500;color:var(--t);margin-bottom:3px;text-align:center;max-width:280px;line-height:1.25;letter-spacing:-.01em;}
.mo-rx{font-family:var(--mono);font-size:11px;color:var(--t3);margin-bottom:18px;text-align:center;letter-spacing:.04em;}
.mo-diag{width:clamp(170px,48vw,240px);aspect-ratio:1/2;padding:4px;max-height:55vh;}
.mo-diag svg{display:block;width:100%;height:100%;}
.mo-leg{display:flex;gap:14px;margin-bottom:12px;margin-top:6px;}
.mo-leg-itm{display:flex;align-items:center;gap:5px;font-family:var(--mono);font-size:9px;color:var(--t3);letter-spacing:.05em;}
.mo-leg-dot{width:8px;height:8px;border-radius:2px;}
.mo-muscles{display:flex;flex-wrap:wrap;gap:4px;justify-content:center;max-width:280px;margin-bottom:14px;}
.mu-tag{font-family:var(--mono);font-size:8px;padding:3px 7px;border-radius:3px;text-transform:uppercase;letter-spacing:.06em;font-weight:500;}
.mu-tag.pr{background:var(--acd);color:var(--ac);}
.mu-tag.sc{background:var(--bg3);color:var(--t3);}
.mo-cue{font-family:var(--serif);font-size:13px;color:var(--t2);text-align:center;max-width:260px;line-height:1.6;font-style:italic;}
.mo-hint{font-family:var(--mono);font-size:9px;color:var(--t4);margin-top:auto;padding-top:20px;letter-spacing:.15em;}

/* ── LOADING ── */
.load-wrap{padding:40px 18px;display:flex;flex-direction:column;align-items:center;gap:16px;}
.load-title{font-family:var(--serif);font-size:20px;font-weight:500;letter-spacing:-.01em;color:var(--ac);}
.dots{display:flex;gap:5px;}
.dot{width:7px;height:7px;border-radius:50%;background:var(--ac);animation:dotP 1.4s ease-in-out infinite;}
.dot:nth-child(2){animation-delay:.2s;}
.dot:nth-child(3){animation-delay:.4s;}
@keyframes dotP{0%,80%,100%{opacity:.2;transform:scale(.8);}40%{opacity:1;transform:scale(1.15);}}
.load-lbl{font-family:var(--mono);font-size:10px;color:var(--t3);letter-spacing:.1em;text-transform:uppercase;}

/* ── SWAP PANEL ── */
.swap-panel{background:var(--bg3);border:1px solid var(--b2);border-radius:8px;margin-top:4px;overflow:hidden;}
.swap-hd{padding:10px 13px;border-bottom:1px solid var(--b);display:flex;align-items:center;justify-content:space-between;}
.swap-title{font-family:var(--mono);font-size:10px;letter-spacing:.12em;color:var(--cyan);text-transform:uppercase;}
.swap-loading{padding:16px;display:flex;align-items:center;gap:10px;}
.swap-alt{padding:11px 13px;border-bottom:1px solid var(--b);cursor:pointer;}
.swap-alt:last-child{border-bottom:none;}
.swap-alt:active{background:var(--bg4);}
.swap-alt-nm{font-family:var(--sans);font-size:14px;font-weight:500;margin-bottom:3px;}
.swap-alt-note{font-family:var(--mono);font-size:10px;color:var(--t3);line-height:1.5;}
.swap-alt-why{font-family:var(--sans);font-size:11px;color:var(--cyan);margin-top:3px;}

/* ── BLOCKLIST ── */
.bl-itm{display:flex;align-items:center;gap:10px;padding:11px 13px;background:var(--bg2);border:1px solid var(--b);border-radius:8px;margin-bottom:7px;}
.bl-nm{font-family:var(--sans);font-size:13px;font-weight:500;flex:1;}
.bl-rs{font-family:var(--mono);font-size:10px;color:var(--t3);margin-top:2px;}
.bl-input{flex:1;background:var(--bg3);border:1px solid var(--b2);border-radius:6px;padding:9px 11px;font-family:var(--mono);font-size:12px;color:var(--t);outline:none;min-height:40px;}
.bl-input:focus{border-color:var(--cyan);}
.bl-input::placeholder{color:var(--t3);}

/* ── HISTORY ── */
.hist-it{background:var(--bg2);border:1px solid var(--b);border-radius:10px;padding:14px;margin-bottom:8px;cursor:pointer;transition:all .15s;}
.hist-it:active{transform:scale(.99);}
.hist-hdr{display:flex;align-items:center;gap:8px;margin-bottom:8px;flex-wrap:wrap;}
.hist-num{font-family:var(--mono);font-size:10px;color:var(--t3);letter-spacing:.08em;text-transform:uppercase;}
.hist-nm{font-family:var(--serif);font-size:17px;font-weight:500;line-height:1.2;letter-spacing:-.01em;flex:1;min-width:120px;}
.hist-meta{display:grid;grid-template-columns:repeat(4,auto);gap:14px;font-family:var(--mono);font-size:10px;color:var(--t3);letter-spacing:.04em;text-transform:uppercase;margin-top:6px;}
.hist-meta-v{font-family:var(--mono);font-size:13px;color:var(--t);margin-top:2px;font-weight:500;text-transform:none;letter-spacing:0;}
.hist-meta-v.xp{color:var(--ac);}
.hist-lifts{display:flex;gap:5px;flex-wrap:wrap;margin-top:6px;}
.hist-lift{font-family:var(--mono);font-size:10px;color:var(--t2);background:var(--bg3);padding:4px 9px;border-radius:4px;border:1px solid var(--b);}
.hist-lift span{color:var(--ac);}

/* ── OVERVIEW HERO ── */
.ov-hero{background:var(--bg2);border:1px solid var(--b);border-radius:12px;padding:16px;margin-bottom:12px;position:relative;overflow:hidden;}
.ov-hero::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--ac),transparent);opacity:.5;}
.ov-hero-lvl{font-family:var(--mono);font-size:10px;color:var(--ac);margin-bottom:6px;letter-spacing:.12em;text-transform:uppercase;}

.muscle-count{font-family:var(--mono);font-size:11px;color:var(--t);font-weight:500;}

/* ── HEATMAP ── */
.heatmap{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:12px;}
.hm-cell{aspect-ratio:1;border-radius:3px;background:var(--bg3);}

.hm-cell.d3{background:rgba(106,154,247,.75);}
.hm-cell.d4{background:var(--ac);}

.hm-lbl span{font-family:var(--mono);font-size:8px;color:var(--t3);letter-spacing:.1em;}

.mini-chart{height:60px;display:flex;align-items:flex-end;gap:3px;}

.mini-bar-lbl{font-family:var(--mono);font-size:7px;color:var(--t3);text-align:center;position:absolute;bottom:-14px;left:50%;transform:translateX(-50%);white-space:nowrap;letter-spacing:.04em;}

/* ── EMPTY STATE ── */
.empty-state{padding:28px 18px;text-align:center;font-family:var(--serif);font-size:15px;color:var(--t3);line-height:1.6;white-space:pre-line;font-style:italic;}

/* ── SKILL TREE ── */
.sk-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin:0 0 18px;}
.sk-stat{background:var(--bg2);border:1px solid var(--b);border-radius:10px;padding:12px;text-align:center;}
.sk-stat-l{font-family:var(--mono);font-size:9px;letter-spacing:.15em;color:var(--t3);margin-bottom:4px;text-transform:uppercase;}
.sk-stat-v{font-family:var(--serif);font-size:24px;font-weight:500;line-height:1;letter-spacing:-.01em;}
.sk-stat-v.un{color:var(--ac);}
.sk-stat-v.ip{color:var(--gold);}
.sk-stat-v.lk{color:var(--t3);}
.sk-stat-d{font-family:var(--mono);font-size:8px;color:var(--t3);margin-top:3px;letter-spacing:.04em;}

.sk-tabs{display:flex;gap:6px;margin-bottom:16px;overflow-x:auto;padding-bottom:2px;-webkit-overflow-scrolling:touch;}
.sk-tabs::-webkit-scrollbar{display:none;}
.sk-tab{padding:8px 14px;font-family:var(--sans);font-size:12px;font-weight:500;background:var(--bg2);border:1px solid var(--b2);border-radius:20px;color:var(--t2);cursor:pointer;white-space:nowrap;min-height:34px;display:flex;align-items:center;}
.sk-tab.on{background:var(--ac);color:#050508;border-color:var(--ac);}

.sk-canvas{background:var(--bg2);border:1px solid var(--b);border-radius:12px;padding:16px 8px;margin-bottom:12px;overflow-x:auto;overflow-y:hidden;-webkit-overflow-scrolling:touch;}
.sk-canvas::-webkit-scrollbar{height:3px;}
.sk-canvas::-webkit-scrollbar-thumb{background:var(--b2);border-radius:2px;}
.sk-svg{display:block;}
.sk-link{stroke:var(--b2);stroke-width:1.5;fill:none;transition:stroke .3s;}
.sk-link.active{stroke:var(--ac);stroke-opacity:.55;}
.sk-node-g{cursor:pointer;}
.sk-node-g:active{opacity:.7;}
.sk-node{transition:all .3s;}
.sk-node.unlocked{fill:var(--ac);stroke:var(--ac);stroke-width:2;}
.sk-node.in_progress{fill:var(--bg3);stroke:var(--gold);stroke-width:2;stroke-dasharray:3,2;}

.sk-node-ic.in_progress{fill:var(--gold);}

.sk-node-label{font-family:var(--sans);font-size:10px;font-weight:500;text-anchor:middle;pointer-events:none;fill:var(--t2);}
.sk-node-label.unlocked{fill:var(--t);}
.sk-node-label.locked{fill:var(--t3);}

.sk-detail{background:var(--bg3);border:1px solid var(--b);border-radius:10px;padding:14px;margin-bottom:12px;}

.sk-detail-body{font-family:var(--sans);font-size:13px;color:var(--t2);line-height:1.5;}

.sk-detail-crit b{color:var(--ac);font-weight:500;}

/* ── ATTRIBUTES RADAR ── */

.attr-row-bar{flex:1;height:4px;background:var(--bg4);border-radius:2px;overflow:hidden;}

/* Radar SVG styles */
.attr-radar-bg{fill:var(--bg3);fill-opacity:0.3;stroke:var(--b2);stroke-width:0.8;}
.attr-radar-axis{stroke:var(--b2);stroke-width:0.8;}
.attr-radar-shape{fill:var(--ac);fill-opacity:0.18;stroke:var(--ac);stroke-width:1.5;stroke-linejoin:round;}
.attr-radar-point{fill:var(--ac);stroke:var(--bg);stroke-width:1;}
.attr-radar-label{font-family:var(--mono);font-size:10px;fill:var(--t2);text-anchor:middle;font-weight:500;letter-spacing:.04em;dominant-baseline:middle;}

/* Attribute detail modal */
.attr-detail{background:var(--bg2);border:1px solid var(--b);border-radius:10px;padding:14px;margin-bottom:10px;}
.attr-detail-top{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:6px;}
.attr-detail-nm{font-family:var(--serif);font-size:18px;font-weight:500;letter-spacing:-.005em;}
.attr-detail-score{font-family:var(--serif);font-size:24px;font-weight:500;color:var(--ac);letter-spacing:-.01em;}
.attr-detail-desc{font-family:var(--sans);font-size:12px;color:var(--t2);line-height:1.5;margin-bottom:10px;}

/* ── SCROLLBAR ── */
::-webkit-scrollbar{width:2px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--b2);border-radius:2px;}
</style>

<script>
'use strict';
// ─── SYSTEM PROMPTS ───────────────────────────────────────────────────────────
var BASE_SYS = `You are an elite personal trainer and strength coach. Design training sessions with 1-on-1 precision.

ATHLETE: Male, 23, 6'1", 185 lbs, Los Angeles. Multi-sport background. Serious training history.
GYM: 24 Hour Fitness (full) + home (bands, pull-up bar). 60 min sessions.

PRI LEFT AIC / RIGHT BC — HARD CONSTRAINTS:
- NO barbell back squat, NO conventional deadlift, NO overhead press (strict or push press)
- Cardio: incline treadmill, stationary bike, stair stepper ONLY
- All pressing: below 90° shoulder elevation unless PT-cleared
- Every warm-up: 90-90 breathing or PRI drill

PRI PROTOCOL VOCABULARY — prefer these named drills when programming warm-ups and pri_homework; they are the athlete's refined protocol from months of PT work:
- 90-90 Hip Lift (± Balloon) — default opener, 2–3×5 breaths
- Supine Hooklying Resisted Right Glute Max — 3×10×2s hold, post-hinge days
- All Four Resisted Right Glute Max — 2×10, pair with supine version
- Modified Supine Pec Stretch (left arm, knees right) — 2×60s, upper days
- All Four Left Post. Mediastinum Expansion — 2–3×5 breaths
- Right Sidelying Apical Expansion + Left Adductor — 2×5 breaths, high priority
- PRI Wall Squat + Respiratory Trunk Rotation — 2–3×10, bridges to loaded patterns
- Standing Wall Left Knee Flexion + Resisted Right Glute Max — 3×8/side, hip centering
- Seated Right Scapular Pull Backs — 3×10×3s, Right BC correction
- Hip 90/90 (floor sit or active) — 2 min or 2×90s/side, right IR priority
- Open Book Stretch (sidelying) — 2×8/side, left priority
You may extend this list, but these named drills should anchor the PRI blocks and pri_homework.

PRI CUE LANGUAGE — cues should be terse, diagnostic, and pattern-specific. Examples of the athlete's preferred phrasing:
- "Thoracic rotation with breath. Heels elevated if hip pinch."
- "Right hip centering check. Log socket pinch to PT."
- "Down and back — not up. Right BC correction."
- "Reach torso over front shin. Right IR priority."
- "Thoracic independent of pelvis."
- "Left side priority. Eyes follow arm."
Avoid generic cues like "engage your core" or "squeeze glutes" — prefer pattern-specific language tied to Left AIC / Right BC asymmetry.

DELOAD RHYTHM: every 6th week is a deload — working weights drop to ~55% of normal, volume trimmed, PRI and skill work unchanged. If the user flags a deload week (or the training context shows week number divisible by 6), program at reduced load and note "DELOAD" in session_focus.

PRIORITY TARGETS (ranked):
1. Shoulder mobility + postural correction (overrides aesthetics)
2. Medial deltoid width — cables, machine, bands — NO overhead press
3. Triceps long head — overhead cable ext, skull crushers, kickbacks
4. Forearms + grip — hammer curls, reverse curls, dead hangs, farmer carries
5. Obliques — Pallof press, cable woodchops, landmine rotations

SUBSTITUTION INTENT: when a muscle group needs a sub (equipment taken, home day, outdoor), prefer variants that reinforce right-hip centering and left-AIC orientation over pure muscle-match. Sumo/offset stances and single-leg patterns favored for lower body; suitcase/offset loading favored for unilateral work. Bodyweight right-hip hinge is an acceptable diagnostic option on outdoor days.

BODYBUILDING: Hypertrophy, mass, aesthetics. Full gym. Progressive overload.
CALISTHENICS: Skill-first. Wall pike push-ups, pull-up variations, L-sit, hollow body.
ATHLETE: Performance training — explosive power, vertical jump, sprint quickness, hand-eye coordination, reactive agility, plyometrics, medicine ball throws, sled pushes, and targeted hypertrophy to support athleticism. PT constraints still apply (no conventional DL, no barbell squat, no overhead press). Use trap bar jumps/deadlifts, goblet squats, broad jumps, box jumps, depth drops, lateral bounds, heiden jumps, single-leg hops, ladder drills, cone shuffles, medicine ball rotational throws + slams, reactive ball drops, tennis ball wall reactions, sled pushes, farmer carries. Pair explosive work (low volume, full recovery) early in session with hypertrophy accessories later. Include at least one CNS-demanding power exercise, one reactive/coordination drill, one plyo/jump drill, and hypertrophy work targeting priority muscles (medial delts, tricep long head, forearms, obliques). Cardio: same restrictions (incline walk/bike/stepper).
RECOVERY: Parasympathetic-biased active recovery. Low CNS demand, zero loading intensity, zero fatigue. Purpose is to reduce soreness, reset posture, improve tissue quality, and consolidate PRI adaptations — NOT to build anything. Build the session from: full PRI protocol (90-90 breathing, balloon, adductor pullback, wall squat respiratory trunk rotation, resisted glute drills, scapular pullbacks, belly lift), thoracic and shoulder mobility (open book, cat-cow, foam roller t-spine, doorway pec stretch, shoulder CARs, sleeper stretch), hip and hamstring mobility (90/90 flow, supine pigeon, pancake, couch stretch, active pike), soft tissue work (foam roller, lacrosse ball for glutes/TFL/lats, light self-massage), Zone 2 cardio at 120-140 bpm max on incline walk/bike/stair stepper (25-40 min), and optional sauna/cold exposure notes if asked. NO strength training. NO skills. NO plyometrics. NO heavy loading. Body parts selected by the user should inform which mobility and soft-tissue work gets prioritized (e.g., if "Shoulders" selected → extra scapular work + pec stretch; if "Hips" → extra 90/90, pigeon, hip flexor stretches). The completion_message should feel restful, not hype. Session_xp should be lower (200-350) since it's recovery.
RESISTANCE: Resistance band only. Equipment available: assume a full set of loop bands (light/medium/heavy/extra heavy), a pull-up bar anchor point, and a door anchor. NO dumbbells, cables, machines, or free weights. Design a complete strength/hypertrophy session using bands exclusively. PT constraints still apply — no band back squat with the band shouldered (compression risk), no overhead band press. Good options: band pull-aparts, band face pulls, band lateral raises, band curls, band tricep pressdowns, band rows (door anchor), band lat pulldowns (pull-up bar anchor), band chest press (door anchor), band hip thrusts (with band across hips), band RDL (stand on band), band goblet squat (band over shoulders held front-rack style), band pallof press, band woodchops, banded monster walks, banded glute bridges, band deadbugs, banded pull-throughs. Use prescriptions like "3×12-15 controlled tempo" and progressions like "step further from anchor" or "use heavier band" instead of weight. Sessions can target any body part selected. Great for travel, hotel rooms, anywhere with no gym access.
FREE TIME: Short, anywhere workout snacks. No equipment assumed — bodyweight only unless user's location suggests otherwise. Design 2-3 SEPARATE mini-workouts (each ~8-15 minutes) the user can pick from based on energy and setting. Examples: "desk break mobility" (5 min spine/hip reset at a desk), "hotel room pump" (10 min bodyweight upper body circuit), "park bench routine" (step-ups, dips, pike push-ups), "office stairwell" (stair sprints + landings), "living room floor" (core + mobility flow), "waiting for coffee" (3 min wall angels + 90-90 breathing). Each mini-workout should be its own block with tag like "(OPTION A)", "(OPTION B)", "(OPTION C)" and its own 3-5 exercises. Keep each short enough to do between meetings or at an airport. PT constraints still apply. Session_xp modest (150-300) since these are snacks.
TWO-A-DAY: AM = low-CNS (mobility/skill/accessory). PM = high intensity.

RESPOND ONLY WITH JSON, zero markdown:
{"session_title":"str","session_focus":"one sentence","mode":"bodybuilding|calisthenics|athlete|recovery|resistance|freetime","time_of_day":"AM|PM|single","estimated_duration_min":60,"session_xp":400,"blocks":[{"tag":"BLOCK A","name":"str","duration_min":15,"exercises":[{"id":"snake_id","name":"Exercise Name","prescription":"3×10 @ 3-1-1-0","cues":"2-3 PT cues","sets":3,"reps_target":"10","rest_sec":90,"is_cardio":false,"muscles_primary":["muscle"],"muscles_secondary":["muscle"],"body_view":"front|back"}]}],"completion_message":"Coach reward max 12 words"}
Muscle names: chest front_delts biceps triceps forearms abs obliques quads hip_flexors adductors calves trapezius rear_delts lats mid_back lower_back glutes hamstrings`;

var SWAP_SYS = `Personal trainer. Athlete needs exercise swap. Respect all PRI constraints: no conventional deadlift, no barbell squat, no overhead press. Hit same muscle group. If swapping a warm-up/PRI drill, prefer a named PRI protocol drill (90-90 Hip Lift, Wall Squat + Respiratory Trunk Rotation, Resisted Right Glute Max variants, Apical Expansion + Left Adductor, Scapular Pull Backs). Return ONLY JSON:
{"alternatives":[{"name":"str","prescription":"3×12","cues":"one cue","why":"one sentence","muscles_primary":["m"],"muscles_secondary":["m"],"body_view":"front|back"}]}`;

var PRI_SYS = `You are a PRI physical therapist. Generate a DAILY 10–15 minute PRI routine for an athlete with Left AIC / Right BC pattern. Rotate focus across the week so the athlete hits all four axes: hip centering, thoracic/rib cage, scapular, mediastinum/adductor. Use 4–6 drills. Keep cues terse, diagnostic, pattern-specific (e.g. "Right BC correction. Down and back — not up.", "Right hip centering. Log socket pinch.", "Left side priority. Eyes follow arm.").

VOCABULARY (draw from these named drills, you may extend slightly):
- 90-90 Hip Lift (± Balloon)
- Supine Hooklying Resisted Right Glute Max
- All Four Resisted Right Glute Max
- Modified Supine Pec Stretch (left arm, knees right)
- All Four Left Post. Mediastinum Expansion
- Right Sidelying Apical Expansion + Left Adductor
- PRI Wall Squat + Respiratory Trunk Rotation
- Standing Wall Left Knee Flexion + Resisted Right Glute Max
- Seated Right Scapular Pull Backs
- Hip 90/90 (floor sit or active)
- Open Book Stretch (sidelying)

RESPOND ONLY WITH JSON, zero markdown:
{"focus":"short phrase e.g. Hip centering + thoracic","duration_min":12,"items":[{"name":"str","prescription":"3×5 breaths","cues":"one line","priority":"high|medium|low"}],"note":"one sentence on why this focus today"}`;

function buildSystemPrompt(blocklist, db) {
  // Static block — cached on Anthropic side (ephemeral, 5-min TTL) so repeat
  // calls skip re-processing the ~2KB base prompt. Dynamic block stays uncached.
  var blocks = [{type:'text', text: BASE_SYS, cache_control:{type:'ephemeral'}}];
  var dyn = '';
  if (blocklist && blocklist.length > 0) {
    dyn += 'BLOCKLIST — NEVER program these exercises, always substitute:\n';
    blocklist.forEach(function(b) { dyn += '- ' + b.name + (b.reason ? ' (' + b.reason + ')' : '') + '\n'; });
  }
  var ctx = buildTrainingContext(db);
  if (ctx) dyn += (dyn ? '\n\n' : '') + ctx;
  if (dyn) blocks.push({type:'text', text: dyn});
  return blocks;
}

function buildTrainingContext(db) {
  if (!db || !db.sessions || db.sessions.length === 0) return '';
  var completed = db.sessions.filter(function(s){return s.completed;});
  if (completed.length === 0) return '';
  var lines = ['TRAINING CONTEXT (use to program variety, recovery, and progression):'];

  // Recent sessions (last 5)
  var recent = completed.slice(-5).reverse();
  lines.push('\nLAST ' + recent.length + ' COMPLETED SESSIONS:');
  recent.forEach(function(s, i) {
    var exNames = (s.exercises || []).map(function(e) { return e.name; }).slice(0, 8).join(', ');
    var daysAgo = Math.floor((Date.now() - (s.timestamp||0)) / 86400000);
    lines.push('- ' + daysAgo + 'd ago (' + s.mode + ' ' + s.timeOfDay + '): ' + exNames);
  });

  // Muscle freq last 7 days
  var sevenDaysAgo = Date.now() - 7 * 86400000;
  var recentSess = completed.filter(function(s) { return (s.timestamp||0) > sevenDaysAgo; });
  var muscleHits = {};
  recentSess.forEach(function(s) {
    (s.exercises || []).forEach(function(e) {
      (e.muscles_primary || []).forEach(function(m) { muscleHits[m] = (muscleHits[m] || 0) + (e.sets_done || 0); });
    });
  });
  if (Object.keys(muscleHits).length > 0) {
    lines.push('\nMUSCLES HIT LAST 7 DAYS (primary sets):');
    Object.keys(muscleHits).sort(function(a, b) { return muscleHits[b] - muscleHits[a]; }).slice(0, 10).forEach(function(m) {
      lines.push('- ' + m + ': ' + muscleHits[m] + ' sets');
    });
    lines.push('Prioritize undertrained priority muscles (medial delts, tricep long head, forearms, obliques). Avoid overloading already-hit muscles.');
  }

  // Exercise frequency — identify what's been done repeatedly
  var exFreq = {};
  completed.slice(-8).forEach(function(s){
    (s.exercises||[]).forEach(function(e){
      var k=e.name.toLowerCase();exFreq[k]=(exFreq[k]||0)+1;
    });
  });
  var overused = Object.keys(exFreq).filter(function(k){return exFreq[k]>=3;}).slice(0,8);
  if (overused.length > 0) {
    lines.push('\nEXERCISES DONE 3+ TIMES IN LAST 8 SESSIONS (favor variations, not repeats):');
    overused.forEach(function(k){ lines.push('- ' + k + ' (' + exFreq[k] + 'x)'); });
  }

  // PRs for key lifts
  var prs = computePRs(db);
  var keyPatterns = ['deadlift','squat','bench','row','pull','thrust','lateral raise','tricep','curl','press'];
  var prLines = [];
  keyPatterns.forEach(function(pat){
    var match = Object.keys(prs).find(function(k){return k.indexOf(pat)>=0;});
    if (match) prLines.push(match + ': ' + prs[match].weight + 'lbs × ' + prs[match].reps);
  });
  if (prLines.length > 0) {
    lines.push('\nCURRENT PRs (program at or above these weights):');
    prLines.slice(0,8).forEach(function(l) { lines.push('- ' + l); });
  }

  // Volume trend last 3 sessions
  var last3 = completed.slice(-3);
  if (last3.length >= 2) {
    var vols = last3.map(function(s){
      var v=0;
      (s.exercises||[]).forEach(function(e){
        (e.sets||[]).forEach(function(st){
          if (st.done && st.weight && st.reps) v += (parseFloat(st.weight)||0) * (parseFloat(st.reps)||0);
        });
      });
      return Math.round(v);
    });
    lines.push('\nVOLUME LAST 3 SESSIONS (lbs×reps): ' + vols.join(' → '));
    var trend = vols[vols.length-1] > vols[0] ? 'rising' : vols[vols.length-1] < vols[0] ? 'falling' : 'flat';
    lines.push('Volume trend: ' + trend + '. Adjust programming accordingly.');
  }

  return lines.join('\n');
}

    sF=lg?'rgba(61,109,217,.30)':'rgba(61,109,217,.28)';
  }else{

    st=lg?'rgba(200,200,215,.30)':'var(--t3)';
    pF=lg?'rgba(106,154,247,.90)':'rgba(106,154,247,.7)';
    sF=lg?'rgba(106,154,247,.35)':'rgba(106,154,247,.22)';
  }
  var ano=light?'rgba(10,10,15,.20)':'rgba(200,200,215,.18)';
  var lbl=light?'rgba(10,10,15,.32)':'rgba(200,200,215,.32)';
  var vb=isFront?'0 0 724 1448':'724 0 724 1448';
  var muscles=isFront?MF:MB;
  var sm=isFront?SMF:SMB;
  var anaPath=isFront?AF:AB;
  var h='<path d="'+(isFront?OF:OB)+'" fill="'+bg+'" stroke="'+st+'" stroke-width="1.5" fill-rule="evenodd"/>';
  h+='<path d="'+anaPath+'" fill="none" stroke="'+ano+'" stroke-width="1.4" stroke-linecap="round"/>';
  function draw(name,fill){var slug=sm[name]||name;var ps=muscles[slug];if(!ps)return;ps.forEach(function(e){h+='<ellipse cx="'+e.cx+'" cy="'+e.cy+'" rx="'+e.rx+'" ry="'+e.ry+'" fill="'+fill+'"/>';});}
  (sec||[]).forEach(function(m){draw(m,sF);});
  (pri||[]).forEach(function(m){draw(m,pF);});
  if(lg){
    var lx=isFront?36:760;
    h+='<text x="'+lx+'" y="112" fill="'+lbl+'" font-family="ui-monospace,SFMono-Regular,monospace" font-size="38" letter-spacing="4" font-weight="500">'+(isFront?'FRONT':'BACK')+'</text>';
  }
  var w=document.createElement('div');w.innerHTML='<svg viewBox="'+vb+'" xmlns="http://www.w3.org/2000/svg">'+h+'</svg>';
  return w.firstChild;
}

}

var LEVELS=[{l:1,n:'RECRUIT',xp:0},{l:2,n:'SOLDIER',xp:500},{l:3,n:'FIGHTER',xp:1200},{l:4,n:'WARRIOR',xp:2200},{l:5,n:'ELITE',xp:3500},{l:6,n:'VETERAN',xp:5000},{l:7,n:'MASTER',xp:7000},{l:8,n:'LEGEND',xp:10000}];
function getLvl(xp){
  var cur=LEVELS[0];
  LEVELS.forEach(function(lv){if(xp>=lv.xp)cur=lv;});
  var idx=LEVELS.indexOf(cur);
  var nxt=LEVELS[Math.min(idx+1,LEVELS.length-1)];
  var pct=cur===nxt?100:Math.round(((xp-cur.xp)/(nxt.xp-cur.xp))*100);
  return{cur:cur,nxt:nxt,pct:pct};
}

// ─── PR ENGINE ────────────────────────────────────────────────────────────────
function computePRs(db){
  var prs={};
  (db.sessions||[]).forEach(function(s){
    (s.exercises||[]).forEach(function(ex){
      var key=ex.name.toLowerCase();
      (ex.sets||[]).forEach(function(set){
        if(!set.done||!set.weight||!set.reps)return;
        var w=parseFloat(set.weight),r=parseFloat(set.reps);
        if(!w||!r)return;
        var vol=w*r;
        if(!prs[key]||vol>prs[key].vol){
          prs[key]={weight:w,reps:r,vol:vol,date:s.date,sessionIdx:s.idx};
        }
      });
    });
  });
  return prs;
}

function getWeightRec(exName, db, isDeload){
  var key=exName.toLowerCase();
  var prs=computePRs(db);
  // Fuzzy match
  var match=Object.keys(prs).find(function(k){
    var ka=k.replace(/[^a-z]/g,' ').split(' ').filter(Boolean);
    var na=key.replace(/[^a-z]/g,' ').split(' ').filter(Boolean);
    return ka.some(function(w){return w.length>4&&na.some(function(n){return n.indexOf(w)>=0||w.indexOf(n)>=0;});});
  });
  var STARTS={'trap bar':135,'rdl':95,'romanian':95,'goblet':25,'bench':30,'hip thrust':45,'lat pull':50,'cable row':50,'curl':25,'lateral raise':10,'extension':30};
  var start=null;
  Object.keys(STARTS).forEach(function(k){if(key.indexOf(k)>=0)start=STARTS[k];});
  if(!match&&!start)return null;
  var base=match?prs[match].weight:start;
  var JUMPS={'trap bar':10,'rdl':10,'romanian':10,'bench':5,'hip thrust':10,'lat pull':5,'cable row':5,'goblet':5};
  var jump=5;Object.keys(JUMPS).forEach(function(k){if(key.indexOf(k)>=0)jump=JUMPS[k];});
  // count history
  var count=0;
  (db.sessions||[]).forEach(function(s){(s.exercises||[]).forEach(function(ex){if(ex.name.toLowerCase().indexOf(key.slice(0,6))>=0)count++;});});
  var w=match?base+jump:base;
  if(isDeload)w=Math.round(w*0.55/5)*5;
  return{weight:Math.round(w/2.5)*2.5,conf:count>=5?'high':count>0?'medium':'low',note:count>0?'Based on '+count+' sessions':'Starting weight'};
}

function calcRamp(wt,isDeload){
  var w=parseFloat(wt)||0;if(!w)return[];
  if(isDeload)w=Math.round(w*0.55/5)*5;
  var s=[45];var c=45;while(c+20<w){c+=20;s.push(c);}s.push(w);return s;
}

// ─── MUSCLE FREQUENCY ────────────────────────────────────────────────────────
function getMuscleFreq(db, days){
  var cutoff=Date.now()-(days||7)*86400000;
  var freq={};
  (db.sessions||[]).forEach(function(s){
    if(!s.completed||(s.timestamp||0)<cutoff)return;
    (s.exercises||[]).forEach(function(ex){
      var sets_done=(ex.sets||[]).filter(function(st){return st.done;}).length;
      (ex.muscles_primary||[]).forEach(function(m){freq[m]=(freq[m]||0)+sets_done;});
    });
  });
  return freq;
}

  'Shoulders':   { muscles: ['front_delts','rear_delts'],             icon: '◆' },
  'Back':        { muscles: ['lats','mid_back','trapezius'],          icon: '▲' },
  'Biceps':      { muscles: ['biceps'],                               icon: '◐' },
  'Triceps':     { muscles: ['triceps'],                              icon: '◑' },
  'Forearms':    { muscles: ['forearms'],                             icon: '◊' },
  'Core':        { muscles: ['abs','obliques'],                       icon: '■' },
  'Lower Back':  { muscles: ['lower_back'],                           icon: '▼' },
  'Glutes':      { muscles: ['glutes'],                               icon: '◉' },
  'Hamstrings':  { muscles: ['hamstrings'],                           icon: '◓' },
  'Quads':       { muscles: ['quads','quadriceps'],                   icon: '◒' },
  'Calves':      { muscles: ['calves'],                               icon: '▪' },
  'Hips':        { muscles: ['hip_flexors','adductors'],              icon: '◈' }
};
var BODY_PART_ORDER = ['Shoulders','Chest','Back','Biceps','Triceps','Forearms','Core','Lower Back','Glutes','Hamstrings','Quads','Calves','Hips'];

// Priority body parts — always weighted in suggestions
var PRIORITY_PARTS = ['Shoulders','Triceps','Forearms','Core'];

function suggestTargets(db, mode) {
  // Score each body part: high score = should train it
  var freq7 = getMuscleFreq(db, 7);
  var scores = {};
  BODY_PART_ORDER.forEach(function(part) {
    var group = BODY_PART_GROUPS[part];
    var setsLast7 = group.muscles.reduce(function(a, m) { return a + (freq7[m] || 0); }, 0);
    // Base: inverse of recent volume (less recent = higher score)
    var score = Math.max(0, 20 - setsLast7);
    // Priority boost
    if (PRIORITY_PARTS.indexOf(part) >= 0) score += 8;
    scores[part] = { score: score, setsLast7: setsLast7 };
  });

  // Mode-specific biases
  if (mode === 'bodybuilding') {
    // PM bodybuilding: suggest 3-4 complementary parts
    // PM tends to be push or pull focused
  } else if (mode === 'calisthenics') {
    // Usually upper body skill-focused
    ['Shoulders','Back','Core','Triceps','Biceps','Forearms'].forEach(function(p){ if(scores[p]) scores[p].score += 3; });
  } else if (mode === 'athlete') {
    // Athlete: lower body explosion + core always, upper varies
    ['Quads','Glutes','Hamstrings','Core','Calves'].forEach(function(p){ if(scores[p]) scores[p].score += 5; });
  } else if (mode === 'recovery') {
    // Recovery: flip the script — suggest HIGH-recent-volume parts (they're sore/need recovery)
    // Override scoring: score = sets hit in last 3 days, cap high-volume areas
    BODY_PART_ORDER.forEach(function(part){
      var group = BODY_PART_GROUPS[part];
      var freq3 = getMuscleFreq(db, 3);
      var recentSets = group.muscles.reduce(function(a, m) { return a + (freq3[m] || 0); }, 0);
      scores[part].score = recentSets * 2; // High recent volume = needs recovery attention
      scores[part].setsLast7 = recentSets; // repurpose display to show "3d" sets for context
    });
    // Always suggest hips + thoracic areas for PRI athlete
    ['Hips','Core','Shoulders','Back'].forEach(function(p){ if(scores[p]) scores[p].score += 4; });
  } else if (mode === 'resistance') {
    // Resistance: bands do everything well, default to what's undertrained + priority
    // No additional bias beyond base (undertrained + priority boost)
  } else if (mode === 'freetime') {
    // Free time: short snacks, favor mobility-heavy and upper body (most doable in small spaces)
    ['Shoulders','Core','Hips','Back'].forEach(function(p){ if(scores[p]) scores[p].score += 4; });
  }

  // Sort by score, take top 4
  var sorted = BODY_PART_ORDER.slice().sort(function(a, b) { return scores[b].score - scores[a].score; });
  var suggested = sorted.slice(0, 4);
  return { suggested: suggested, scores: scores };
}

function targetsToMusclesList(parts) {
  var muscles = [];
  parts.forEach(function(part) {
    var group = BODY_PART_GROUPS[part];
    if (group) muscles = muscles.concat(group.muscles);
  });
  return Array.from(new Set(muscles)); // dedupe
}

// Compute status of a single skill node: 'unlocked' | 'in_progress' | 'locked'
function checkSkillStatus(node, db) {
  var crit = node.crit;
  var rx = new RegExp(crit.pattern, 'i');
  var exRx = crit.exclude ? new RegExp(crit.exclude, 'i') : null;
  var matchingSets = 0;
  var bestWeight = 0;
  (db.sessions || []).forEach(function(s) {
    if (!s.completed) return;
    (s.exercises || []).forEach(function(ex) {
      if (!rx.test(ex.name)) return;
      if (exRx && exRx.test(ex.name)) return;
      (ex.sets || []).forEach(function(st) {
        if (!st.done) return;
        matchingSets++;
        var w = parseFloat(st.weight) || 0;
        if (w > bestWeight) bestWeight = w;
      });
    });
  });
  var needsSets = crit.minSets || 1;
  var needsWeight = crit.minWeight || 0;
  var hitSets = matchingSets >= needsSets;
  var hitWeight = bestWeight >= needsWeight;
  if (hitSets && hitWeight) return 'unlocked';
  if (matchingSets > 0) return 'in_progress';
  return 'locked';
}

// Check if prereqs are satisfied
function prereqsSatisfied(node, treeNodes, db) {
  if (!node.prereqs || node.prereqs.length === 0) return true;
  return node.prereqs.every(function(prereqId) {
    var prereq = treeNodes.find(function(n) { return n.id === prereqId; });
    if (!prereq) return true;
    return checkSkillStatus(prereq, db) === 'unlocked';
  });
}

// Effective status = respect prereqs (can't be "in progress" if prereqs aren't met)
function effectiveSkillStatus(node, treeNodes, db) {
  var ownStatus = checkSkillStatus(node, db);
  if (ownStatus === 'unlocked') return 'unlocked';
  if (!prereqsSatisfied(node, treeNodes, db)) return 'locked';
  return ownStatus; // in_progress or locked
}

  },
  {
    id:'back_to_back', title:'Back-to-back days', desc:'Train today after training yesterday', xp:70,
    check: function(db, todayTs) {
      var hasToday = (db.sessions||[]).some(function(s){
        return s.completed && (s.timestamp||0) >= todayTs;
      });
      var yestTs = todayTs - 86400000;
      var hasYesterday = (db.sessions||[]).some(function(s){
        return s.completed && (s.timestamp||0) >= yestTs && (s.timestamp||0) < todayTs;
      });
      return {done: hasToday && hasYesterday, progress: (hasToday?1:0)+(hasYesterday?1:0), target: 2};
    }
  }
];

// Returns today's midnight timestamp
function getTodayTs() {

  d.setHours(0,0,0,0);
  return d.getTime();

function getDateKey() {

// ─── ATTRIBUTES ──────────────────────────────────────────────────────────────
// Six attributes derived from training history. Each scored 0-100.
// Most use a recency-weighted 42-day window so the hex reflects recent work.

function recentSessions(db, days) {
  var cutoff = Date.now() - days*86400000;
  return (db.sessions||[]).filter(function(s){
    return s.completed && (s.timestamp||0) >= cutoff;
  });
}

// STR: heaviest working weight across key compound patterns, normalized
function computeSTR(db) {
  // Benchmarks for ~185lb male to hit 100: trap DL 315, goblet 100, hip thrust 225, DB bench 80, lat pull 170, RDL 225
  var benchmarks = {
    'trap.?bar': 315,
    'goblet': 100,
    'hip.?thrust': 225,
    'db.?bench|dumbbell.?bench': 80,
    'lat.?pull': 170,
    'rdl|romanian': 225
  };
  var prs = computePRs(db);
  var score = 0, lifts = 0, topContribs = [];
  Object.keys(benchmarks).forEach(function(pat){
    var target = benchmarks[pat];
    var rx = new RegExp(pat,'i');
    var bestW = 0, bestKey = null;
    Object.keys(prs).forEach(function(k){
      if(rx.test(k) && prs[k].weight > bestW){bestW=prs[k].weight; bestKey=k;}
    });
    if(bestW > 0){
      var pct = Math.min(100, (bestW/target)*100);
      score += pct; lifts++;
      topContribs.push({name:bestKey, weight:bestW, target:target, pct:Math.round(pct)});
    }
  });
  var final = lifts>0 ? Math.round(score/lifts) : 0;
  topContribs.sort(function(a,b){return b.pct-a.pct;});
  return {score:final, contribs: topContribs.slice(0,3), total:lifts, totalPossible:6};
}

function computePOW(db) {
  var rx = /jump|throw|slam|bound|leap|hop|depth|explosive|plyo|broad|heiden/i;
  var recent = recentSessions(db, 42);
  var totalSets = 0, sessionsWithPower = 0, contribs = {};
  recent.forEach(function(s){
    var sessHadPower = false;
    (s.exercises||[]).forEach(function(ex){
      if(!rx.test(ex.name)) return;
      sessHadPower = true;
      var done = (ex.sets||[]).filter(function(st){return st.done;}).length;
      totalSets += done;
      contribs[ex.name] = (contribs[ex.name]||0) + done;
    });
    if(sessHadPower) sessionsWithPower++;
  });
  var setsScore = Math.min(100, (totalSets/30)*100);
  var freqScore = Math.min(100, (sessionsWithPower/10)*100);
  var score = Math.round((setsScore*0.6 + freqScore*0.4));
  var topEx = Object.keys(contribs).sort(function(a,b){return contribs[b]-contribs[a];}).slice(0,3)
    .map(function(k){return {name:k, count:contribs[k]};});
  return {score:score, contribs: topEx, totalSets:totalSets, sessionsWithPower:sessionsWithPower};
}

function computeAGI(db) {
  var rx = /ladder|cone|shuffle|reactive|tennis.?ball|ball.?drop|single.?leg.?hop|lateral.?bound|carioca|crossover/i;
  var recent = recentSessions(db, 42);
  var totalSets = 0, contribs = {};
  recent.forEach(function(s){
    (s.exercises||[]).forEach(function(ex){
      if(!rx.test(ex.name)) return;
      var done = (ex.sets||[]).filter(function(st){return st.done;}).length;
      totalSets += done;
      contribs[ex.name] = (contribs[ex.name]||0) + done;
    });
  });
  var score = Math.min(100, Math.round((totalSets/20)*100));
  var topEx = Object.keys(contribs).sort(function(a,b){return contribs[b]-contribs[a];}).slice(0,3)
    .map(function(k){return {name:k, count:contribs[k]};});
  return {score:score, contribs: topEx, totalSets:totalSets};
}

function computeEND(db) {
  var recent = recentSessions(db, 42);
  var totalMinutes = 0;
  var recoveryCount = 0;
  var cardioMinutes = 0;
  var cardioRx = /treadmill|incline|bike|stepper|rower|zone.?2|elliptical|stair/i;
  recent.forEach(function(s){
    totalMinutes += Math.floor((s.duration||0)/60);
    if(s.mode==='recovery') recoveryCount++;
    (s.exercises||[]).forEach(function(ex){
      if(!ex.is_cardio && !cardioRx.test(ex.name)) return;
      (ex.sets||[]).forEach(function(st){
        if(st.done){
          var m = parseFloat(st.weight) || 0;
          cardioMinutes += m;
        }
      });
    });
  });
  var sessScore = Math.min(100, (totalMinutes/600)*100);
  var cardioScore = Math.min(100, (cardioMinutes/150)*100);
  var recScore = Math.min(100, (recoveryCount/6)*100);
  var score = Math.round(sessScore*0.5 + cardioScore*0.3 + recScore*0.2);
  return {score:score, totalMinutes:totalMinutes, cardioMinutes:cardioMinutes, recoveryCount:recoveryCount};
}

function computeFOC(db) {
  var recent = recentSessions(db, 42);
  if(recent.length === 0) return {score:0, completionRate:0, priRate:0, notesRate:0};
  var totalCompletion = 0, priSessionsDone = 0, priSessionsTotal = 0, notesCount = 0;
  recent.forEach(function(s){
    if(!s._full){
      var total=0, done=0;
      (s.exercises||[]).forEach(function(ex){
        total += (ex.sets||[]).length;
        done += ex.sets_done || 0;
      });
      if(total>0) totalCompletion += (done/total)*100;
    } else {
      var full = s._full;
      var total=0, done=0;
      (full.data && full.data.blocks || []).forEach(function(b){
        (b.exercises||[]).forEach(function(ex){
          total += ex.sets || 0;
          var lg = full.log && full.log[ex.id];
          if(lg && lg.sets) done += lg.sets.filter(function(st){return st.done;}).length;
        });
      });
      if(total>0) totalCompletion += (done/total)*100;
      if(full.data && full.data.pri_homework && full.data.pri_homework.length>0){
        priSessionsTotal++;
        var priTotal = full.data.pri_homework.length;
        var priDone = 0;
        for(var i=0;i<priTotal;i++){
          if(full.priChecked && full.priChecked[i]) priDone++;
        }
        if(priDone >= priTotal) priSessionsDone++;
      }
    }
    if(s.note && s.note.trim().length >= 10) notesCount++;
  });
  var completionRate = totalCompletion / recent.length;
  var priRate = priSessionsTotal > 0 ? (priSessionsDone/priSessionsTotal)*100 : 50;
  var notesRate = (notesCount/recent.length)*100;
  var score = Math.round(completionRate*0.5 + priRate*0.3 + notesRate*0.2);
  return {score:Math.min(100,score), completionRate:Math.round(completionRate), priRate:Math.round(priRate), notesRate:Math.round(notesRate)};
}

function computeDEX(db) {
  var calNodes = SKILL_TREES.calisthenics.nodes;
  var resNodes = SKILL_TREES.resistance.nodes;
  var calUnlocked = calNodes.filter(function(n){return effectiveSkillStatus(n, calNodes, db)==='unlocked';}).length;
  var resUnlocked = resNodes.filter(function(n){return effectiveSkillStatus(n, resNodes, db)==='unlocked';}).length;
  var calScore = Math.min(100, (calUnlocked/10)*100);
  var resScore = Math.min(100, (resUnlocked/6)*100);
  var score = Math.round(calScore*0.6 + resScore*0.4);
  return {score:score, calUnlocked:calUnlocked, calTotal:calNodes.length, resUnlocked:resUnlocked, resTotal:resNodes.length};
}

function computeAllAttributes(db) {
  return {
    STR: computeSTR(db),
    POW: computePOW(db),
    AGI: computeAGI(db),
    END: computeEND(db),
    FOC: computeFOC(db),
    DEX: computeDEX(db)
  };
}

// Pick today's 3 challenges — seeded by date string so the same 3 return all day
function pickDailyChallenges() {
  var seedStr = getDateKey();
  // Simple hash
  var seed = 0;
  for (var i = 0; i < seedStr.length; i++) {
    seed = ((seed << 5) - seed + seedStr.charCodeAt(i)) | 0;
  }
  // Seeded shuffle via linear congruential
  var pool = CHALLENGE_POOL.slice();
  var rng = function(){seed=(seed*1664525+1013904223)|0;return ((seed>>>0)%1000)/1000;};
  // Fisher-Yates with seeded random
  for(var j=pool.length-1;j>0;j--){
    var k = Math.floor(rng()*(j+1));
    var tmp = pool[j]; pool[j]=pool[k]; pool[k]=tmp;
  }
  return pool.slice(0,3).map(function(c){return c.id;});
}

// Load/refresh today's challenges on DB
function ensureTodayChallenges() {
  if (!DB.challenges) DB.challenges = {date: null, items: [], totalCompleted: 0};
  var today = getDateKey();
  if (DB.challenges.date !== today) {
    // New day — roll over
    DB.challenges.date = today;
    DB.challenges.items = pickDailyChallenges().map(function(id){return {id:id, claimed:false, awardedXP:0};});
    saveDB();
  }
}

// Evaluate all challenges — check, award XP for newly-done, persist
function evalChallenges() {
  ensureTodayChallenges();
  var todayTs = getTodayTs();
  var awarded = 0;
  DB.challenges.items.forEach(function(item){
    var template = CHALLENGE_POOL.find(function(c){return c.id===item.id;});
    if(!template) return;
    var result = template.check(DB, todayTs);
    item.status = result;
    if(result.done && !item.claimed){
      item.claimed = true;
      item.awardedXP = template.xp;
      DB.totalXP += template.xp;
      DB.challenges.totalCompleted = (DB.challenges.totalCompleted || 0) + 1;
      awarded += template.xp;
    }
  });
  if(awarded > 0) saveDB();
  return awarded;
}

function calcXP(sess){
  if(!sess||!sess.data||!sess.log)return{done:0,total:0,pct:0,earned:0};
  var done=0,total=0;
  (sess.data.blocks||[]).forEach(function(b){
    (b.exercises||[]).forEach(function(ex){
      total+=ex.sets;
      var lg=sess.log[ex.id];
      done+=(lg&&lg.sets?lg.sets.filter(function(s){return s.done;}).length:0);
    });
  });
  var pct=total?Math.round((done/total)*100):0;
  var earned=total?Math.round((done/total)*(sess.data.session_xp||400)):0;
  return{done:done,total:total,pct:pct,earned:earned,max:sess.data.session_xp||400};
}

// ─── SESSION → DB RECORD ─────────────────────────────────────────────────────
function sessToRecord(sess){
  if(!sess||!sess.data)return null;
  var exRecords=[];
  (sess.data.blocks||[]).forEach(function(b){
    (b.exercises||[]).forEach(function(ex){
      var lg=sess.log&&sess.log[ex.id];
      var sets=(lg&&lg.sets)||[];
      exRecords.push({
        id:ex.id,name:ex.name,
        muscles_primary:ex.muscles_primary||[],
        muscles_secondary:ex.muscles_secondary||[],
        sets:sets,
        sets_done:sets.filter(function(s){return s.done;}).length
      });
    });
  });
  return{
    idx:sess.idx,mode:sess.mode,timeOfDay:sess.timeOfDay,
    date:sess.date,timestamp:sess.timestamp||Date.now(),
    completed:sess.completed,duration:sess.duration||0,
    xp_earned:sess.xp_earned||0,exercises:exRecords,
    note:sess.note,ptFlags:sess.ptFlags||[]
  };
}

function rdyResult(r){
  if(!r||Object.keys(r).length<3)return{level:'',msg:''};
  var reds=['bad','heavy','high'].filter(function(v){return Object.values(r).indexOf(v)>=0;}).length;
  if(reds>=3)return{level:'bad',msg:'3+ red flags — reduce load 20-30%.'};
  if(reds>=2)return{level:'warn',msg:'2 red flags — watch RPE closely.'};
  return{level:'ok',msg:'Readiness nominal. Execute as programmed.'};
}

  var msRow=div('xp-milestones');
  [25,50,75,100].forEach(function(m){
    var mk=div('xp-m-marker');mk.style.left=m+'%';
    mk.appendChild(el('div','xp-m-pip'+(xp.pct>=m?' hit':''),''));
    mk.appendChild(el('div','xp-m-label'+(xp.pct>=m?' hit':''),m+'%'));
    msRow.appendChild(mk);
    if(xp.pct>=m&&!msShown[m]){
      msShown[m]=true;
      var labels={25:'Quarter way',50:'Halfway',75:'Almost there',100:'Complete'};
      setTimeout(function(){showPopup(labels[m],m+'% of session done');},250);
    }
  });
  wrap.appendChild(msRow);
  var setsRow=div('xp-sets-row');
  setsRow.appendChild(el('div','xp-sets-lb','Sets completed'));
  setsRow.appendChild(el('div','xp-sets-ct',xp.done+' / '+xp.total));

    var done=div('xp-complete');

    done.appendChild(el('div','xp-complete-title','Session complete'));

    done.appendChild(el('div','xp-complete-msg',sess.data.completion_message||'Session complete. Gains locked.'));
    wrap.appendChild(done);
  }
  return wrap;
}
